assets:
  - id: <stable-image-id>
    src: assets/<cartella>/<file.webp>
    source_type: <screenshot|card-art|crop|photo|other>
    width: <numero-pixel>
    height: <numero-pixel>
    lesson_slug: <lesson-slug>
    anchor: "## <heading-esatta>"
    alt_it: >-
      <Override opzionale del testo alternativo, in italiano o kana/katakana: niente kanji nudi.>
    caption_it: >-
      <Override opzionale della caption visibile: usa furigana e link semantici se compaiono kanji.>
    notes: >-
      <Note facoltative sul file o sulla provenienza.>
