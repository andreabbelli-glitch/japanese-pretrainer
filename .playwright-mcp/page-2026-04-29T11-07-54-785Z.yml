          - generic [ref=e447]:
            - heading "Associazione non significa automaticamente causa" [level=3] [ref=e448]
            - paragraph [ref=e449]: Se due informazioni si muovono insieme, si può parlare di associazione. Per esempio, in un campione si può osservare che il parto pretermine è più frequente tra le donne che fumano rispetto alle donne che non fumano.
            - paragraph [ref=e450]: Questa osservazione non basta, da sola, per dire che il fumo sia la causa in ogni singolo caso. Potrebbero esserci altri fattori collegati sia al fumo sia al parto pretermine, come condizioni sociali, accesso alle cure, altre esposizioni o caratteristiche cliniche.
            - paragraph [ref=e451]: La statistica aiuta a descrivere e valutare l’associazione. Una conclusione causale richiede anche il disegno dello studio, la plausibilità biologica, la sequenza temporale, l’attenzione ai fattori che possono rendere i gruppi diversi già all’inizio e il giudizio clinico.
            - paragraph [ref=e452]: "La frase prudente è: nel campione osservato, il determinante X è associato all’esito Y. Una frase più forte, come “X causa Y”, richiede prove aggiuntive."
          - generic [ref=e453]:
            - heading "Significatività statistica e utilità clinica" [level=3] [ref=e454]
            - paragraph [ref=e455]: Supponiamo che uno studio confronti due trattamenti per la pressione sistolica. Nel gruppo A la pressione media scende di 10 mmHg; nel gruppo B scende di 8 mmHg. La differenza osservata è 2 mmHg.
            - paragraph [ref=e456]: "Da questa differenza nascono due domande diverse. La prima domanda è statistica: una differenza di 2 mmHg è compatibile con le normali oscillazioni dei dati, oppure è abbastanza stabile da suggerire una vera differenza tra i trattamenti? La seconda domanda è clinica: anche se la differenza fosse reale, 2 mmHg cambiano la prognosi, la scelta terapeutica o la qualità di vita?"
            - paragraph [ref=e457]: Il dubbio statistico nasce perché uno studio osserva un campione, non tutte le persone possibili. Se ripetessi lo stesso studio su altri gruppi simili, una piccola differenza potrebbe cambiare dimensione o anche verso solo perché i gruppi includono persone diverse. Per questo bisogna chiedersi se il risultato osservato sembra abbastanza stabile da non essere spiegato facilmente da questa variabilità casuale.
            - paragraph [ref=e458]: Quando un risultato viene chiamato statisticamente significativo, significa che i dati sono difficili da spiegare come semplice fluttuazione casuale secondo un criterio deciso prima di guardare il risultato. Il punto essenziale è distinguere il segnale nei dati dal valore pratico dell’effetto.
            - paragraph [ref=e459]: La significatività statistica non misura automaticamente l’importanza per la paziente. Un campione molto grande può rendere significativo un effetto minuscolo, perché con moltissimi dati anche differenze piccole diventano stabili. Al contrario, un campione piccolo può non rendere significativa una differenza che sarebbe clinicamente interessante, perché i dati sono troppo pochi o troppo variabili.
            - paragraph [ref=e460]: "Per questo una conclusione completa deve tenere insieme due frasi: quanto è credibile il risultato dal punto di vista statistico e quanto è utile dal punto di vista clinico. La statistica risponde alla domanda sull’evidenza nei dati; la clinica risponde alla domanda sul valore pratico dell’effetto."
