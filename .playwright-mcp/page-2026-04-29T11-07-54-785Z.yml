              - strong [ref=e758]: precisione
              - text: non sono sinonimi. Un risultato è accurato quando è vicino al valore vero che vorremmo conoscere. Un risultato è preciso quando cambia poco se ripetiamo la misura o lo studio in condizioni simili.
            - paragraph [ref=e759]: "Si può essere precisi ma non accurati. La bilancia tarata male dà misure molto simili tra loro, quindi precise, ma tutte spostate. Si può anche essere poco precisi ma senza una direzione fissa di errore: risultati molto variabili, alcuni sopra e alcuni sotto il valore vero."
            - paragraph [ref=e760]: "Nel linguaggio degli studi, la precisione è legata soprattutto alla stabilità della stima; l’accuratezza dipende anche dall’assenza di bias. Per fidarsi di un risultato servono entrambe: un metodo che non spinga sistematicamente nella direzione sbagliata e dati sufficienti per non essere dominati dal rumore."
