          - generic [ref=e2181]:
            - heading "Deviazione standard ed errore standard" [level=3] [ref=e2182]
            - paragraph [ref=e2183]:
              - text: La
              - strong [ref=e2184]: deviazione standard
              - text: e l’
              - strong [ref=e2185]: errore standard
              - text: parlano entrambi di variabilità, ma non descrivono lo stesso oggetto.
            - paragraph [ref=e2186]: La deviazione standard descrive quanto sono diversi tra loro i singoli dati del campione. Se le pressioni dei pazienti sono molto sparse, la deviazione standard è grande. Se sono tutte simili, è piccola.
            - paragraph [ref=e2187]: L’errore standard descrive invece quanto è instabile la media campionaria come stima della media vera. Non chiede quanto variano i pazienti; chiede quanto potrebbe variare la media se ripetessi lo studio con un altro campione della stessa dimensione.
            - paragraph [ref=e2188]: Aumentare il numero di pazienti non rende i pazienti biologicamente più simili. Può però rendere la media più affidabile, perché ogni singolo valore pesa meno sul risultato complessivo.
            - paragraph [ref=e2189]: Per questo l’errore standard diminuisce quando n aumenta. La deviazione standard può restare simile, perché la dispersione dei pazienti nella popolazione non cambia solo perché ho osservato più persone.
            - generic [ref=e2190]:
              - heading "Formula tradotta" [level=4] [ref=e2191]
              - generic [ref=e2192]: ES = s / √n
              - list [ref=e2193]:
                - listitem [ref=e2194]: "ES: errore standard, cioè incertezza della media campionaria"
                - listitem [ref=e2195]: "s: deviazione standard osservata nel campione, cioè dispersione dei singoli dati"
                - listitem [ref=e2196]: "n: numero di osservazioni nel campione"
                - listitem [ref=e2197]: "√n: parte della formula che traduce il fatto che la stima si stabilizza con il campione, ma non in modo lineare"
              - paragraph [ref=e2198]:
                - strong [ref=e2199]: "Esempio:"
                - text: Se s = 12 e n = 36, ES = 12 / √36 = 12/6 = 2. I singoli pazienti variano con deviazione standard 12; la media è stimata con errore standard 2.
          - generic [ref=e2200]:
            - heading "Perché entra la radice di n" [level=3] [ref=e2201]
            - paragraph [ref=e2202]: Quando aggiungo osservazioni, la stima migliora, ma il guadagno non cresce in modo lineare. Passare da 4 a 16 pazienti cambia molto la stabilità della media. Passare da 400 a 412 pazienti aggiunge informazione, ma di solito sposta molto meno il risultato.
            - paragraph [ref=e2203]: "Questa è l’idea chiave: ogni persona in più aggiunge informazione, ma l’informazione aggiunta pesa sempre meno quando il campione è già grande. Un singolo nuovo paziente può cambiare molto una media calcolata su 4 persone; cambia molto meno una media calcolata su 400 persone."
            - paragraph [ref=e2204]: La radice quadrata di n traduce questo andamento. Se quadruplico il campione, la radice raddoppia. Di conseguenza, a parità di deviazione standard, l’errore standard si dimezza.
            - paragraph [ref=e2205]: "Il verso del ragionamento è importante: non diciamo che il campione diventa più preciso perché nella formula c’è √n. Diciamo che, siccome la precisione cresce con rendimento decrescente, la formula usa √n per rappresentare quel comportamento."
            - paragraph [ref=e2206]: "Con s = 10 e n = 100, ES = 10/√100 = 10/10 = 1. Con s = 10 e n = 400, ES = 10/√400 = 10/20 = 0,5. Il campione è quattro volte più grande, ma l’errore standard si dimezza: la precisione migliora, ma non quattro volte."
            - generic [ref=e2207]:
              - heading "Formula tradotta" [level=4] [ref=e2208]
              - generic [ref=e2209]: se n quadruplica, √n raddoppia e l’ES si dimezza
              - list [ref=e2210]:
                - listitem [ref=e2211]: "n quadruplica: per esempio da 100 a 400"
                - listitem [ref=e2212]: "√n raddoppia: √100 = 10, √400 = 20"
                - listitem [ref=e2213]: "ES si dimezza: dividere per 20 produce un errore standard metà rispetto a dividere per 10"
              - paragraph [ref=e2214]:
                - strong [ref=e2215]: "Esempio:"
                - text: "Per dimezzare l’incertezza della media non basta raddoppiare il campione: serve circa quadruplicarlo, se la variabilità resta simile."
          - generic [ref=e2216]:
            - heading "La distribuzione delle medie campionarie" [level=3] [ref=e2217]
            - paragraph [ref=e2218]: Per capire l’errore standard bisogna cambiare oggetto. Prima guardavamo i singoli pazienti. Ora guardiamo molte possibili medie campionarie.
            - paragraph [ref=e2219]: "Se ripetessi lo stesso studio tante volte, ogni volta con un nuovo campione della stessa dimensione, otterrei una serie di medie: una media per il primo campione, una per il secondo, una per il terzo, e così via. Queste medie non sarebbero tutte uguali, ma tenderebbero a raccogliersi attorno alla media vera della popolazione."
            - paragraph [ref=e2220]: La variabilità di queste medie è più piccola della variabilità dei singoli pazienti. Un paziente può essere molto lontano dalla media; una media calcolata su molti pazienti è più difficile che sia estremamente lontana, perché combina molte osservazioni.
            - paragraph [ref=e2221]: L’errore standard descrive la dispersione di queste medie campionarie. Una dispersione piccola significa che le stime ottenute da campioni diversi sarebbero abbastanza vicine tra loro. Una dispersione grande significa che campioni diversi potrebbero dare stime molto diverse.
          - generic [ref=e2222]:
            - heading "Il teorema del limite centrale" [level=3] [ref=e2223]
            - paragraph [ref=e2224]: "Quando i campioni sono abbastanza grandi, le medie campionarie hanno un comportamento regolare: tendono a disporsi con una forma simile alla normale, anche quando i singoli dati della popolazione non sono perfettamente normali."
            - paragraph [ref=e2225]:
              - text: Questa idea si chiama
              - strong [ref=e2226]: teorema del limite centrale
              - text: ". Il suo ruolo non è dire che tutti i dati clinici sono normali. Dice qualcosa di diverso: le stime basate su medie campionarie, in molte condizioni, si comportano in modo prevedibile attorno al valore vero."
            - paragraph [ref=e2227]: Questo rende possibile costruire intervalli di confidenza. Se so che le medie campionarie oscillano attorno alla media vera e so misurare l’ampiezza tipica di questa oscillazione con l’errore standard, posso trasformare una stima singola in una fascia di valori plausibili.
            - paragraph [ref=e2228]: "La domanda del limite centrale è: che forma avrebbero le medie se lo stesso studio fosse ripetuto molte volte?"
          - generic [ref=e2229]:
            - 'heading "Intervallo di confidenza: stima più incertezza" [level=3] [ref=e2230]'
            - paragraph [ref=e2231]:
              - text: Una stima singola è troppo sottile per raccontare tutto. Dire che la media osservata è 132 mmHg non dice quanto quel numero sia preciso. Un
              - strong [ref=e2232]: intervallo di confidenza
              - text: aggiunge una fascia di valori plausibili per il valore vero nella popolazione.
            - paragraph [ref=e2233]: La costruzione ha due parti. La stima centrale è il valore osservato nel campione. Il margine di errore è la quantità che aggiungo e sottraggo alla stima per tenere conto dell’incertezza del campionamento.
            - paragraph [ref=e2234]: Il margine dipende dall’errore standard e dal livello di confidenza scelto. L’errore standard dice quanto oscilla tipicamente la stima. Il valore critico dice quanta prudenza voglio usare nel costruire l’intervallo.
            - paragraph [ref=e2235]: "Con l’approssimazione normale, un intervallo di confidenza al 95% per una media si costruisce spesso come stima più o meno 1,96 errori standard. Il numero 1,96 deriva dalla curva normale: circa il 95% dell’area centrale sta entro 1,96 errori standard dal centro."
            - paragraph [ref=e2236]: "Il 95% non significa che, per l’intervallo già calcolato, il valore vero abbia il 95% di probabilità di essere lì dentro. Il valore vero è fisso, anche se ignoto. Il 95% descrive il metodo: se ripetessi molte volte il campionamento e costruissi ogni volta un intervallo con la stessa regola, circa 95 intervalli su 100 conterrebbero il valore vero."
            - generic [ref=e2237]:
              - heading "Formula tradotta" [level=4] [ref=e2238]
              - generic [ref=e2239]: IC 95% = stima ± 1,96 × ES
              - list [ref=e2240]:
                - listitem [ref=e2241]: "stima: media, proporzione, differenza o altra quantità osservata nel campione"
                - listitem [ref=e2242]: "ES: errore standard della stima"
                - listitem [ref=e2243]: "1,96: valore critico dell’approssimazione normale per un intervallo bilaterale al 95%"
                - listitem [ref=e2244]: "±: produce un limite inferiore e un limite superiore"
              - paragraph [ref=e2245]:
                - strong [ref=e2246]: "Esempio:"
                - text: Se la media osservata è 132 e l’ES è 3, il margine è 1,96 × 3 = 5,88. L’IC95% è 132 ± 5,88, cioè da 126,12 a 137,88.
          - generic [ref=e2247]:
            - heading "Che cosa allarga o restringe l’intervallo" [level=3] [ref=e2248]
            - paragraph [ref=e2249]: "Un intervallo largo indica molta incertezza. Un intervallo stretto indica una stima più precisa. L’ampiezza dell’intervallo dipende soprattutto da tre elementi: variabilità dei dati, numerosità del campione e livello di confidenza."
            - paragraph [ref=e2250]: Se i dati sono molto dispersi, l’errore standard tende a essere più grande e l’intervallo si allarga. Se il campione è più numeroso, l’errore standard si riduce e l’intervallo si restringe. Se chiedo più confidenza, per esempio passando da 95% a 99%, devo accettare un intervallo più largo.
            - paragraph [ref=e2251]: Non esiste precisione gratuita. A parità di dati, più confidenza significa più prudenza e quindi limiti più distanti. A parità di confidenza, più informazione nel campione significa limiti più vicini.
            - paragraph [ref=e2252]: "La domanda pratica è: l’intervallo è largo perché i dati sono molto variabili, perché il campione è piccolo, o perché ho scelto un livello di confidenza più alto?"
