          - generic [ref=e3253]:
            - heading "Perché una proporzione ha incertezza" [level=3] [ref=e3254]
            - paragraph [ref=e3255]: "Una proporzione osservata può cambiare da campione a campione. Se si osservano altri 100 pazienti simili, i successi potrebbero essere 83, 87 o 90. Questa oscillazione non significa che uno studio sia sbagliato: è l’effetto del campionamento."
            - paragraph [ref=e3256]: Un esito sì/no può essere pensato come una sequenza di 1 e 0. Si assegna 1 a chi presenta l’evento e 0 a chi non lo presenta. La proporzione è la media di questi 1 e 0. Se 85 persone hanno valore 1 e 15 hanno valore 0, la media è 0,85.
            - paragraph [ref=e3257]: La variabilità di una proporzione dipende da due elementi. Il primo è quanto l’esito è equilibrato tra 1 e 0. Una proporzione vicina a 0,50 è più variabile, perché nel campione ci sono molti eventi e molti non eventi. Una proporzione vicina a 0 o a 1 è meno variabile, perché quasi tutti hanno lo stesso valore.
            - paragraph [ref=e3258]: Il secondo elemento è la numerosità del campione. A parità di proporzione, un risultato osservato su 1000 persone è più stabile di un risultato osservato su 40 persone. Il campione grande non elimina l’incertezza, ma la riduce.
            - generic [ref=e3259]:
              - heading "Formula tradotta" [level=4] [ref=e3260]
              - generic [ref=e3261]: ES(p) = √[p(1 - p) / n]
              - list [ref=e3262]:
                - listitem [ref=e3263]: "ES(p): errore standard della proporzione osservata"
                - listitem [ref=e3264]: "p: proporzione osservata nel campione"
                - listitem [ref=e3265]: "1 - p: quota complementare, cioè chi non presenta l’evento"
                - listitem [ref=e3266]: "p(1 - p): variabilità dell’esito sì/no"
                - listitem [ref=e3267]: "n: numero totale di persone osservate"
              - paragraph [ref=e3268]:
                - strong [ref=e3269]: "Esempio:"
                - text: Se p = 0,42 e n = 200, ES(p) = √[0,42 × 0,58 / 200] = 0,0349.
          - generic [ref=e3270]:
            - heading "Intervallo di confidenza di una proporzione" [level=3] [ref=e3271]
            - paragraph [ref=e3272]: Una proporzione osservata da sola è un punto. Dire 42% descrive il campione, ma non mostra quanto sia precisa la stima. L’intervallo di confidenza aggiunge una fascia di incertezza attorno alla proporzione osservata.
            - paragraph [ref=e3273]: "La domanda è: quali valori della proporzione vera sono plausibili, alla luce del campione osservato? Se l’intervallo è stretto, la stima è precisa. Se l’intervallo è largo, resta molta incertezza."
            - paragraph [ref=e3274]: Per costruire un intervallo al 95% con approssimazione normale si parte dalla proporzione osservata, poi si aggiunge e si sottrae circa 1,96 errori standard. Il 95% non significa che il 95% dei pazienti ha l’evento; significa che il metodo produce una fascia di valori plausibili per la proporzione vera.
            - paragraph [ref=e3275]: Se in 200 soggetti 84 presentano l’esito, p = 0,42. L’errore standard è circa 0,0349. Il margine è 1,96 × 0,0349 = 0,068. L’IC95% è quindi circa 0,352-0,488, cioè 35,2%-48,8%.
            - generic [ref=e3276]:
              - heading "Formula tradotta" [level=4] [ref=e3277]
              - generic [ref=e3278]: IC95% della proporzione = p ± 1,96 × √[p(1 - p) / n]
              - list [ref=e3279]:
                - listitem [ref=e3280]: "p: proporzione osservata"
                - listitem [ref=e3281]: "1,96: valore critico usato per un intervallo al 95% con approssimazione normale"
                - listitem [ref=e3282]: "√[p(1 - p) / n]: errore standard della proporzione"
                - listitem [ref=e3283]: "±: costruisce un limite inferiore e un limite superiore"
              - paragraph [ref=e3284]:
                - strong [ref=e3285]: "Esempio:"
                - text: Con p = 0,42 e n = 200, l’IC95% è circa 0,352-0,488.
          - generic [ref=e3286]:
            - 'heading "Esempio glaucoma: valore osservato e valore di riferimento" [level=3] [ref=e3287]'
            - paragraph [ref=e3288]: Negli Stati Uniti una tecnica chirurgica per il glaucoma ha successo nel 90% dei casi. In Italia, in un campione di 100 pazienti, si osservano 15 insuccessi. Quindi i successi sono 85 e la proporzione osservata italiana è p = 85/100 = 0,85 = 85%.
            - paragraph [ref=e3289]: La differenza osservata rispetto al valore americano è 85% - 90% = -5 punti percentuali. Il campione italiano sembra quindi avere una quota di successi più bassa.
            - paragraph [ref=e3290]: "Il punto non è chiedersi se 85% e 90% siano numeri identici: non lo sono. Il punto è chiedersi se una differenza osservata di 5 punti percentuali possa essere spiegata dalla normale oscillazione di un campione di 100 persone."
            - paragraph [ref=e3291]: L’IC95% per la proporzione italiana è circa 78%-92%. Il valore americano 90% cade dentro questo intervallo. Quindi, con questi dati, una proporzione vera italiana pari al 90% resta compatibile con il campione osservato.
            - paragraph [ref=e3292]: "La conclusione corretta è prudente: il campione italiano ha una stima puntuale più bassa, ma l’intervallo è abbastanza ampio da includere 90%. Questi dati non bastano per affermare che la proporzione italiana sia diversa da quella americana."
          - generic [ref=e3293]:
            - 'heading "Test z per una proporzione: confronto con un valore dichiarato" [level=3] [ref=e3294]'
            - paragraph [ref=e3295]: "A volte una proporzione osservata viene confrontata con un valore dichiarato. Per esempio: un produttore dichiara che un test ha sensibilità 95%, ma nel campione osservato la sensibilità è 93,8%. I due numeri non sono identici, ma questo da solo non basta per dire che il valore dichiarato sia falso."
            - paragraph [ref=e3296]:
              - text: "La domanda corretta è: la distanza tra 93,8% e 95% è grande rispetto all’oscillazione che ci aspettiamo da un campione? Il"
              - strong [ref=e3297]: test z per una proporzione
              - text: traduce questa domanda in un numero standardizzato.
            - paragraph [ref=e3298]: La logica è la stessa già vista con z-score e test di ipotesi. Prima scrivo H0, per esempio π = 0,95. Poi calcolo quanto la proporzione osservata p si allontana da quel valore. Infine divido questa distanza per l’errore standard atteso sotto H0. Se la distanza è piccola rispetto all’incertezza, non c’è evidenza sufficiente per rifiutare H0.
            - paragraph [ref=e3299]: La frase finale non deve essere più forte dei dati. Se il test non è significativo, non significa che il valore dichiarato sia certamente vero; significa che il campione non fornisce evidenza sufficiente per metterlo in dubbio al livello scelto.
            - generic [ref=e3300]:
              - heading "Formula tradotta" [level=4] [ref=e3301]
              - generic [ref=e3302]: z = (p - π0) / √[π0(1 - π0) / n]
              - list [ref=e3303]:
