            - heading "Più gruppi e dati poco adatti alla media" [level=3] [ref=e4186]
            - paragraph [ref=e4187]: Quando i gruppi indipendenti sono più di due, una scelta pensata per due gruppi non basta. Se tre protocolli analgesici vengono confrontati su un punteggio di dolore, la domanda generale è se i gruppi si comportano in modo diverso nel complesso, non quale singola coppia differisce per prima.
            - paragraph [ref=e4188]:
