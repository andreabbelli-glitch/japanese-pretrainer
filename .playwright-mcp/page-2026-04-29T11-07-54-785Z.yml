          - generic [ref=e4646]:
            - heading "p-value, IC e valore nullo" [level=3] [ref=e4647]
            - paragraph [ref=e4648]: Il p-value si legge sempre rispetto a H0. Dice quanto sarebbe insolito osservare dati almeno così estremi sotto H0 e se valessero le assunzioni del test. Non dice la probabilità che H0 sia vera, non misura la dimensione dell’effetto e non sostituisce il giudizio clinico.
            - paragraph [ref=e4649]: "Se p < 0,05, secondo la regola convenzionale al 5% si rifiuta H0. Se p >= 0,05, non si rifiuta H0. Nel secondo caso non si trasforma il risultato in una prova di assenza di effetto: si dice che i dati non forniscono evidenza statistica sufficiente per rifiutare H0."
            - paragraph [ref=e4650]: L’intervallo di confidenza permette una lettura più ricca perché mostra una gamma di valori compatibili con i dati. Per una differenza, il valore nullo è 0. Per rapporti come RR o OR, il valore nullo è 1. Questo serve a leggere se il rapporto è compatibile con assenza di differenza.
