            - heading "Test di ipotesi, H0, H1, alfa e p-value" [level=2] [ref=e2485]
            - paragraph [ref=e2486]:
              - strong [ref=e2487]: "Perché serve:"
              - text: Serve quando un campione mostra una differenza e bisogna capire se quella differenza è abbastanza forte da mettere in crisi l’idea di assenza di effetto nella popolazione.
            - generic [ref=e2488]:
              - strong [ref=e2489]: Ponte logico.
              - text: L’intervallo di confidenza ha mostrato una stima insieme alla sua incertezza. Il test di ipotesi usa la stessa idea di incertezza per prendere una decisione rispetto a un punto di partenza prudente.
            - generic [ref=e2490]:
              - paragraph [ref=e2491]:
                - strong [ref=e2492]: Situazione di partenza.
                - text: Uno studio confronta due trattamenti per la pressione. Nel campione, il trattamento A riduce la pressione di 8 mmHg e il trattamento B di 5 mmHg. La differenza osservata è 3 mmHg. Prima di dire che A funziona meglio nella popolazione, bisogna chiedersi se una differenza così potrebbe comparire anche per oscillazione casuale.
              - paragraph [ref=e2493]:
