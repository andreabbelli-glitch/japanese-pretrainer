          - generic [ref=e4753]:
            - heading "Mini-tracce per allenare la sequenza" [level=3] [ref=e4754]
            - paragraph [ref=e4755]: Una mini-traccia serve a esercitare lo stesso ordine mentale senza perdersi nella lunghezza di un articolo. Prima si riconosce il problema, poi si fa il passaggio minimo, poi si scrive la frase.
            - paragraph [ref=e4756]: "Descrivere un campione: in 120 pazienti, 72 sono donne e l’età media è 64 anni con DS 11. Il sesso è qualitativo: 72/120 = 60%. L’età è quantitativa: media 64 anni, DS 11. Frase: nel campione, il 60% sono donne; l’età media è 64 anni con variabilità di circa 11 anni misurata dalla DS."
            - paragraph [ref=e4757]: "Leggere un VPP: in una tabella diagnostica, 48 veri positivi e 20 falsi positivi. La domanda “tra i positivi, quanti sono davvero malati?” indica VPP: 48/(48+20)=70,6%. Frase: tra i soggetti con test positivo, circa il 71% è realmente malato secondo il riferimento clinico."
            - paragraph [ref=e4758]: "Commentare un risultato non significativo: differenza media -0,8, IC95% da -1,9 a 0,3, p=0,12. L’IC contiene 0 e p è maggiore di 0,05. Frase: nel campione la direzione osservata è favorevole, ma i dati non dimostrano una riduzione statisticamente significativa al 5%; non si può concludere che il trattamento non abbia alcun effetto."
            - paragraph [ref=e4759]: "Decidere un chi-quadrato 2x3: se χ²=0,65 con 2 gradi di libertà e la soglia al 5% è 5,99, 0,65 è minore di 5,99. Frase: non si rifiuta H0 di indipendenza; i dati non forniscono evidenza statistica sufficiente di associazione tra le variabili."
          - generic [ref=e4760]:
            - heading "Simulazione su articolo ostetrico" [level=3] [ref=e4761]
            - paragraph [ref=e4762]: "Il caso finale mette insieme tutto. Lo studio confronta induzione elettiva del travaglio a 39 settimane e gestione di attesa in nullipare a basso rischio. La domanda clinica è: nelle nullipare a basso rischio a 39 settimane, l’induzione elettiva migliora gli esiti neonatali rispetto alla gestione di attesa?"
            - paragraph [ref=e4763]: "La Tabella 1 descrive le caratteristiche basali. Età materna, BMI, fumo, anamnesi familiare e pressione sistolica iniziale sono simili tra i gruppi. Questa tabella non dimostra efficacia: serve a controllare che il confronto parta da gruppi ragionevolmente bilanciati."
            - paragraph [ref=e4764]: "La Tabella 2 riporta gli esiti. In alcuni outcome compare RR, cioè rischio relativo. Poiché il RR è già riportato dall’articolo, qui non bisogna ricalcolarlo: bisogna leggerlo correttamente. RR = 1 indica assenza di differenza; RR sotto 1 indica rischio più basso nel gruppo al numeratore; RR sopra 1 indica rischio più alto."
            - paragraph [ref=e4765]: "Morbilità neonatale composita: 3,7% con induzione e 5,2% con attesa, RR 0,71, IC95% 0,39-1,28, p=0,25. La direzione osservata suggerisce una possibile riduzione, ma l’intervallo include 1 e p è maggiore di 0,05. Lo studio non dimostra una riduzione statisticamente significativa dell’outcome primario."
            - paragraph [ref=e4766]: "Taglio cesareo: 18,9% con induzione e 23,4% con attesa. La differenza assoluta è 23,4% - 18,9% = 4,5 punti percentuali a favore dell’induzione. Il RR è 0,81 con IC95% 0,63-1,04 e p=0,09. Riduzione possibile, ma non dimostrata statisticamente al 5%."
            - paragraph [ref=e4767]: "Parto vaginale entro 24 ore: RR 1,69, IC95% 1,47-1,95, p<0,001. Il risultato è statisticamente significativo e indica maggiore probabilità nel gruppo induzione. Tachisistolia uterina: RR 2,40, IC95% 1,52-3,79, p<0,001. Anche questo è statisticamente significativo, ma rappresenta uno svantaggio dell’induzione. Soddisfazione materna alta: RR 1,13, IC95% 1,05-1,21, p=0,001, con maggiore frequenza nel gruppo induzione."
            - paragraph [ref=e4768]: "Conclusione complessiva: nelle nullipare selezionate a basso rischio, l’induzione elettiva a 39 settimane non ha dimostrato una riduzione statisticamente significativa della morbilità neonatale composita né del taglio cesareo. È associata a una maggiore probabilità di parto vaginale entro 24 ore e a maggiore soddisfazione materna, ma anche a un aumento della tachisistolia uterina. La decisione clinica deve bilanciare possibili vantaggi, possibili svantaggi, preferenze materne e contesto assistenziale."
          - generic [ref=e4769]:
            - heading "Checklist finale prima di consegnare" [level=3] [ref=e4770]
            - paragraph [ref=e4771]: "Prima di chiudere una risposta, conviene controllare pochi punti. Ho scritto che tipo di dato sto usando? Ho scelto il denominatore corretto? Ho distinto differenza e rapporto? Ho guardato il valore nullo giusto: 0 per differenze, 1 per rapporti? Ho evitato di trasformare il non rifiuto in prova di assenza di effetto?"
            - paragraph [ref=e4772]: Serve anche un controllo clinico. Ho distinto significatività statistica e importanza clinica? Ho evitato di trasformare associazione in causalità? Ho separato outcome primario e secondari quando leggo un articolo? Ho scritto una conclusione proporzionata all’incertezza?
            - paragraph [ref=e4773]: All’esame il commento vale quanto il calcolo. Un numero senza interpretazione resta incompleto; un’interpretazione senza denominatore corretto diventa fragile. La risposta migliore mostra entrambi.
