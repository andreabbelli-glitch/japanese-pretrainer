                - text: Con α = 0,05, p = 0,02 porta a rifiutare H0; p = 0,18 porta a non rifiutare H0.
          - generic [ref=e2584]:
            - heading "Perché si misura la distanza in errori standard" [level=3] [ref=e2585]
            - paragraph [ref=e2586]: Quando confrontiamo una media osservata con un valore previsto da H0, la distanza grezza non basta. Una differenza di 4 mmHg può essere enorme se le medie campionarie oscillano pochissimo, oppure modesta se oscillano molto.
            - paragraph [ref=e2587]: Per questo la distanza viene messa in rapporto con l’errore standard. L’errore standard descrive quanto ci aspettiamo che una media campionaria cambi da un campione all’altro. Una stessa distanza ha quindi un significato diverso a seconda dell’incertezza con cui è stata stimata.
            - paragraph [ref=e2588]: "Il rapporto “distanza diviso errore standard” risponde a una domanda semplice: quante oscillazioni tipiche separano il dato osservato dal valore previsto da H0?"
            - paragraph [ref=e2589]: Se il rapporto è vicino a 0, il dato osservato è vicino a H0 rispetto all’incertezza del campione. Se il rapporto è molto lontano da 0, il dato è difficile da spiegare come semplice oscillazione casuale sotto H0.
          - generic [ref=e2590]:
            - heading "La t di Student" [level=3] [ref=e2591]
            - paragraph [ref=e2592]: Quando si confronta una media campionaria con un valore ipotizzato e la deviazione standard della popolazione non è nota, si usa la deviazione standard del campione. In questo caso la distanza standardizzata prende il nome di t di Student.
            - paragraph [ref=e2593]: "La t di Student mette al numeratore la distanza tra media osservata e valore sotto H0. Al denominatore mette l’errore standard. In parole: misura quanto è lontana la media osservata, usando come unità di misura l’oscillazione attesa della media campionaria."
            - paragraph [ref=e2594]: Una t vicina a 0 indica che la media osservata è vicina al valore di H0 rispetto all’incertezza. Una t molto grande in valore assoluto indica che la media osservata è molto lontana dal valore di H0 rispetto all’incertezza attesa.
            - paragraph [ref=e2595]: "Il segno indica la direzione: una t negativa significa che la media osservata è sotto il valore ipotizzato; una t positiva significa che è sopra. La grandezza in valore assoluto indica quanto la distanza è marcata."
            - paragraph [ref=e2596]: "Una volta calcolata la t, la si legge nella distribuzione attesa sotto H0: da questo confronto deriva il p-value. Per questo la t non è la conclusione finale, ma il ponte tra la distanza osservata e la decisione statistica."
            - generic [ref=e2597]:
              - heading "Formula tradotta" [level=4] [ref=e2598]
              - generic [ref=e2599]: t = (media osservata - valore sotto H0) / errore standard
              - list [ref=e2600]:
                - listitem [ref=e2601]: "media osservata: il valore calcolato nel campione"
                - listitem [ref=e2602]: "valore sotto H0: il valore che H0 attribuisce alla popolazione"
                - listitem [ref=e2603]: "errore standard: l’oscillazione attesa della media campionaria"
                - listitem [ref=e2604]: "t: distanza dal valore di H0 espressa in errori standard"
              - paragraph [ref=e2605]:
                - strong [ref=e2606]: "Esempio:"
                - text: Se la distanza è -0,73 e l’errore standard è 0,035, allora t = -0,73 / 0,035, cioè circa -21.
          - generic [ref=e2607]:
            - 'heading "Esempio: numero medio di figli per famiglia" [level=3] [ref=e2608]'
            - paragraph [ref=e2609]: In un campione di 1000 famiglie italiane, la media osservata è 1,37 figli per famiglia. Il valore di riferimento è 2,10. La deviazione standard nel campione è 1,10.
            - paragraph [ref=e2610]: "La domanda non è se 1,37 sia diverso da 2,10: nel campione lo è. La domanda è se una media campionaria così bassa sarebbe plausibile se la vera media della popolazione fosse ancora 2,10."
            - paragraph [ref=e2611]: "H0 dice: nella popolazione italiana la media vera è 2,10. Se la domanda è direzionale, H1 dice: nella popolazione italiana la media vera è inferiore a 2,10."
            - paragraph [ref=e2612]: La distanza osservata è 1,37 - 2,10 = -0,73. L’errore standard è 1,10 diviso la radice quadrata di 1000, cioè circa 0,035. La distanza standardizzata è quindi circa -21 errori standard.
            - paragraph [ref=e2613]: Una distanza di questa grandezza sarebbe estremamente rara sotto H0. Il p-value sarebbe molto piccolo. Con α = 0,05 si rifiuta H0.
            - paragraph [ref=e2614]: "La conclusione corretta è: i dati forniscono evidenza statistica contro l’ipotesi che la media vera sia 2,10; sono compatibili con una media italiana inferiore. La stima e l’intervallo di confidenza servono poi a capire anche di quanto potrebbe essere inferiore."
          - generic [ref=e2615]:
            - heading "Non significativo non vuol dire uguale" [level=3] [ref=e2616]
            - paragraph [ref=e2617]: "Uno studio confronta un nuovo antibiotico con la terapia standard. La guarigione è 84% con il nuovo trattamento e 80% con lo standard. Il p-value è 0,18. La tentazione è dire: non c’è differenza. Ma questa frase è troppo forte."
            - paragraph [ref=e2618]: Con α = 0,05, p = 0,18 significa che i dati non sono abbastanza incompatibili con H0. Non significa che i due antibiotici abbiano la stessa efficacia vera. Il campione potrebbe essere troppo piccolo o troppo variabile per distinguere una differenza reale moderata dall’oscillazione casuale.
            - paragraph [ref=e2619]: "La frase corretta è: in questo studio non c’è evidenza statistica sufficiente per concludere una differenza tra i trattamenti al livello scelto. Se l’intervallo di confidenza è ampio, il risultato può essere compatibile sia con una differenza clinicamente utile sia con una differenza piccola o nulla."
            - paragraph [ref=e2620]: Per dimostrare che due trattamenti sono equivalenti o non inferiori non basta ottenere p ≥ 0,05 in un test tradizionale. Servono una domanda specifica, un margine clinico accettabile e un metodo disegnato per quel tipo di conclusione.
          - generic [ref=e2621]:
            - 'heading "Esempio completo: farmaco per la pressione" [level=3] [ref=e2622]'
            - paragraph [ref=e2623]: Uno studio randomizzato confronta un nuovo farmaco antipertensivo con placebo. L’esito è la riduzione della pressione sistolica dopo otto settimane. Prima di analizzare i dati, i ricercatori fissano α = 0,05 e scelgono un test a due code, perché vogliono rilevare sia un miglioramento sia un possibile peggioramento rispetto al placebo.
            - paragraph [ref=e2624]: Nel campione, la riduzione media è 9 mmHg con il nuovo farmaco e 5 mmHg con placebo. La differenza osservata è 4 mmHg a favore del farmaco. H0 dice che nella popolazione la differenza vera è 0 mmHg. H1 dice che la differenza vera non è 0 mmHg.
            - paragraph [ref=e2625]: "Il test produce p = 0,01. La lettura corretta è: se la differenza vera fosse 0, osservare una differenza almeno così estrema sarebbe raro. Poiché 0,01 < 0,05, si rifiuta H0."
            - paragraph [ref=e2626]: "La conclusione statistica è: i dati forniscono evidenza di una differenza tra nuovo farmaco e placebo nella riduzione media della pressione. La conclusione clinica richiede un passaggio in più: valutare se 4 mmHg siano rilevanti per i pazienti, quanto sia precisa la stima e quale sia il profilo degli eventi avversi."
