            - paragraph [ref=e605]:
              - strong [ref=e606]: "Perché serve:"
              - text: "Prima di fidarsi di un risultato bisogna chiedersi come è stato prodotto: chi è stato studiato, come sono stati scelti o formati i gruppi, quali errori potevano entrare."
