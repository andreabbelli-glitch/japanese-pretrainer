          - generic [ref=e419]:
            - heading "Che cosa potrebbe influenzare che cosa" [level=3] [ref=e420]
            - paragraph [ref=e421]: "Molti studi medici partono da una domanda semplice: una caratteristica, un comportamento o un trattamento è collegato a un evento di salute? Per esempio: il fumo in gravidanza è collegato al parto pretermine? Un farmaco riduce la pressione? L’età materna è collegata a una complicanza?"
            - paragraph [ref=e422]: "La prima cosa da trovare è l’evento che voglio osservare. Nell’esempio sul fumo, l’evento è il parto pretermine. Questo evento si chiama esito: è ciò che voglio spiegare, confrontare o prevedere."
            - paragraph [ref=e423]: La seconda cosa da trovare è il fattore che potrebbe essere collegato all’esito. Nell’esempio, il fumo in gravidanza è il possibile fattore collegato al parto pretermine. Questo fattore si chiama determinante; spesso, se è qualcosa a cui la persona è esposta, si chiama anche esposizione.
            - paragraph [ref=e424]: "La stessa idea può essere scritta con le parole variabile indipendente e variabile dipendente. La variabile indipendente è il possibile determinante; la variabile dipendente è l’esito osservato. Il nome non deve trarre in inganno: dire “indipendente” non dimostra una causa. Significa solo che, nella domanda dello studio, quella variabile viene usata come possibile spiegazione o confronto."
            - paragraph [ref=e425]: "Prima di scegliere un test statistico bisogna saper scrivere una frase di questo tipo: sto valutando se il determinante X è associato all’esito Y. Se questa frase non è chiara, il test può essere tecnicamente corretto ma rispondere alla domanda sbagliata."
