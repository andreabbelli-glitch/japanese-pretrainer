          - generic [ref=e1407]:
            - heading "La prevalenza cambia il significato dei positivi" [level=3] [ref=e1408]
            - paragraph [ref=e1409]: La prevalenza è la quota di persone malate nel gruppo in cui il test viene usato. Prima di conoscere il risultato del test, dice quanto la malattia è frequente in quella popolazione.
            - paragraph [ref=e1410]: "La prevalenza non appartiene a un singolo paziente. Appartiene al gruppo clinico di riferimento: persone con certi sintomi, persone inviate a uno specialista, popolazione generale invitata a uno screening, persone ad alto rischio."
            - paragraph [ref=e1411]: Quando la malattia è rara, i sani sono molti più dei malati. Anche se la percentuale di falsi positivi tra i sani è piccola, quel piccolo errore applicato a un gruppo molto grande può produrre molti falsi positivi.
            - paragraph [ref=e1412]: "Per questo il VPP può scendere molto in uno screening di massa. Il test non è diventato tecnicamente peggiore: sono cambiati il numero di malati disponibili per generare veri positivi e il numero di sani disponibili per generare falsi positivi."
            - paragraph [ref=e1413]: Il VPN spesso si comporta nel verso opposto. Quando la malattia è rara, un risultato negativo è molto spesso un vero negativo, perché la maggior parte delle persone era sana già prima del test.
            - generic [ref=e1414]:
              - heading "Formula tradotta" [level=4] [ref=e1415]
              - generic [ref=e1416]: prevalenza = malati presenti nel gruppo / totale del gruppo
              - list [ref=e1417]:
