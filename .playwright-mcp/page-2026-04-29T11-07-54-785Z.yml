          - generic [ref=e3509]:
            - heading "Dalla statistica alla frase clinica" [level=3] [ref=e3510]
            - paragraph [ref=e3511]: "Una buona conclusione sui confronti tra proporzioni contiene tre livelli. Il primo è la direzione: l’evento è più frequente o meno frequente nel gruppo al numeratore? Il secondo è la grandezza: quanti punti percentuali, oppure quante volte? Il terzo è l’incertezza: l’intervallo contiene il valore nullo o il p-value supera la soglia scelta?"
            - paragraph [ref=e3512]: "Nell’esempio delle cinture, la frase completa è: nel campione, la mortalità è circa 4,5% senza cintura e 1,2% con cintura. La differenza assoluta è circa 3,3 punti percentuali. Il rischio relativo è circa 3,7: il rischio senza cintura è circa 3,7 volte quello con cintura. L’OR è circa 3,9: le odds di decesso sono circa 3,9 volte più alte senza cintura."
            - paragraph [ref=e3513]: Queste misure non dicono la stessa cosa. La differenza assoluta dice quanti eventi in più si osservano ogni 100 persone. Il RR dice quante volte cambia il rischio. L’OR confronta eventi e non eventi. Se le confondo, la frase clinica diventa imprecisa anche quando il calcolo è numericamente corretto.
