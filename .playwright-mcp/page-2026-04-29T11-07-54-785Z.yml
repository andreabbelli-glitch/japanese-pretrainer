          - generic [ref=e1941]:
            - heading "Distanza grezza e z-score" [level=3] [ref=e1942]
            - paragraph [ref=e1943]: Una distanza grezza dalla media non basta per interpretare un valore. Dire che una persona è 6 cm sopra la media può sembrare molto o poco a seconda della variabilità della popolazione. Se i valori sono molto concentrati, 6 cm possono essere una distanza importante. Se i valori sono molto dispersi, possono essere una differenza modesta.
            - paragraph [ref=e1944]:
              - text: Lo
              - strong [ref=e1945]: z-score
              - text: "nasce per rispondere a questa domanda: questo valore è lontano dalla media rispetto alla variabilità normale della popolazione?"
            - paragraph [ref=e1946]: "Il calcolo fa due passaggi. Prima sottraggo la media al valore osservato: così ottengo la distanza grezza dal centro. Poi divido per la deviazione standard: così trasformo quella distanza in numero di deviazioni standard."
            - paragraph [ref=e1947]: Il risultato non è più espresso in centimetri, chilogrammi o mmHg. È espresso in unità standard. Questo permette di confrontare valori misurati con unità diverse e di leggerli sulla stessa curva normale.
            - generic [ref=e1948]:
              - heading "Formula tradotta" [level=4] [ref=e1949]
              - generic [ref=e1950]: z = (x - μ) / σ
              - list [ref=e1951]:
                - listitem [ref=e1952]: "x: valore osservato nella persona o nell’osservazione che sto valutando"
                - listitem [ref=e1953]: "μ: media della popolazione o del riferimento clinico"
                - listitem [ref=e1954]: "σ: deviazione standard della popolazione o del riferimento"
                - listitem [ref=e1955]: "x - μ: distanza grezza del valore dalla media"
                - listitem [ref=e1956]: "divisione per σ: trasformo la distanza grezza in numero di deviazioni standard"
              - paragraph [ref=e1957]:
                - strong [ref=e1958]: "Esempio:"
                - text: Se x = 176 cm, μ = 170 cm e σ = 9,5 cm, allora z = (176 - 170) / 9,5 = 6/9,5 = 0,63. Il valore è 0,63 deviazioni standard sopra la media.
          - generic [ref=e1959]:
            - heading "Leggere segno e grandezza dello z-score" [level=3] [ref=e1960]
            - paragraph [ref=e1961]: Lo z-score contiene due informazioni. Il segno dice da che parte della media si trova il valore. Se z è positivo, il valore è sopra la media. Se z è negativo, il valore è sotto la media. Se z è vicino a zero, il valore è vicino alla media.
            - paragraph [ref=e1962]: "La grandezza dello z-score dice quanto il valore è lontano. Uno z-score di 0,5 indica una distanza di mezza deviazione standard: è un valore ancora vicino al centro. Uno z-score di 2 indica una distanza di circa due deviazioni standard: è un valore più periferico. Uno z-score di 3 indica una distanza molto grande, nella parte estrema della distribuzione."
            - paragraph [ref=e1963]: La regola 68-95-99,7 aiuta a leggere questi numeri senza partire da una tavola. Tra z = -1 e z = +1 cade circa il 68% dei valori. Tra z = -2 e z = +2 cade circa il 95%. Oltre questi limiti restano le code, cioè le parti meno frequenti della distribuzione.
            - paragraph [ref=e1964]: "Per questo uno z-score non va letto come etichetta automatica di normalità o malattia. Va letto come posizione rispetto a un riferimento: quanto è distante questo valore dal comportamento atteso della popolazione?"
          - generic [ref=e1965]:
            - 'heading "Area sotto la curva: quota di persone" [level=3] [ref=e1966]'
            - paragraph [ref=e1967]: Nella distribuzione normale, l’area sotto la curva rappresenta la quota dei valori. Tutta l’area sotto la curva vale 1, cioè il 100% delle osservazioni. Una parte dell’area corrisponde quindi a una percentuale della popolazione di riferimento.
            - paragraph [ref=e1968]: Se la domanda è “quante persone hanno un valore fino a 176 cm?”, serve l’area a sinistra di 176. Se la domanda è “quante persone hanno un valore superiore a 176 cm?”, serve l’area a destra di 176. Se la domanda è “quante persone stanno tra due valori?”, serve l’area compresa tra quei due punti.
            - paragraph [ref=e1969]: "Con media 170 cm e deviazione standard 9,5 cm, il valore 176 cm ha z = 0,63. Usando una tavola o un calcolatore della normale, l’area fino a z = 0,63 è circa 0,736, cioè 73,6%. L’area sopra quel valore è il complemento: 100% - 73,6% = 26,4%."
            - paragraph [ref=e1970]: Il passaggio decisivo è scegliere l’area coerente con la domanda clinica. Prima si decide se interessa la parte a sinistra, la parte a destra o una fascia centrale; poi si usa la tavola o il calcolatore.
          - generic [ref=e1971]:
            - 'heading "Percentili: posizione dentro la distribuzione" [level=3] [ref=e1972]'
            - paragraph [ref=e1973]:
              - text: Un
              - strong [ref=e1974]: percentile
              - text: "è una lettura cumulativa: dice quale percentuale della popolazione di riferimento ha un valore minore o uguale a quello osservato. Se un valore è al 75° percentile, circa il 75% dei valori sta fino a quel punto e circa il 25% sta sopra."
            - paragraph [ref=e1975]: Il percentile e l’area a sinistra raccontano la stessa idea con parole diverse. Dire che 176 cm corrisponde a un’area cumulativa di 73,6% significa dire che quel valore è circa al 74° percentile.
            - paragraph [ref=e1976]: Il percentile descrive la posizione rispetto a una popolazione di riferimento. Da solo non è una diagnosi. Un percentile alto o basso può essere normale o clinicamente rilevante a seconda dell’età, del sesso quando rilevante, del contesto, dell’andamento nel tempo e della domanda clinica.
            - paragraph [ref=e1977]: "La frase corretta separa la posizione dalla conclusione clinica: “questo valore è sopra circa il 74% della popolazione di riferimento” non è la stessa cosa di “questo valore indica una malattia”."
