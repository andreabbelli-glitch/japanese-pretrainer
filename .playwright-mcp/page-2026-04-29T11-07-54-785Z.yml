            - paragraph [ref=e1363]: La quota di negativi che sono davvero sani si chiama valore predittivo negativo, spesso abbreviato VPN. Questa è la domanda utile quando un risultato negativo viene usato per rassicurare o per escludere una condizione.
            - paragraph [ref=e1364]: "Un VPN alto significa che, in quella popolazione, un negativo è molto spesso un vero negativo. Non significa però che il test non perda mai malati: i falsi negativi sono proprio la cella C."
