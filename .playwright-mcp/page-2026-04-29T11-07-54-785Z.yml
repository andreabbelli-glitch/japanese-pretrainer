            - heading "La domanda prima del test" [level=3] [ref=e2777]
            - paragraph [ref=e2778]: Il chi-quadrato si usa quando i dati sono conteggi dentro categorie. Una variabile può essere il tipo di terapia, con categorie “farmaco A” e “farmaco B”. Un’altra variabile può essere l’esito, con categorie “guarito” e “non guarito”. Ogni paziente finisce in una cella della tabella.
