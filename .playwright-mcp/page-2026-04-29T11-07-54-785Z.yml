          - generic [ref=e3786]:
            - heading "Intervallo di confidenza e p-value sono collegati" [level=3] [ref=e3787]
            - paragraph [ref=e3788]: L’intervallo di confidenza descrive una zona di valori compatibili con i dati, secondo il metodo usato. Nell’esempio Budesonide, l’IC95% va da -1,9 a -0,5 cm. Tutto l’intervallo è sotto 0.
            - paragraph [ref=e3789]: Poiché il valore nullo per una differenza media è 0, e 0 non è dentro l’intervallo, al livello convenzionale del 5% si rifiuta H0. La stessa decisione è coerente con p = 0,001, che è minore di 0,05.
            - paragraph [ref=e3790]: "Il p-value risponde a una domanda precisa: se nella popolazione non ci fosse davvero alcuna differenza tra Budesonide e placebo, quanto sarebbe raro osservare nei dati una differenza almeno così estrema? Con p = 0,001, un risultato così estremo sarebbe molto raro sotto H0 e sotto le assunzioni del test."
            - paragraph [ref=e3791]: Questa frase contiene anche ciò che non si deve dire. p = 0,001 non significa che H0 abbia probabilità 0,1% di essere vera. Non significa che il trattamento funzioni con probabilità 99,9%. Non significa che la potenza dello studio sia 0,1%. Il p-value parla dei dati assumendo H0, non della probabilità che H0 sia vera dopo aver visto i dati.
            - generic [ref=e3792]:
              - heading "Formula tradotta" [level=4] [ref=e3793]
              - generic [ref=e3794]: se il valore nullo non è nell’IC95%, di solito p < 0,05
              - list [ref=e3795]:
                - listitem [ref=e3796]: "valore nullo: il valore che rappresenta assenza di effetto"
                - listitem [ref=e3797]: "IC95% che non contiene il valore nullo: i dati non sono compatibili con assenza di effetto al livello usuale del 5%"
                - listitem [ref=e3798]: "p < 0,05: risultato statisticamente significativo secondo la soglia convenzionale"
              - paragraph [ref=e3799]:
                - strong [ref=e3800]: "Esempio:"
                - text: Per Budesonide-placebo l’IC95% è da -1,9 a -0,5. Poiché 0 non è incluso, la differenza è statisticamente significativa; p = 0,001 conferma la stessa decisione.
          - generic [ref=e3801]:
            - heading "Significativo non significa automaticamente importante" [level=3] [ref=e3802]
            - paragraph [ref=e3803]: Dopo aver stabilito che un risultato è statisticamente significativo, resta la domanda clinica. Una differenza media di -1,2 cm è abbastanza grande da modificare il giudizio sul trattamento, il bilancio beneficio-rischio o il colloquio con la paziente?
            - paragraph [ref=e3804]: La significatività statistica riguarda la forza del segnale nei dati rispetto all’ipotesi di assenza di effetto. La rilevanza clinica riguarda la grandezza dell’effetto e le sue conseguenze pratiche.
            - paragraph [ref=e3805]: Un effetto molto piccolo può diventare statisticamente significativo se il campione è enorme, perché l’incertezza si riduce. Questo non lo rende automaticamente utile. Un effetto può essere misurato con precisione e rimanere troppo piccolo per cambiare una decisione.
            - paragraph [ref=e3806]: Vale anche il contrario. Uno studio piccolo può osservare una differenza grande e potenzialmente importante, ma non raggiungere la significatività statistica perché l’incertezza è ampia. In quel caso la frase corretta non è “i trattamenti sono uguali”. La frase corretta è che i dati non bastano per escludere l’assenza di effetto, e che servono ampiezza dell’effetto, intervallo di confidenza e valutazione della potenza.
