          - generic [ref=e3852]:
            - heading "Non significativo non significa uguale" [level=3] [ref=e3853]
            - paragraph [ref=e3854]: "Quando p ≥ 0,05, la conclusione tecnica è che non si rifiuta H0 al livello scelto. Questa frase può sembrare debole, ma è precisa: dice esattamente quello che i dati permettono di dire, senza aggiungere una certezza che non c’è."
            - paragraph [ref=e3855]: Non rifiutare H0 non significa dimostrare che H0 sia vera. In uno studio di confronto, non significa che i due trattamenti siano uguali. Significa che i dati non forniscono evidenza statistica sufficiente per dichiarare una differenza secondo la soglia scelta.
            - paragraph [ref=e3856]: La differenza è importante. Se uno studio è piccolo e trova p = 0,18, potrebbe non aver avuto abbastanza informazioni per rilevare una differenza reale. L’assenza di significatività può dipendere dall’assenza di effetto, ma può anche dipendere da scarsa potenza, alta variabilità, pochi eventi o misura imprecisa dell’esito.
            - paragraph [ref=e3857]: "L’intervallo di confidenza aiuta a distinguere due situazioni. Se l’intervallo è stretto, tutto vicino a un effetto nullo o molto piccolo, e resta entro differenze clinicamente trascurabili, il risultato non significativo può essere abbastanza rassicurante. Se l’intervallo è largo, il risultato non significativo è meno informativo: i dati possono essere compatibili con effetti utili, effetti nulli e talvolta effetti dannosi."
