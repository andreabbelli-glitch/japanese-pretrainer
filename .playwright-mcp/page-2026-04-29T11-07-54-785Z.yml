          - generic [ref=e478]:
            - 'heading "Percentili: posizione, non diagnosi" [level=3] [ref=e479]'
            - paragraph [ref=e480]: "Un percentile serve a dire dove si colloca un valore rispetto a un gruppo di riferimento. Parte da una fila ordinata, non da una formula: se ordino molti neonati dal peso più basso al peso più alto, posso chiedere in che punto della fila si trova un certo neonato."
            - paragraph [ref=e481]: "Il 50° percentile è la posizione centrale: circa metà dei valori sta sotto e circa metà sta sopra. Per questo coincide con l’idea di mediana."
            - paragraph [ref=e482]: Il 75° percentile significa che circa il 75% dei valori del gruppo di riferimento è uguale o inferiore a quel valore, mentre circa il 25% è superiore. Se un neonato è al 75° percentile di peso per età gestazionale, non significa che pesi il 75% del normale. Significa che, rispetto alle tabelle usate come riferimento, si colloca sopra circa tre quarti dei neonati.
            - paragraph [ref=e483]: Il 25° percentile significa che circa il 25% dei valori è uguale o inferiore e circa il 75% è superiore. Anche qui non è una diagnosi automatica. È un’informazione di posizione, da leggere insieme al contesto clinico, alla crescita nel tempo, all’età gestazionale, alle condizioni materne e agli altri dati disponibili.
            - paragraph [ref=e484]: La stessa logica vale fuori dalla pediatria. Se un tempo di attivazione di 8 ore è il 95° percentile, significa che circa il 95% delle attivazioni avviene entro 8 ore e circa il 5% richiede più tempo. Il percentile trasforma una lista ordinata in una frase di posizione.
            - generic [ref=e485]:
