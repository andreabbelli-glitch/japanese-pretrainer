              - list [ref=e2495]:
                - listitem [ref=e2496]: Come distinguo la differenza osservata nel campione dalla differenza vera nella popolazione?
                - listitem [ref=e2497]: Che cosa dicono H0 e H1 in un confronto clinico?
                - listitem [ref=e2498]: Che cosa significa davvero il p-value?
