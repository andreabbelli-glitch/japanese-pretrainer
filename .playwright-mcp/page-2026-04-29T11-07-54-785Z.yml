              - strong [ref=e4189]: ANOVA
              - text: "indica un test usato per confrontare medie in più di due gruppi. Non serve studiarne il calcolo: basta riconoscere che nasce quando l’esito è quantitativo e i gruppi indipendenti sono più di due."
