          - generic [ref=e3158]:
            - heading "Quando l’esito è sì/no" [level=3] [ref=e3159]
            - paragraph [ref=e3160]: Molti risultati medici non sono misure continue come pressione, peso o glicemia. Sono eventi che possono accadere oppure no. Un intervento chirurgico può riuscire oppure fallire. Un paziente può sviluppare una complicanza oppure no. Dopo un incidente una persona può sopravvivere oppure morire.
            - paragraph [ref=e3161]: "In questi casi il primo dato è un conteggio: quante persone hanno avuto l’evento? Ma il conteggio da solo non basta. 15 eventi su 100 pazienti non hanno lo stesso significato di 15 eventi su 1000 pazienti."
            - paragraph [ref=e3162]: "La proporzione nasce da una domanda concreta: quale parte del gruppo ha presentato l’evento? Se 85 pazienti su 100 hanno successo dopo un intervento, la proporzione osservata di successi è 85/100 = 0,85. In percentuale, è 85%."
            - paragraph [ref=e3163]: La percentuale rende il numero più leggibile, ma non cambia il contenuto. Una proporzione di 0,85, una percentuale di 85% e la frase “85 persone ogni 100” raccontano la stessa quota.
