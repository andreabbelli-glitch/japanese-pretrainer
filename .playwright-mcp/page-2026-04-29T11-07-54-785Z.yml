          - generic [ref=e3759]:
            - 'heading "Valore nullo: il punto che significa nessun effetto" [level=3] [ref=e3760]'
            - paragraph [ref=e3761]: Per capire una tabella bisogna sapere quale valore rappresenta l’assenza di differenza o di associazione. Quel valore si chiama valore nullo.
            - paragraph [ref=e3762]: Per una differenza media, una differenza tra proporzioni o una riduzione assoluta del rischio, il valore nullo è 0. Se la differenza è 0, i due gruppi hanno lo stesso valore medio, la stessa proporzione o lo stesso rischio assoluto.
            - paragraph [ref=e3763]: Per un rapporto, come rischio relativo o odds ratio, il valore nullo è 1. Un rapporto uguale a 1 significa che i due gruppi sono uguali rispetto alla misura confrontata.
            - paragraph [ref=e3764]: Questa distinzione evita un errore frequente. Non si controlla sempre se l’intervallo contiene 0. Si controlla il valore nullo corretto per la misura riportata.
