          - generic [ref=e3424]:
            - 'heading "Odds e odds ratio: eventi contro non eventi" [level=3] [ref=e3425]'
            - paragraph [ref=e3426]:
              - text: "Il rischio parte da tutto il gruppo: eventi divisi per totale. Le"
              - strong [ref=e3427]: odds
              - text: "fanno una domanda diversa: quanti eventi ci sono rispetto ai non eventi? Per questo non sono una percentuale e non vanno lette come se fossero un rischio."
            - paragraph [ref=e3428]: "Nel gruppo senza cintura ci sono 13 decessi e 277 non decessi. Le odds di decesso sono quindi 13/277. Nel gruppo con cintura ci sono 3 decessi e 247 non decessi: le odds sono 3/247."
            - paragraph [ref=e3429]:
              - text: L’
              - strong [ref=e3430]: odds ratio
              - text: ", abbreviato"
              - strong [ref=e3431]: OR
              - text: ", confronta queste due odds. Con i dati delle cinture: OR = (13/277) / (3/247) = 3,86 circa. La frase corretta è: nel campione, le odds di decesso sono circa 3,9 volte più alte nel gruppo senza cintura rispetto al gruppo con cintura."
            - paragraph [ref=e3432]: OR = 1 significa stesse odds nei due gruppi. OR > 1 significa odds maggiori nel gruppo al numeratore. OR < 1 significa odds minori nel gruppo al numeratore.
            - paragraph [ref=e3433]: Quando l’evento è raro, OR e RR possono essere numericamente simili, come nell’esempio delle cinture. Quando l’evento è comune, possono divergere molto. Per questo l’OR non va tradotto automaticamente come “rischio relativo”. Negli studi caso-controllo l’OR è frequente perché il disegno parte da casi e controlli, quindi spesso non permette di stimare direttamente un rischio nello stesso modo di una coorte.
