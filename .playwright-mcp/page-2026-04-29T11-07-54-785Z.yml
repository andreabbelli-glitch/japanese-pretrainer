          - generic [ref=e624]:
            - heading "Perché il disegno viene prima dei calcoli" [level=3] [ref=e625]
            - paragraph [ref=e626]: Due studi possono arrivare allo stesso numero finale, per esempio una differenza del 10% tra due gruppi. Quel numero, però, non ha lo stesso significato se i gruppi sono stati costruiti bene oppure male. Prima di chiedersi quanto sia grande una differenza, bisogna chiedersi da dove viene.
            - paragraph [ref=e627]: Il disegno dello studio stabilisce la domanda a cui i dati possono rispondere. Se voglio sapere se un trattamento produce un effetto, devo controllare come sono stati assegnati i pazienti ai trattamenti. Se voglio sapere quanto è frequente una condizione in una popolazione, devo controllare come sono state scelte le persone da osservare.
            - paragraph [ref=e628]: "I calcoli lavorano sui dati disponibili. Non possono trasformare un campione poco rappresentativo in un campione rappresentativo, né rendere confrontabili due gruppi che erano diversi già all’inizio per motivi importanti. Per questo il disegno viene prima: decide quali conclusioni sono plausibili e quali sarebbero troppo forti."
          - generic [ref=e629]:
            - heading "Studio sperimentale e studio osservazionale" [level=3] [ref=e630]
            - paragraph [ref=e631]:
              - text: "La prima domanda è: chi decide l’esposizione o il trattamento? Se il ricercatore assegna attivamente un trattamento, lo studio è"
              - strong [ref=e632]: sperimentale
              - text: . Per esempio, pazienti eleggibili vengono assegnati a un nuovo farmaco oppure al trattamento standard.
            - paragraph [ref=e633]:
              - text: Se invece il ricercatore osserva ciò che è già accaduto o ciò che accade senza intervenire sull’assegnazione, lo studio è
              - strong [ref=e634]: osservazionale
              - text: . Per esempio, si confrontano fumatori e non fumatori, persone già trattate e non trattate, oppure pazienti seguiti in reparti diversi.
            - paragraph [ref=e635]: La differenza è decisiva perché nei gruppi osservazionali l’esposizione non arriva per caso. Chi fuma può differire da chi non fuma per età, condizioni sociali, altre abitudini e storia clinica. Chi riceve un trattamento nella pratica clinica può essere più grave, più seguito o più fragile di chi non lo riceve.
            - paragraph [ref=e636]: Uno studio osservazionale può essere molto utile, soprattutto quando non è etico o non è possibile assegnare l’esposizione. Però richiede più cautela quando si interpreta una differenza tra gruppi, perché la differenza finale potrebbe dipendere dall’esposizione, da caratteristiche iniziali diverse o da entrambe le cose.
