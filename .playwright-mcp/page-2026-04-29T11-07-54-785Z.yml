          - generic [ref=e4460]:
            - 'heading "Denominatore: parte, totale e diagnostica" [level=3] [ref=e4461]'
            - paragraph [ref=e4462]: "Una percentuale risponde alla domanda: quanta parte di un totale presenta una caratteristica? La formula è breve, ma la scelta del totale è il passaggio decisivo. Se 36 pazienti su 120 hanno una complicanza, la percentuale è 36/120 x 100 = 30%. Il denominatore è 120 perché la domanda riguarda tutti i pazienti osservati."
            - paragraph [ref=e4463]: In diagnostica il denominatore cambia con il punto di partenza della domanda. Se si chiede se il test riconosce i malati, si parte dai malati. Se si chiede se un positivo è credibile, si parte dai positivi al test. Le celle della tabella sono le stesse, ma il significato clinico cambia.
            - paragraph [ref=e4464]: "Sensibilità e specificità partono dalla condizione reale: malati o sani. Valore predittivo positivo e valore predittivo negativo partono dal risultato del test: positivo o negativo. Questo spiega perché un test può avere buona sensibilità e, in una popolazione con malattia rara, un VPP non altrettanto alto."
            - paragraph [ref=e4465]: Una frase diagnostica deve dichiarare il denominatore. “Il VPP è 36%” è meno chiaro di “tra i soggetti con test positivo, il 36% è davvero malato nel campione osservato”.
