          - generic [ref=e4521]:
            - heading "Quando la variabile è una misura" [level=3] [ref=e4522]
            - paragraph [ref=e4523]: Quando la traccia riguarda pressione, glicemia, altezza, peso, durata del ricovero o punteggio di dolore, ogni soggetto porta un valore numerico. La media descrive il centro dei valori osservati. La deviazione standard descrive quanto i valori individuali sono dispersi intorno alla media.
            - paragraph [ref=e4524]: "L’errore standard ha un altro ruolo: non descrive la variabilità dei singoli pazienti, ma l’incertezza della media campionaria come stima della media nella popolazione. A parità di variabilità individuale, un campione più grande rende la media stimata più precisa."
            - paragraph [ref=e4525]: "L’intervallo di confidenza traduce questa incertezza in una gamma di valori plausibili per il parametro, secondo il metodo usato. Se una differenza media ha IC95% da -1,9 a -0,5, l’intervallo è tutto sotto 0. Per una differenza, 0 è il valore di assenza di effetto: il risultato è statisticamente significativo al 5% e la direzione è negativa."
            - paragraph [ref=e4526]: Se invece un IC95% per una differenza va da -0,9 a 0,5, contiene 0. I dati sono compatibili sia con una piccola riduzione sia con un piccolo aumento. La frase corretta non è “non c’è differenza”, ma “non emerge una differenza statisticamente significativa al livello del 5%”.
          - generic [ref=e4527]:
            - heading "Descrivere, stimare, confrontare" [level=3] [ref=e4528]
            - paragraph [ref=e4529]: "La scelta dello strumento dipende dallo scopo. Se la domanda è descrittiva, il risultato riguarda il campione osservato: frequenze e percentuali per variabili qualitative, media e deviazione standard per variabili quantitative abbastanza simmetriche, mediana e intervallo interquartile per distribuzioni asimmetriche."
            - paragraph [ref=e4530]: Se la domanda è di stima, il numero del campione viene usato per dire qualcosa sulla popolazione. In questo caso l’intervallo di confidenza è spesso più informativo del singolo numero, perché mostra l’incertezza della stima.
            - paragraph [ref=e4531]: Se la domanda è di confronto, bisogna capire che cosa viene confrontato. Due proporzioni richiedono strumenti per frequenze o proporzioni. Due medie richiedono strumenti per variabili quantitative. Due variabili qualitative in una tabella richiedono un ragionamento su indipendenza o associazione.
            - paragraph [ref=e4532]: "Un indizio da solo non basta. “Due gruppi” non significa automaticamente t test: se l’esito è sì/no, il problema riguarda proporzioni; se l’esito è una misura numerica, può riguardare medie; se le misure sono prima e dopo nella stessa persona, la struttura è appaiata."
