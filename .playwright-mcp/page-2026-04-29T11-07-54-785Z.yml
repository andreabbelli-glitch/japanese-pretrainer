        - article [ref=e4395]:
          - generic [ref=e4396]:
            - generic [ref=e4397]:
              - generic [ref=e4398]: "Pagine: copertura riepilogativa PDF 1-49"
              - generic [ref=e4399]: Capitolo 14
            - 'heading "Prepararsi all’esame: dal dato alla frase finale" [level=2] [ref=e4400]'
            - paragraph [ref=e4401]:
              - strong [ref=e4402]: "Perché serve:"
              - text: "L’ultimo passo è allenarsi a trasformare una traccia in una risposta completa: riconoscere il dato, scegliere lo strumento, fare il calcolo minimo e scrivere una conclusione prudente."
            - generic [ref=e4403]:
              - strong [ref=e4404]: Ponte logico.
              - text: Dopo avere studiato percentuali, descrittiva, diagnostica, test, chi-quadrato, intervalli e lettura critica, qui si impara a usarli insieme davanti a una traccia d’esame.
            - generic [ref=e4405]:
              - paragraph [ref=e4406]:
                - strong [ref=e4407]: Situazione di partenza.
                - text: Una risposta d’esame non è completa quando contiene solo un numero. È completa quando mostra perché quel numero risponde alla domanda giusta e quale conclusione si può scrivere senza esagerare.
              - paragraph [ref=e4408]:
                - strong [ref=e4409]: "Dopo questo capitolo saprai rispondere a:"
              - list [ref=e4410]:
                - listitem [ref=e4411]: Come smonto una traccia prima di scegliere una formula?
                - listitem [ref=e4412]: Come riconosco il denominatore corretto in percentuali e test diagnostici?
                - listitem [ref=e4413]: Come collego p-value, intervallo di confidenza e valore nullo nella frase finale?
                - listitem [ref=e4414]: Come leggo un articolo distinguendo risultati statisticamente supportati, incerti e clinicamente rilevanti?
              - paragraph [ref=e4415]:
                - strong [ref=e4416]: Percorso.
                - text: prima lettura della traccia -> denominatore -> strumento statistico -> formulario ragionato -> simulazione articolo -> frase finale
              - paragraph [ref=e4417]:
                - strong [ref=e4418]: Frase da saper scrivere.
                - text: La conclusione migliore separa risultato osservato, incertezza statistica e significato clinico.
          - generic [ref=e4419]:
            - heading "Che cosa rende completa una risposta" [level=3] [ref=e4420]
            - paragraph [ref=e4421]: "In sede d’esame il rischio più comune non è dimenticare una formula. È usare una formula corretta per una domanda sbagliata. Una traccia può contenere percentuali, medie, p-value, intervalli di confidenza e tabelle, ma la risposta nasce sempre da una scelta iniziale: capire che tipo di problema si ha davanti."
            - paragraph [ref=e4422]: "Una buona risposta ha quattro parti. Prima identifica il dato: variabile qualitativa o quantitativa, un gruppo o più gruppi, tabella 2x2, media, proporzione, p-value o intervallo. Poi identifica la domanda: descrivere, stimare, confrontare, valutare un test diagnostico, leggere un’associazione o commentare un articolo. Poi sceglie il calcolo o il test coerente. Infine traduce il risultato in una frase prudente."
            - paragraph [ref=e4423]: La frase finale non è decorazione. È la parte che dimostra se il calcolo è stato capito. Scrivere p = 0,18 non basta. Una risposta completa dice che, con questi dati, non c’è evidenza statistica sufficiente per rifiutare H0 al livello scelto; non dice che i gruppi sono certamente uguali.
            - paragraph [ref=e4424]: La conclusione migliore non è la più forte. È quella che dice esattamente quanto i dati permettono di dire.
          - generic [ref=e4425]:
            - heading "Prima lettura della traccia" [level=3] [ref=e4426]
            - paragraph [ref=e4427]: "La prima lettura non serve a calcolare. Serve a mettere ordine. Bisogna cercare l’unità osservata, cioè che cosa rappresenta ogni riga ideale dei dati: una donna, un neonato, una visita, un episodio clinico, un test o un reparto."
            - paragraph [ref=e4428]: "Poi si cerca l’esito principale. Se la traccia dice che due reparti registrano se è stata eseguita episiotomia, l’esito è episiotomia sì/no. Se dice che si misura la pressione sistolica prima e dopo un trattamento, l’esito è la pressione sistolica. Se presenta una tabella test positivo/negativo e malattia presente/assente, l’esito dipende dalla domanda: riconoscere i malati, riconoscere i sani, interpretare un positivo o interpretare un negativo."
            - paragraph [ref=e4429]: Dopo l’esito si cerca la struttura. Due gruppi indipendenti non sono uguali a due misure nella stessa persona. Due colonne di numeri possono essere due gruppi diversi, oppure prima e dopo nello stesso soggetto. Nel primo caso si confrontano gruppi; nel secondo si guarda il cambiamento individuale.
            - paragraph [ref=e4430]: "Infine si cerca il denominatore. In una percentuale il denominatore è il gruppo a cui si riferisce la domanda. In una misura diagnostica il denominatore cambia: malati per la sensibilità, sani per la specificità, positivi al test per il VPP, negativi al test per il VPN."
