          - generic [ref=e2137]:
            - heading "Stimare significa usare un campione per parlare di una popolazione" [level=3] [ref=e2138]
            - paragraph [ref=e2139]:
              - text: "In uno studio medico quasi mai osserviamo tutte le persone a cui vorremmo riferirci. Misuriamo un gruppo limitato: per esempio 80 pazienti trattati in un reparto, 120 persone arruolate in uno studio, 35 bambini seguiti per una terapia. Questo gruppo osservato è il"
              - strong [ref=e2140]: campione
              - text: .
            - paragraph [ref=e2141]:
              - text: "La domanda di solito riguarda un gruppo più grande del campione: tutti i pazienti simili, tutti i candidati a quel trattamento, tutti i bambini con quella condizione. Questo gruppo più grande è la"
              - strong [ref=e2142]: popolazione
              - text: di riferimento.
            - paragraph [ref=e2143]: Stimare significa usare il numero visto nel campione come indizio del valore nella popolazione. Se in 80 pazienti la pressione media è 132 mmHg, quel 132 non è automaticamente la media vera di tutti i pazienti simili. È la media osservata nel campione, usata per stimare la media della popolazione.
            - paragraph [ref=e2144]: "La stima è necessaria perché il campione è parziale. Proprio perché è parziale, porta con sé incertezza: un altro campione, scelto dalla stessa popolazione, avrebbe potuto dare una media un po’ diversa."
            - generic [ref=e2145]:
