            - paragraph [ref=e1054]: "La mediana risponde a un’altra domanda: dopo aver ordinato i valori, dove cade l’osservazione centrale? Non distribuisce il totale tra tutti. Cerca il punto che lascia metà delle osservazioni da una parte e metà dall’altra."
            - paragraph [ref=e1055]: "Con le degenze 2, 3, 3, 4 e 8 giorni, il valore centrale è il terzo: 3 giorni. La mediana dice che almeno metà delle osservazioni è non superiore a 3 giorni e almeno metà è non inferiore a 3 giorni; con cinque osservazioni ordinate, il valore centrale è il terzo."
            - paragraph [ref=e1056]: Se le degenze diventano 2, 3, 3, 4 e 30 giorni, la mediana resta 3. La media invece diventa 8,4 giorni, perché il paziente con 30 giorni aggiunge molti giorni al totale. Il dato estremo è importante clinicamente, ma non rappresenta il paziente tipico.
            - paragraph [ref=e1057]: Media e mediana quindi non sono due modi equivalenti per dire la stessa cosa. La media racconta il bilancio complessivo della quantità osservata; la mediana racconta la posizione del soggetto centrale. Quando i dati sono simmetrici possono essere vicine. Quando ci sono outlier o distribuzioni asimmetriche, possono raccontare storie molto diverse.
