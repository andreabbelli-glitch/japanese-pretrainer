            - paragraph [ref=e3009]: Un esercizio sul chi-quadrato si risolve con una sequenza ordinata. Prima si verifica che le variabili siano qualitative e che la tabella contenga conteggi. Poi si leggono osservati, totali di riga, totali di colonna e totale generale.
            - paragraph [ref=e3010]: "Il passaggio successivo è costruire gli attesi: per ogni cella si usa totale riga × totale colonna / totale generale. Gli attesi rappresentano la tabella prevista se le due variabili fossero indipendenti."
