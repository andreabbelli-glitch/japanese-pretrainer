            - paragraph [ref=e150]: Il punto delicato è scegliere il totale giusto. Se sto parlando della mortalità tra chi non usa la cintura, il denominatore deve essere il gruppo senza cintura. Se cambio denominatore, cambio anche la frase clinica che sto pronunciando.
