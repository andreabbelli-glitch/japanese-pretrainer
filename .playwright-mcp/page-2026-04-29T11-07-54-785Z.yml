            - heading "Percentuali e denominatori" [level=3] [ref=e147]
            - paragraph [ref=e148]: "Una percentuale è una frazione riscritta su base 100. Se dico 25%, sto dicendo 25 su 100. Questa forma serve perché rende confrontabili gruppi di dimensioni diverse: 10 eventi su 20 e 50 eventi su 100 sono entrambi 50%, anche se i conteggi grezzi sono diversi."
