          - generic [ref=e3213]:
            - 'heading "Prevalenza e incidenza: casi presenti e casi nuovi" [level=3] [ref=e3214]'
            - paragraph [ref=e3215]: Quando si parla di eventi clinici bisogna chiarire anche il tempo. Alcune domande fotografano una situazione in un gruppo; altre seguono un gruppo nel tempo e contano quanti nuovi eventi compaiono.
            - paragraph [ref=e3216]:
              - text: La
              - strong [ref=e3217]: prevalenza
              - text: "risponde alla domanda: quante persone hanno già la condizione nel gruppo che sto osservando? È una fotografia. Se in 1000 persone sottoposte a screening 20 hanno già la malattia, la prevalenza è 20/1000 = 2%."
            - paragraph [ref=e3218]:
              - text: L’
              - strong [ref=e3219]: incidenza
              - text: "risponde a una domanda diversa: quante persone sviluppano un nuovo evento durante un periodo di osservazione? È un film. Se seguo 500 donne senza diabete gestazionale all’inizio della gravidanza e 35 sviluppano diabete gestazionale durante il follow-up, l’incidenza cumulativa nel periodo è 35/500 = 7%."
            - paragraph [ref=e3220]: "Il denominatore dell’incidenza deve contenere persone che potevano sviluppare l’evento. Se una persona ha già la condizione all’inizio, non può essere contata tra chi “sviluppa un nuovo caso” della stessa condizione. Questa è la differenza pratica: la prevalenza conta casi presenti; l’incidenza conta casi nuovi in un tempo definito."
