            - paragraph [ref=e1327]: La quota di sani che il test riesce a riconoscere come negativi si chiama specificità. Una specificità alta significa che, tra i sani, pochi vengono disturbati da un risultato positivo falso.
            - paragraph [ref=e1328]: "La frase clinica è: tra 100 persone davvero sane, circa quella percentuale risulta negativa al test. Non dice ancora che cosa significhi un positivo in una singola persona: quella sarà un’altra domanda."
