          - generic [ref=e4583]:
            - 'heading "Chi-quadrato: il calcolo da saper raccontare" [level=3] [ref=e4584]'
            - paragraph [ref=e4585]: "Il chi-quadrato compare spesso perché obbliga a fare tutto il percorso: leggere una tabella, calcolare gli attesi, confrontare osservato e atteso, scegliere i gradi di libertà, prendere una decisione e scrivere una frase corretta."
            - paragraph [ref=e4586]: "La domanda tipica è: la distribuzione delle frequenze è compatibile con l’ipotesi che le due variabili siano indipendenti? L’ipotesi nulla afferma che non c’è associazione tra le variabili. Se la tabella osservata è molto diversa da quella attesa sotto indipendenza, il valore di chi-quadrato cresce."
            - paragraph [ref=e4587]: "Esempio: in due reparti si osserva se è stata eseguita episiotomia. Nel reparto A ci sono 36 sì e 84 no; nel reparto B 20 sì e 100 no. I totali sono 56 sì, 184 no, 120 donne per reparto e 240 donne in totale."
            - paragraph [ref=e4588]: "L’atteso di una cella si calcola così: totale di riga x totale di colonna / totale generale. Per la cella “Reparto A, episiotomia sì”, l’atteso è 120 x 56 / 240 = 28. Se reparto ed episiotomia fossero indipendenti, in quella cella ci si aspetterebbero 28 episiotomie, non 36."
            - paragraph [ref=e4589]: Il valore del test somma, per ogni cella, (osservato - atteso)^2 / atteso. In questa tabella la somma è circa 5,96. I gradi di libertà di una tabella 2x2 sono (2 - 1)(2 - 1) = 1. Alla soglia del 5%, il valore critico con 1 grado di libertà è circa 3,84. Poiché 5,98 è maggiore di 3,84, si rifiuta H0 di indipendenza.
            - paragraph [ref=e4590]: "La frase corretta è: nel campione osservato l’episiotomia è più frequente nel reparto A; il test chi-quadrato fornisce evidenza statistica di associazione tra reparto ed episiotomia al livello del 5%. La frase scorretta è: il reparto A causa più episiotomie. Il chi-quadrato mostra associazione, non causalità."
