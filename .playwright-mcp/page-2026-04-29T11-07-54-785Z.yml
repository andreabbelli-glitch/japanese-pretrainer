          - generic [ref=e1115]:
            - heading "Come leggere una tabella descrittiva" [level=3] [ref=e1116]
            - paragraph [ref=e1117]: "La prima tabella di un articolo descrive chi è stato studiato. Prima di discutere risultati o confronti, bisogna capire il campione: età, sesso o genere quando rilevante, condizioni cliniche, gravità, trattamenti, misure iniziali."
            - paragraph [ref=e1118]: "La scrittura n (%) indica un conteggio e la sua percentuale: per esempio 72 (60%) vuol dire 72 persone, pari al 60% del gruppo. Questa forma è adatta a variabili qualitative o a conteggi raggruppati."
            - paragraph [ref=e1119]: La scrittura media (DS) indica una media accompagnata dalla deviazione standard. È adatta quando i valori numerici sono abbastanza simmetrici. La scrittura mediana [IQR] indica la mediana e l’intervallo interquartile, spesso usati quando la distribuzione è asimmetrica o contiene outlier.
            - paragraph [ref=e1120]: "La lettura corretta non è meccanica. Per ogni riga bisogna chiedersi: questa variabile è una categoria, un conteggio o una misura? Il riassunto usato risponde alla domanda giusta? Ci sono valori estremi che rendono la media poco rappresentativa del soggetto tipico?"
