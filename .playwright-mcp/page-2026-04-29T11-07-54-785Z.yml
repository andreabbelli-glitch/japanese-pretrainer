          - generic [ref=e658]:
            - 'heading "Randomizzazione: che cosa protegge" [level=3] [ref=e659]'
            - paragraph [ref=e660]: Immaginiamo di voler confrontare due trattamenti. Se il medico assegna il trattamento nuovo ai pazienti meno gravi e il trattamento standard ai pazienti più gravi, alla fine i gruppi non sono confrontabili. Anche se il trattamento nuovo sembra migliore, non sappiamo se il merito sia del trattamento o del fatto che i suoi pazienti partivano avvantaggiati.
            - paragraph [ref=e661]:
              - text: La
              - strong [ref=e662]: randomizzazione
              - text: nasce per evitare questo problema. I soggetti già inclusi nello studio vengono assegnati ai gruppi con una procedura casuale, per esempio un sorteggio o un algoritmo. In questo modo la gravità, l’età, le abitudini e molte altre caratteristiche non vengono usate per decidere chi riceve un trattamento e chi riceve l’altro.
            - paragraph [ref=e663]: La protezione principale riguarda il confronto interno tra gruppi. Se l’assegnazione è davvero casuale, non c’è una regola clinica o umana che spinge sistematicamente i pazienti più facili in un gruppo e quelli più difficili nell’altro. Le caratteristiche note e non note tendono a distribuirsi senza una direzione voluta.
            - paragraph [ref=e664]: La randomizzazione non rende i gruppi identici. In campioni piccoli possono restare squilibri anche importanti per puro caso. Però impedisce che lo squilibrio sia prodotto deliberatamente dal medico, dal ricercatore o dalla gravità clinica.
          - generic [ref=e665]:
            - 'heading "Randomizzazione: che cosa non protegge" [level=3] [ref=e666]'
            - paragraph [ref=e667]:
              - text: Randomizzare non significa scegliere a caso le persone dalla popolazione. Il
              - strong [ref=e668]: campionamento
              - text: riguarda chi entra nello studio; la randomizzazione riguarda come vengono assegnate ai gruppi le persone già entrate. Sono due passaggi diversi e rispondono a domande diverse.
            - paragraph [ref=e669]: Se uno studio include solo pazienti di un singolo ospedale, la randomizzazione può rendere confrontabili i gruppi dentro quello studio. Non garantisce però che quei pazienti rappresentino tutti i pazienti della regione, del Paese o di contesti clinici diversi.
            - paragraph [ref=e670]: La randomizzazione non corregge una misura sbagliata. Se tutti i pazienti vengono pesati con una bilancia tarata male, l’errore resta. Non corregge nemmeno perdite durante il periodo di osservazione, cioè pazienti che escono dallo studio prima della misura dell’esito, soprattutto se queste perdite sono molto diverse tra gruppi. Restano problemi anche se i pazienti seguono il trattamento in modo diverso tra i gruppi, o se chi valuta l’esito è influenzato dal sapere quale trattamento è stato ricevuto.
            - paragraph [ref=e671]: "Uno studio randomizzato non va letto come automaticamente perfetto. La domanda corretta è più precisa: la randomizzazione rende credibile il confronto iniziale tra gruppi? Poi bisogna ancora controllare rappresentatività, qualità delle misure, completezza dei dati e gestione dello studio."
