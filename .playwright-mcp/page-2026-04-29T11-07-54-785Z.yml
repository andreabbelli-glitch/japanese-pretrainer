          - generic [ref=e689]:
            - 'heading "Campione di convenienza: utile ma fragile" [level=3] [ref=e690]'
            - paragraph [ref=e691]:
              - text: Un
              - strong [ref=e692]: campione di convenienza
              - text: "è formato dai soggetti più facili da raggiungere: pazienti del proprio reparto, persone disponibili, cartelle già accessibili, volontari reclutati in un luogo comodo. La convenienza descrive il modo in cui il campione è stato ottenuto, non dice automaticamente che lo studio sia inutile."
            - paragraph [ref=e693]: Questo tipo di campione può essere utile per descrivere un contesto locale, controllare se una procedura è fattibile, raccogliere dati preliminari o osservare un problema poco studiato. In molti casi è il primo passo realistico, soprattutto quando tempo, costi e accesso ai dati sono limitati.
            - paragraph [ref=e694]: La fragilità nasce quando dal gruppo comodo si vuole parlare di una popolazione più ampia. Un reparto può avere pazienti più gravi della media; i volontari possono essere più motivati o più sani; chi risponde a un questionario può differire da chi non risponde. Il risultato può essere vero nel campione osservato ma non nella popolazione a cui vorremmo applicarlo.
            - paragraph [ref=e695]: "La domanda pratica è: quali persone avrei voluto rappresentare e quali persone ho davvero osservato? Più queste due immagini si allontanano, più la generalizzazione diventa fragile."
          - generic [ref=e696]:
            - heading "Modi diversi di scegliere il campione" [level=3] [ref=e697]
            - paragraph [ref=e698]: "Quando l’obiettivo è descrivere o stimare qualcosa in una popolazione, la scelta del campione diventa parte centrale del metodo. Non basta avere molti soggetti: bisogna capire se il modo in cui sono stati scelti tende a rappresentare bene la popolazione di interesse."
