          - generic [ref=e4112]:
            - 'heading "Esito principale: che cosa sto misurando?" [level=3] [ref=e4113]'
            - paragraph [ref=e4114]: L’esito è la variabile su cui lo studio vuole dire qualcosa. Non coincide sempre con la variabile che divide i gruppi. Nella domanda “il peso neonatale medio è diverso tra madri con e senza diabete gestazionale?”, l’esito è il peso neonatale; il diabete gestazionale serve a dividere le madri in due gruppi.
            - paragraph [ref=e4115]: "Se invece la domanda è “la frequenza di diabete gestazionale è diversa tra donne obese e non obese?”, l’esito diventa diabete gestazionale sì/no. Le parole sono simili, ma il problema statistico cambia: prima si parlava di un peso, cioè di un numero; ora si parla di una presenza o assenza, cioè di una proporzione."
            - paragraph [ref=e4116]: "Un esito qualitativo descrive categorie. Episiotomia sì/no, infezione sì/no, parto spontaneo/operativo/cesareo, gruppo sanguigno e migliorato/invariato/peggiorato sono esempi di esiti qualitativi. Il riassunto naturale è un conteggio o una proporzione: quante persone entrano in ciascuna categoria?"
            - paragraph [ref=e4117]: "Un esito quantitativo è una misura numerica: peso neonatale, emoglobina, pressione sistolica, BMI, età gestazionale, glicemia, durata della degenza. Il riassunto naturale può essere media, mediana, variabilità o differenza tra valori."
            - paragraph [ref=e4118]: "Alcuni esiti sono ordinali: hanno categorie ordinate, ma le distanze tra categorie non sono necessariamente uguali. Dolore lieve, moderato e severo hanno un ordine, ma non è detto che il salto da lieve a moderato valga quanto il salto da moderato a severo. In questi casi bisogna essere prudenti quando si usa una media."
          - generic [ref=e4119]:
            - heading "Gruppi indipendenti o dati appaiati" [level=3] [ref=e4120]
            - paragraph [ref=e4121]: "Dopo avere identificato l’esito, bisogna guardare come sono organizzate le osservazioni. Due gruppi sono indipendenti quando ogni persona appartiene a un solo gruppo: reparto A oppure reparto B, madri con diabete gestazionale oppure senza diabete gestazionale, farmaco A oppure farmaco B."
            - paragraph [ref=e4122]: "I dati sono appaiati quando le osservazioni sono legate a coppie. Il caso più intuitivo è prima/dopo nella stessa persona: emoglobina prima della terapia e dopo la terapia. Anche occhio destro e occhio sinistro nello stesso individuo, o soggetti abbinati uno a uno per età e sesso, sono esempi di dati appaiati."
            - paragraph [ref=e4123]: Nei dati appaiati l’informazione centrale è il cambiamento o la differenza dentro la coppia. Se una donna passa da 9,8 a 11,2 g/dL di emoglobina, il dato più importante non è solo il valore prima o il valore dopo, ma l’aumento di 1,4 g/dL nella stessa donna.
            - paragraph [ref=e4124]: Confondere gruppi indipendenti e dati appaiati porta al test sbagliato. Due reparti diversi non sono un prima/dopo. La stessa donna misurata due volte non è equivalente a due donne diverse.
          - generic [ref=e4125]:
            - 'heading "Quando si contano eventi: proporzioni" [level=3] [ref=e4126]'
            - paragraph [ref=e4127]: "Se l’esito è qualitativo, il punto di partenza è una tabella di conteggi. Immaginiamo di confrontare la frequenza di episiotomia in due reparti. Ogni parto finisce in una delle due categorie: episiotomia sì oppure episiotomia no."
            - paragraph [ref=e4128]: "La domanda non riguarda una media. Riguarda la proporzione di eventi nei due reparti: nel reparto A quante donne hanno avuto episiotomia? Nel reparto B quante? La tabella 2x2 mette insieme evento sì/no e gruppo di appartenenza."
            - paragraph [ref=e4129]:
              - text: "Per due proporzioni in una tabella 2x2 possono comparire due nomi coerenti:"
              - strong [ref=e4130]: chi-quadrato
              - text: e
              - strong [ref=e4131]: test z per due proporzioni
              - text: . Il chi-quadrato legge la tabella come confronto tra osservati e attesi sotto indipendenza. Il test z legge direttamente la differenza tra le due proporzioni rispetto alla sua incertezza. Nel caso standard danno una decisione molto simile.
            - paragraph [ref=e4132]: "Se i conteggi sono molto piccoli, può comparire Fisher come cautela metodologica. Non è un calcolo da studiare qui: basta sapere che viene citato quando le frequenze attese rendono fragile l’approssimazione del chi-quadrato."
