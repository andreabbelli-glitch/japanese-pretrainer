                - listitem [ref=e3310]:
                  - strong [ref=e3311]: denominatore
                  - text: ": oscillazione attesa della proporzione se H0 fosse vera"
              - paragraph [ref=e3312]:
                - strong [ref=e3313]: "Esempio:"
                - text: Se p = 272/290 = 0,938 e π0 = 0,95, z = (0,938 - 0,95) / √[0,95 × 0,05 / 290] = -0,94 circa.
          - generic [ref=e3314]:
            - 'heading "Quando ci sono due gruppi: la tabella 2×2" [level=3] [ref=e3315]'
            - paragraph [ref=e3316]: "Molte domande cliniche confrontano due gruppi. Per esempio: la mortalità è diversa tra chi indossa la cintura di sicurezza e chi non la indossa? Qui non basta calcolare una sola proporzione; bisogna calcolarne due, una per ogni gruppo."
            - paragraph [ref=e3317]: "L’esempio delle cinture contiene due gruppi. Nel gruppo senza cintura muoiono 13 persone su 290. Nel gruppo con cintura muoiono 3 persone su 250. Prima di calcolare, conviene scrivere la tabella completa: eventi, non eventi e totale."
            - paragraph [ref=e3318]: "La prima colonna contiene gli eventi. La seconda contiene i non eventi. L’ultima colonna dice da quante persone si parte in ciascun gruppo. Per leggere un rischio, il denominatore è il totale della riga: tra quelli senza cintura, quanti sono morti? Tra quelli con cintura, quanti sono morti?"
            - paragraph [ref=e3319]: Questa lettura evita di confondere rischio e odds. Il rischio divide gli eventi per il totale del gruppo. Le odds, che vedremo dopo, dividono gli eventi per i non eventi.
