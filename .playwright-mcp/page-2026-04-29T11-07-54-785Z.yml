            - paragraph [ref=e2297]: "Per i rapporti il valore nullo non è 0 ma 1. Un rischio relativo pari a 1 significa stesso rischio nei due gruppi. Un odds ratio pari a 1 significa stesse odds nei due gruppi. Qui non serve calcolare questi rapporti: basta sapere che sono misure in cui 1 indica uguaglianza tra gruppi."
