          - generic [ref=e2568]:
            - 'heading "La decisione: rifiutare o non rifiutare H0" [level=3] [ref=e2569]'
            - paragraph [ref=e2570]: La decisione statistica nasce dal confronto tra due numeri con ruoli diversi. Alfa è la soglia scelta prima. Il p-value è il risultato calcolato dopo avere osservato i dati.
            - paragraph [ref=e2571]: "Se il p-value è minore di α, i dati superano la soglia di rarità fissata in anticipo: si rifiuta H0. In un confronto tra farmaco e placebo, questo significa che c’è evidenza statistica di una differenza, non che il farmaco sia automaticamente importante sul piano clinico."
            - paragraph [ref=e2572]: "Se il p-value è maggiore o uguale ad α, i dati non superano la soglia: non si rifiuta H0. La frase è volutamente prudente. Non significa che H0 sia vera, non significa che i trattamenti siano uguali e non significa che lo studio abbia dimostrato assenza di effetto."
            - paragraph [ref=e2573]: "Il test produce una decisione regolata: evidenza sufficiente contro H0, oppure evidenza insufficiente contro H0. La dimensione dell’effetto, la precisione della stima e il contesto clinico restano necessari per commentare il risultato in modo completo."
