          - generic [ref=e4307]:
            - heading "Frasi sicure ed errori da evitare" [level=3] [ref=e4308]
            - paragraph [ref=e4309]: "Una frase sicura per l’esame ha questa forma: l’esito è qualitativo o quantitativo; i dati sono indipendenti o appaiati; i gruppi sono due o più di due; la domanda riguarda proporzioni o medie; quindi il test plausibile è questo."
            - paragraph [ref=e4310]: "Esempio su episiotomia: l’esito è episiotomia sì/no, quindi qualitativo binario. I gruppi sono due reparti indipendenti. La domanda riguarda due proporzioni. È plausibile un chi-quadrato o un test z per due proporzioni; se i conteggi sono molto piccoli, si segnala cautela e può comparire Fisher senza doverlo calcolare."
            - paragraph [ref=e4311]: "Esempio su emoglobina: l’esito è emoglobina, quindi quantitativo. Le misure sono prima e dopo nelle stesse donne, quindi appaiate. La domanda riguarda il cambiamento individuale. È plausibile un t test appaiato se le differenze sono ragionevolmente adatte a un test su medie."
            - paragraph [ref=e4312]: "Esempio su tre protocolli analgesici: l’esito è un punteggio quantitativo e i gruppi sono più di due. ANOVA è il nome da riconoscere se si confrontano medie con condizioni ragionevoli; Kruskal-Wallis è il nome da riconoscere se il dato è molto asimmetrico o più ordinale."
