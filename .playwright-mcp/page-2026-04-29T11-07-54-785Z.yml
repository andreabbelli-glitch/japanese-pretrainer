              - paragraph [ref=e610]:
                - strong [ref=e611]: Situazione di partenza.
                - text: Due studi possono produrre lo stesso numero finale, ma avere forza molto diversa. Prima di interpretare una percentuale, una media o una differenza, bisogna capire come sono stati scelti i soggetti, come sono stati formati i gruppi e quali errori potevano entrare.
