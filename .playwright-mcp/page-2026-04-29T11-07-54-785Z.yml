            - paragraph [ref=e1012]: "Alcune variabili sono numeriche perché rispondono con un numero. Anche qui bisogna chiedersi che tipo di numero sia. Il numero di figli per famiglia è un conteggio: posso avere 0, 1, 2 o 3 figli, ma non 1,7 figli in una singola famiglia. Questo tipo di variabile è quantitativa discreta."
