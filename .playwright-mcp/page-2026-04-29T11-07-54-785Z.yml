            - paragraph [ref=e3739]: Consideriamo una riga semplificata di un articolo sul confronto tra Budesonide e placebo. L’esito è l’altezza adulta. La misura riportata è una differenza media tra i gruppi. Il risultato Budesonide-placebo è -1,2 cm, con IC95% da -1,9 a -0,5 e p = 0,001.
