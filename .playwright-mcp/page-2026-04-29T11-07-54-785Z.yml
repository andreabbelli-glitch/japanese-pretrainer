          - generic [ref=e3881]:
            - heading "Errore di tipo I e tipo II" [level=3] [ref=e3882]
            - paragraph [ref=e3883]: Ogni test confronta dati osservati e una regola di decisione. Poiché i dati sono campionari, la decisione può essere sbagliata.
            - paragraph [ref=e3884]: Il primo errore possibile è dichiarare un effetto quando nella popolazione l’effetto non esiste. È un falso allarme. Questo si chiama errore di tipo I. La probabilità accettata di questo errore, sotto H0, è indicata con alfa.
            - paragraph [ref=e3885]: Il secondo errore possibile è non riuscire a mostrare un effetto che nella popolazione esiste davvero. È un falso negativo. Questo si chiama errore di tipo II ed è indicato con beta.
            - paragraph [ref=e3886]: Nella lettura critica, l’errore di tipo II è particolarmente importante quando il risultato non è significativo. Uno studio piccolo, con dati molto variabili o con pochi eventi, può non avere abbastanza informazioni per distinguere un effetto reale dal rumore casuale.
