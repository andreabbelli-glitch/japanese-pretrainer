          - generic [ref=e2274]:
            - heading "Perché entra la t di Student" [level=3] [ref=e2275]
            - paragraph [ref=e2276]: La formula con 1,96 è comoda quando l’approssimazione normale è adeguata e la variabilità è conosciuta o stimata con buona stabilità. Nella pratica, però, spesso non conosciamo la vera deviazione standard della popolazione. Usiamo la deviazione standard del campione.
            - paragraph [ref=e2277]: "Questo aggiunge incertezza: il campione deve stimare sia la media sia la dispersione dei dati. Con pochi soggetti, la deviazione standard campionaria può essere poco stabile. Un campione piccolo può contenere per caso pazienti molto simili oppure molto diversi."
