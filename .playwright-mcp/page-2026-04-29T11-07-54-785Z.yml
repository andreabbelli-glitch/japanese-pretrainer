          - generic [ref=e734]:
            - heading "Bias ed errore casuale" [level=3] [ref=e735]
            - paragraph [ref=e736]: "Non tutti gli errori hanno la stessa natura. Alcuni sono oscillazioni imprevedibili: se ripeto lo studio, il risultato può venire un po’ più alto o un po’ più basso. Altri errori spingono sempre nella stessa direzione: il risultato tende a essere sistematicamente troppo alto, troppo basso o favorevole a un gruppo."
            - paragraph [ref=e737]:
              - text: L’
              - strong [ref=e738]: errore casuale
              - text: è rumore. Nasce dal fatto che osserviamo un campione e non tutta la popolazione, oppure dal fatto che le misure biologiche variano naturalmente. In un campione piccolo, poche osservazioni possono spostare molto il risultato. Aumentando il numero di osservazioni, molte oscillazioni opposte tendono a compensarsi e la stima diventa più stabile.
            - paragraph [ref=e739]:
              - text: Il
              - strong [ref=e740]: bias
              - text: "è uno spostamento sistematico. Può nascere dalla selezione dei partecipanti, dall’assegnazione ai gruppi, dal modo in cui viene misurato l’esito, da perdite diverse tra gruppi o da valutatori influenzati da ciò che sanno del paziente. Se l’errore ha una direzione, aggiungere persone non lo elimina: permette solo di stimare con molta precisione una quantità ancora distorta."
            - paragraph [ref=e741]: "La distinzione pratica è questa: se il problema è rumore, un campione più grande aiuta; se il problema è un difetto nel modo in cui lo studio raccoglie o misura i dati, serve correggere il disegno o la procedura."
            - generic [ref=e742]:
