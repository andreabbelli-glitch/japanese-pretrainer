          - generic [ref=e1661]:
            - 'heading "Accordo osservato: quante volte concordano davvero" [level=3] [ref=e1662]'
            - paragraph [ref=e1663]:
              - text: L’
              - strong [ref=e1664]: accordo osservato
              - text: è la quota di casi in cui i due valutatori hanno dato la stessa risposta. Si calcola contando le celle di accordo e dividendo per il numero totale di casi.
            - paragraph [ref=e1665]: Nell’esempio, i due valutatori concordano su 46 mammografie positive e su 32 mammografie negative. I casi concordanti sono quindi 46 + 32 = 78. Gli esami totali sono 100. L’accordo osservato è 78/100 = 0,78, cioè 78%.
            - paragraph [ref=e1666]: "La frase clinica è: i due valutatori hanno dato la stessa risposta nel 78% delle mammografie. Questo numero è utile, ma ancora incompleto. Per capire se 78% è davvero molto, bisogna chiedersi quanta concordanza sarebbe già prevedibile guardando quanto spesso ciascun valutatore usa le categorie positivo e negativo."
            - generic [ref=e1667]:
              - heading "Formula tradotta" [level=4] [ref=e1668]
              - generic [ref=e1669]: Po = casi concordanti / casi totali
              - list [ref=e1670]:
                - listitem [ref=e1671]: Po indica l’accordo osservato.
                - listitem [ref=e1672]: I casi concordanti sono le celle in cui i valutatori danno la stessa risposta.
                - listitem [ref=e1673]: Il totale dei casi è il numero complessivo di osservazioni valutate da entrambi.
                - listitem [ref=e1674]: "La domanda è: su tutti i casi osservati, quale quota è finita nelle celle di accordo?"
              - paragraph [ref=e1675]:
                - strong [ref=e1676]: "Esempio:"
                - text: Po = (46 + 32) / 100 = 78/100 = 0,78.
          - generic [ref=e1677]:
            - heading "Perché l’accordo osservato può ingannare" [level=3] [ref=e1678]
            - paragraph [ref=e1679]: L’accordo osservato può essere alto anche quando una categoria è molto frequente. Se quasi tutti i casi sono negativi, due valutatori che dicono spesso “negativo” possono concordare molte volte. La percentuale grezza cresce perché entrambi usano molto la categoria più comune, non necessariamente perché riconoscono con precisione ogni situazione clinica.
            - paragraph [ref=e1680]:
              - text: "Per questo serve una seconda domanda: quanta concordanza mi aspetterei già solo guardando quanto spesso ciascun valutatore usa le categorie? Questa quota si chiama"
              - strong [ref=e1681]: accordo atteso
              - text: .
            - paragraph [ref=e1682]: "La parola “atteso” non significa che i valutatori tirano a indovinare. Significa che una parte della concordanza può essere spiegata dai margini della tabella, cioè dai totali di riga e di colonna: quanti positivi e quanti negativi tende a produrre ciascun valutatore."
          - generic [ref=e1683]:
            - 'heading "Accordo atteso: quanto era prevedibile dai margini" [level=3] [ref=e1684]'
            - paragraph [ref=e1685]: I margini della tabella dicono quanto spesso ciascun valutatore usa ogni categoria. Nell’esempio, il primo valutatore classifica 58 casi su 100 come positivi e 42 su 100 come negativi. Il secondo valutatore classifica 56 casi su 100 come positivi e 44 su 100 come negativi.
            - paragraph [ref=e1686]: "Per stimare l’accordo atteso si ragiona categoria per categoria. Per i positivi si moltiplica la quota di positivi del primo valutatore per la quota di positivi del secondo: 0,58 × 0,56 = 0,3248. Per i negativi si moltiplica la quota di negativi del primo per la quota di negativi del secondo: 0,42 × 0,44 = 0,1848."
            - paragraph [ref=e1687]: Sommando le due parti si ottiene 0,3248 + 0,1848 = 0,5096, cioè circa 0,51. Questo non è l’accordo osservato. È la quota di concordanza già prevedibile guardando solo le frequenze con cui i due valutatori usano positivo e negativo.
            - generic [ref=e1688]:
              - heading "Formula tradotta" [level=4] [ref=e1689]
              - generic [ref=e1690]: Pe = (quota positivi V1 × quota positivi V2) + (quota negativi V1 × quota negativi V2)
              - list [ref=e1691]:
                - listitem [ref=e1692]: Pe indica l’accordo atteso dai margini della tabella.
                - listitem [ref=e1693]: Per ogni categoria si guarda quanto spesso la usa il primo valutatore e quanto spesso la usa il secondo.
                - listitem [ref=e1694]: Il prodotto delle due quote rappresenta la parte di accordo attesa su quella categoria.
                - listitem [ref=e1695]: La somma dei prodotti dà l’accordo atteso complessivo.
              - paragraph [ref=e1696]:
                - strong [ref=e1697]: "Esempio:"
                - text: Pe = (0,58 × 0,56) + (0,42 × 0,44) = 0,3248 + 0,1848 = 0,5096, circa 0,51.
          - generic [ref=e1698]:
            - 'heading "Kappa: quanto accordo resta oltre l’atteso" [level=3] [ref=e1699]'
            - paragraph [ref=e1700]: "La tabella produce due numeri da confrontare: l’accordo osservato, 0,78, e l’accordo atteso dai margini, circa 0,51. Kappa confronta questi due numeri e chiede: quanta parte dell’accordo possibile oltre l’atteso è stata davvero raggiunta?"
            - paragraph [ref=e1701]: "Il numeratore della formula, Po − Pe, risponde alla domanda: quanto accordo in più ho osservato rispetto a quello già atteso? Nell’esempio: 0,78 − 0,51 = 0,27."
            - paragraph [ref=e1702]: "Il denominatore, 1 − Pe, risponde alla domanda: qual era il massimo accordo ancora migliorabile oltre quello atteso? Se Pe è 0,51, lo spazio massimo che resta per fare meglio dell’atteso è 1 − 0,51 = 0,49."
            - paragraph [ref=e1703]: "Kappa divide questi due pezzi: 0,27/0,49 = 0,55. Il risultato non significa “55% di accordo grezzo”, perché l’accordo grezzo era 78%. Significa che i valutatori hanno ottenuto circa il 55% dell’accordo aggiuntivo che era possibile ottenere oltre quello già prevedibile dai margini."
            - generic [ref=e1704]:
              - heading "Formula tradotta" [level=4] [ref=e1705]
              - generic [ref=e1706]: K = (Po − Pe) / (1 − Pe)
              - list [ref=e1707]:
                - listitem [ref=e1708]: "Po è l’accordo osservato: quante volte i valutatori concordano nella tabella."
                - listitem [ref=e1709]: "Pe è l’accordo atteso: quanta concordanza era prevedibile dai margini."
                - listitem [ref=e1710]: Po − Pe è l’accordo in più rispetto all’atteso.
                - listitem [ref=e1711]: 1 − Pe è tutto lo spazio di accordo che restava possibile oltre l’atteso.
                - listitem [ref=e1712]: K è la quota di quello spazio che è stata davvero raggiunta.
              - paragraph [ref=e1713]:
                - strong [ref=e1714]: "Esempio:"
                - text: Se Po = 0,78 e Pe = 0,51, K = (0,78 − 0,51) / (1 − 0,51) = 0,27/0,49 = 0,55.
          - generic [ref=e1715]:
            - heading "Come interpretare Kappa" [level=3] [ref=e1716]
            - paragraph [ref=e1717]: Kappa riassume quanta concordanza resta dopo avere tolto la parte di accordo già prevedibile dai margini. Per questo non va letto come una semplice percentuale di accordo grezzo.
            - paragraph [ref=e1718]: Le soglie sono orientative, ma aiutano a scrivere una frase d’esame. K = 0 indica accordo compatibile con il caso. K = 1 indica accordo perfetto. Tra questi estremi si parla di accordo scarso, moderato/buono o eccellente.
