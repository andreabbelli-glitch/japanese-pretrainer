            - 'heading "Categorie: contare quante volte compare una risposta" [level=3] [ref=e972]'
            - paragraph [ref=e973]: "Quando la risposta è una categoria, la prima descrizione è una tabella di frequenze. Se in 120 parti osservati ci sono 72 parti vaginali, 30 cesarei programmati e 18 cesarei urgenti, la domanda è: quante volte compare ciascuna modalità?"
            - paragraph [ref=e974]: "La frequenza assoluta è il conteggio. In questo esempio, 72 è la frequenza assoluta dei parti vaginali. La frequenza relativa divide quel conteggio per il totale: 72/120 = 0,60, cioè 60%. La percentuale permette di leggere la categoria dentro il gruppo di riferimento: nel campione, 60 parti ogni 100 sono stati vaginali."
            - paragraph [ref=e975]: "Per le variabili qualitative nominali le categorie non hanno un ordine naturale obbligato. Modalità del parto, gruppo sanguigno e reparto di provenienza sono esempi di categorie nominali. Per le variabili qualitative ordinali, invece, le categorie hanno un ordine: per esempio gravità lieve, moderata, severa."
            - paragraph [ref=e976]: "Quando le categorie hanno un ordine, può avere senso leggere anche la frequenza cumulata: quante osservazioni arrivano fino a quel livello. La frequenza cumulata non descrive solo una categoria isolata, ma tutte le categorie fino a quel punto."
