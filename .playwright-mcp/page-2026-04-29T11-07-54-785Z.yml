          - generic [ref=e1341]:
            - 'heading "La terza domanda: se il test è positivo, quanti sono davvero malati?" [level=3] [ref=e1342]'
            - paragraph [ref=e1343]: "La terza domanda cambia punto di vista. Non parte più dalla realtà clinica già nota, ma dal risultato che arriva al clinico: il test è positivo."
            - paragraph [ref=e1344]: "Tra tutti i positivi al test ci sono due gruppi. Alcuni sono veri positivi, cioè A: persone malate con test positivo. Altri sono falsi positivi, cioè B: persone sane con test positivo. Tutti i positivi sono quindi A + B."
            - paragraph [ref=e1345]: "La quota di positivi che sono davvero malati si chiama valore predittivo positivo, spesso abbreviato VPP. Questa è la domanda più vicina al paziente con un risultato positivo: dato questo positivo, quanto spesso corrisponde davvero alla malattia nel gruppo in cui il test è usato?"
            - paragraph [ref=e1346]: Il VPP non coincide con la sensibilità. La sensibilità parte da tutti i malati; il VPP parte da tutti i positivi. Cambiando il denominatore, cambia la domanda.
