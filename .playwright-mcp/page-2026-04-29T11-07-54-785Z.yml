          - generic [ref=e1868]:
            - generic [ref=e1869]:
              - generic [ref=e1870]: "Pagine: PDF pagine 19-25"
              - generic [ref=e1871]: Capitolo 7
            - heading "Distribuzione normale e z-score" [level=2] [ref=e1872]
            - paragraph [ref=e1873]:
              - strong [ref=e1874]: "Perché serve:"
              - text: Molte misure biologiche diventano leggibili solo quando non guardiamo il numero isolato, ma la sua posizione dentro una distribuzione di riferimento.
            - generic [ref=e1875]:
              - strong [ref=e1876]: Ponte logico.
              - text: "Dopo media, mediana e dispersione, qui guardiamo l’intera forma dei dati: dove si concentrano i valori, quanto si allargano e quanto è raro trovare valori lontani dal centro. Alla fine useremo questa lettura per capire anche i percentili."
            - generic [ref=e1877]:
              - paragraph [ref=e1878]:
                - strong [ref=e1879]: Situazione di partenza.
                - text: "Un valore come 176 cm non è alto o basso in assoluto. Diventa interpretabile quando lo collochiamo dentro una distribuzione di riferimento: qual è la media, quanto sono dispersi i valori e quale quota di persone sta sotto o sopra quel punto."
              - paragraph [ref=e1880]:
                - strong [ref=e1881]: "Dopo questo capitolo saprai rispondere a:"
              - list [ref=e1882]:
                - listitem [ref=e1883]: Che cosa significa guardare la forma dei dati?
                - listitem [ref=e1884]: Perché alcune distribuzioni hanno forma a campana?
                - listitem [ref=e1885]: Che cosa aggiunge lo z-score rispetto alla distanza grezza dalla media?
                - listitem [ref=e1886]: Come si legge l’area sotto la curva come quota di persone?
                - listitem [ref=e1887]: Come si collega un’area cumulativa a un percentile?
              - paragraph [ref=e1888]:
                - strong [ref=e1889]: Percorso.
                - text: forma dei dati -> curva normale -> media e deviazione standard -> regola 68-95-99,7 -> z-score -> area sotto la curva -> percentili
              - paragraph [ref=e1890]:
                - strong [ref=e1891]: Frase da saper scrivere.
                - text: "Un valore si interpreta chiedendo dove cade nella distribuzione: quanto è lontano dalla media, in quale verso, e quale quota del gruppo resta sotto o sopra quel punto."
          - generic [ref=e1892]:
            - heading "Dai valori osservati alla forma dei dati" [level=3] [ref=e1893]
            - paragraph [ref=e1894]: "Quando misuro una variabile biologica su molte persone, per esempio altezza, pressione arteriosa o emoglobina, ottengo una lista di numeri. La lista da sola è difficile da leggere: non mostra subito quali valori sono comuni e quali sono rari."
            - paragraph [ref=e1895]: "Un primo modo per dare forma ai dati è dividerli in intervalli e contare quante osservazioni cadono in ciascun intervallo. Se studio le altezze, posso contare quante persone stanno tra 150 e 154 cm, quante tra 155 e 159 cm, quante tra 160 e 164 cm, e così via. Ogni conteggio diventa una barra: più alta è la barra, più frequenti sono quei valori."
            - paragraph [ref=e1896]:
              - text: Questo grafico si chiama
              - strong [ref=e1897]: istogramma
              - text: ". Prima ancora del nome tecnico, l’idea è semplice: una distribuzione mostra dove i dati si accumulano e dove diventano rari. Se molte barre alte stanno al centro e le barre diventano più basse andando verso gli estremi, i valori centrali sono frequenti e i valori molto bassi o molto alti sono più rari."
            - paragraph [ref=e1898]: "In molte misure biologiche si osserva proprio questa forma: una zona centrale più affollata e due estremi meno affollati. Non è obbligatoria per ogni variabile, ma è comune quando il valore finale dipende da molti piccoli fattori che agiscono insieme."
          - generic [ref=e1899]:
            - heading "La curva normale" [level=3] [ref=e1900]
            - paragraph [ref=e1901]:
              - text: Quando l’istogramma ha molti valori centrali e pochi valori estremi, possiamo immaginare una curva liscia che segue quella forma. La
              - strong [ref=e1902]: distribuzione normale
              - text: "è una curva a campana: alta al centro, più bassa man mano che ci si allontana dal centro."
            - paragraph [ref=e1903]: La normale è simmetrica. Allontanarsi sopra la media e allontanarsi sotto la media hanno lo stesso peso quando la distanza è la stessa. In una normale ideale, media, mediana e moda coincidono al centro della curva.
            - paragraph [ref=e1904]: Dire che una variabile è approssimativamente normale non significa dire che tutti i valori sono vicini alla media. Significa dire che gli scostamenti piccoli sono più frequenti degli scostamenti grandi, e che valori molto lontani dal centro sono possibili ma rari.
            - paragraph [ref=e1905]: La normale è un modello. È utile quando descrive abbastanza bene i dati; non va applicata automaticamente a ogni variabile. Se i dati sono molto asimmetrici, pieni di valori estremi o formati da categorie, la campana può essere una cattiva descrizione.
          - generic [ref=e1906]:
            - heading "Media e deviazione standard disegnano la campana" [level=3] [ref=e1907]
            - paragraph [ref=e1908]:
              - text: "Per descrivere una normale servono due informazioni. La prima è il centro: dove si trova il valore attorno a cui i dati tendono ad accumularsi? Nella distribuzione normale questo centro è la"
              - strong [ref=e1909]: media
              - text: .
            - paragraph [ref=e1910]:
              - text: "La seconda informazione è la dispersione: quanto si allontanano tipicamente i valori dal centro? Questa informazione è data dalla"
              - strong [ref=e1911]: deviazione standard
              - text: . Una deviazione standard piccola produce una campana stretta, perché molti valori stanno vicini alla media. Una deviazione standard grande produce una campana più larga, perché i valori sono più dispersi.
            - paragraph [ref=e1912]: "La media risponde alla domanda: qual è il valore centrale di riferimento? La deviazione standard risponde alla domanda: quanto è normale allontanarsi da quel centro?"
            - paragraph [ref=e1913]: Per esempio, dire che una popolazione ha altezza media 170 cm e deviazione standard 9,5 cm non significa che quasi tutti siano alti 170 cm. Significa che 170 cm è il centro della distribuzione e che distanze di alcuni centimetri sono attese, mentre distanze di molte deviazioni standard diventano progressivamente rare.
          - generic [ref=e1914]:
            - heading "La regola 68-95-99,7" [level=3] [ref=e1915]
            - paragraph [ref=e1916]: La forma della normale permette una lettura pratica molto importante. Circa il 68% dei valori si trova entro 1 deviazione standard dalla media. Circa il 95% si trova entro circa 2 deviazioni standard dalla media. Circa il 99,7% si trova entro 3 deviazioni standard dalla media.
            - paragraph [ref=e1917]: "Questa regola risponde alla domanda: se mi allontano dalla media di una, due o tre deviazioni standard, quanta parte della popolazione sto ancora includendo?"
            - paragraph [ref=e1918]: Con media 170 cm e deviazione standard 9,5 cm, l’intervallo entro 1 deviazione standard va da 160,5 a 179,5 cm. In una distribuzione normale, circa il 68% delle persone si trova in questa fascia. L’intervallo entro 2 deviazioni standard va circa da 151 a 189 cm e contiene circa il 95% dei valori.
            - paragraph [ref=e1919]: "La frase clinica è semplice: un valore vicino alla media è comune; un valore oltre circa 2 deviazioni standard dalla media è nella parte periferica della distribuzione; un valore oltre 3 deviazioni standard è molto raro e merita attenzione. La rarità, però, non è ancora una diagnosi: va interpretata nel contesto clinico."
            - generic [ref=e1920]:
              - heading "Regola pratica della normale" [level=4] [ref=e1921]
              - table [ref=e1922]:
