            - paragraph [ref=e1037]: "La media risponde a una domanda precisa: se il totale osservato fosse distribuito in parti uguali tra tutti i soggetti, quanto toccherebbe a ciascuno? Per calcolarla si sommano tutti i valori e si divide per il numero di osservazioni."
