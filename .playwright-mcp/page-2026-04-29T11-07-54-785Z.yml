            - heading "A cosa serve la statistica medica" [level=2] [ref=e346]
            - paragraph [ref=e347]:
              - strong [ref=e348]: "Perché serve:"
              - text: "La statistica medica serve a trasformare dati osservati in frasi prudenti sulla salute: prima descrive ciò che è stato visto, poi aiuta a capire quanto quella osservazione possa valere oltre il gruppo studiato e se abbia peso nella pratica clinica."
            - generic [ref=e349]:
              - strong [ref=e350]: Ponte logico.
              - text: "Dopo le basi su percentuali, proporzioni e denominatori, questo capitolo usa gli stessi passaggi per leggere studi clinici semplici: chi è stato osservato, a quale gruppo si vorrebbe arrivare, quale esito interessa e quanto una differenza conta davvero."
            - generic [ref=e351]:
              - paragraph [ref=e352]:
                - strong [ref=e353]: Situazione di partenza.
                - text: Uno studio osserva 120 donne in un consultorio e registra alcune informazioni cliniche. I dati descrivono certamente quelle 120 donne; la domanda più delicata è se possano dire qualcosa sulle donne gravide di una regione più ampia.
              - paragraph [ref=e354]:
                - strong [ref=e355]: "Dopo questo capitolo saprai rispondere a:"
              - list [ref=e356]:
                - listitem [ref=e357]: Quale gruppo ho osservato davvero?
                - listitem [ref=e358]: A quale gruppo più grande vorrei estendere il ragionamento?
                - listitem [ref=e359]: Qual è l’esito che sto osservando e quale determinante potrebbe essere collegato?
                - listitem [ref=e360]: Quando una differenza è credibile nei dati e quando è anche utile in clinica?
                - listitem [ref=e361]: Che cosa dice davvero un percentile?
              - paragraph [ref=e362]:
                - strong [ref=e363]: Percorso.
                - text: descrivere i dati -> campione e popolazione -> inferenza prudente -> determinante ed esito -> significatività e utilità clinica -> percentili
              - paragraph [ref=e364]:
                - strong [ref=e365]: Frase da saper scrivere.
                - text: "Il dato osservato è il punto di partenza: la statistica aiuta a trasformarlo in una frase prudente, utile e clinicamente leggibile."
          - generic [ref=e366]:
            - heading "Dal numero alla frase clinica" [level=3] [ref=e367]
            - paragraph [ref=e368]: "Immaginiamo uno studio su 120 donne seguite in un consultorio. Per ciascuna si registrano età, pressione arteriosa, eventuale fumo in gravidanza e tipo di parto. Alla fine non basta avere una lista di 120 righe: bisogna trasformare quelle righe in frasi comprensibili."
            - paragraph [ref=e369]: "Una prima frase può essere descrittiva: 18 donne su 120 fumano in gravidanza. Il calcolo è 18/120 = 0,15 = 15%. La frase diventa: nel gruppo osservato, 15 donne ogni 100 fumano in gravidanza."
            - paragraph [ref=e370]: "Una seconda frase può essere interpretativa: questa quota dice qualcosa sulle donne gravide della regione, o descrive solo quel consultorio? Qui nasce il problema statistico più importante: passare da ciò che ho visto a ciò che vorrei sapere."
            - paragraph [ref=e371]: "La statistica medica ha quindi due compiti principali. Il primo è descrivere bene i dati osservati: conteggi, percentuali, medie, distribuzioni. Il secondo è sostenere un ragionamento prudente: quanto posso fidarmi di questi dati? Posso estenderli? Sono abbastanza importanti da cambiare una decisione clinica?"
          - generic [ref=e372]:
            - heading "Descrivere prima di interpretare" [level=3] [ref=e373]
            - paragraph [ref=e374]: Descrivere significa restare dentro il gruppo osservato. Se dico che 18 donne su 120 fumano, sto parlando delle 120 donne presenti nei dati. Non ho ancora detto che la stessa percentuale valga per tutte le donne gravide della regione.
            - paragraph [ref=e375]: Questa distinzione evita molte conclusioni troppo forti. Un numero può essere calcolato correttamente e, allo stesso tempo, essere interpretato male. Per esempio, il 15% osservato in un consultorio può non rappresentare la regione se quel consultorio segue soprattutto pazienti con caratteristiche particolari.
            - paragraph [ref=e376]: Interpretare significa chiedersi che cosa quel numero suggerisca oltre i dati raccolti. Il passaggio è utile, ma non è automatico. Dipende da come il gruppo è stato scelto, da quante persone contiene, da quanto i dati sono variabili e da quanto è grande la differenza osservata.
            - paragraph [ref=e377]: "La domanda guida è sempre concreta: questa frase parla solo delle persone che ho davanti, oppure sto cercando di dire qualcosa su un gruppo più grande?"
          - generic [ref=e378]:
            - heading "Campione, popolazione e inferenza" [level=3] [ref=e379]
            - paragraph [ref=e380]: Il gruppo che ho davvero osservato si chiama campione. Nell’esempio, il campione è formato dalle 120 donne del consultorio. Sono le persone per cui ho dati reali.
            - paragraph [ref=e381]: Il gruppo più grande che mi interessa si chiama popolazione. Può essere, per esempio, l’insieme delle donne gravide della regione, dei neonati a termine, o dei pazienti con una certa diagnosi.
            - paragraph [ref=e382]: "Il ragionamento che usa il campione per dire qualcosa sulla popolazione si chiama inferenza. Non è una certezza: è un passaggio ragionato. Il campione dà un indizio; l’inferenza valuta quanto quell’indizio possa rappresentare il gruppo più grande."
            - paragraph [ref=e383]: Se il campione assomiglia alla popolazione, l’inferenza è più credibile. Se il campione è molto diverso dalla popolazione, anche un calcolo aritmetico perfetto può portare a una conclusione debole.
