              - paragraph [ref=e1095]:
                - strong [ref=e1096]: "Esempio:"
                - text: "Se Q1 = 3 giorni e Q3 = 7 giorni, IQR = 4 giorni: la metà centrale delle degenze sta in un intervallo di 4 giorni."
          - generic [ref=e1097]:
            - 'heading "Molti valori: classi, istogrammi e percentili" [level=3] [ref=e1098]'
            - paragraph [ref=e1099]: Quando una variabile continua ha molti valori, una tabella con ogni singolo numero diventa poco leggibile. La lunghezza o il peso di molti bambini, per esempio, si capiscono meglio raggruppando i valori in classi o usando un grafico.
            - paragraph [ref=e1100]: "Una classe è un intervallo di valori. Deve essere chiara e non sovrapporsi alle altre: ogni bambino deve finire in una sola classe. Troppe classi frammentano il quadro; troppo poche nascondono differenze importanti. L’istogramma rappresenta queste classi con barre contigue, perché gli intervalli stanno su una scala numerica continua."
            - paragraph [ref=e1101]: Un altro modo di leggere la posizione di un bambino è chiedere quanti bambini stanno sotto o allo stesso livello. Se un bambino è al 75° percentile di lunghezza per età, significa che, in un gruppo di riferimento ordinato, circa 75 bambini su 100 hanno lunghezza minore o uguale alla sua e circa 25 su 100 hanno lunghezza maggiore.
            - paragraph [ref=e1102]: Il percentile non è un voto e non è automaticamente una diagnosi. È una posizione dentro una distribuzione di riferimento. Nelle curve di crescita serve a seguire se un bambino resta su un andamento coerente nel tempo o se cambia fascia in modo inatteso.
