          - generic [ref=e2504]:
            - heading "Quando una differenza osservata non basta" [level=3] [ref=e2505]
            - paragraph [ref=e2506]: In uno studio clinico due gruppi ricevono trattamenti diversi. Nel gruppo A la pressione sistolica media scende di 8 mmHg; nel gruppo B scende di 5 mmHg. La differenza osservata è 3 mmHg. Questo numero è reale per il campione studiato, ma non basta da solo per concludere che il trattamento A sia migliore in tutti i pazienti simili.
            - paragraph [ref=e2507]: Il motivo è che i campioni oscillano. Se lo stesso studio venisse ripetuto con altri pazienti, le medie non sarebbero identiche. Una parte della differenza osservata può dipendere dal trattamento, ma una parte può dipendere dal fatto che nel campione sono entrati proprio quei pazienti e non altri.
            - paragraph [ref=e2508]: "Il test di ipotesi nasce per rispondere a una domanda prudente: una differenza come quella osservata sarebbe plausibile anche se, nella popolazione, i due trattamenti avessero lo stesso effetto medio?"
            - paragraph [ref=e2509]: "La frase finale non deve saltare direttamente da “nel campione vedo 3 mmHg” a “il trattamento funziona”. Il passaggio corretto è: nel campione vedo una differenza; il test valuta se questa differenza è abbastanza incompatibile con l’assenza di una differenza vera nella popolazione."
          - generic [ref=e2510]:
            - 'heading "H0: l’ipotesi di partenza prudente" [level=3] [ref=e2511]'
            - paragraph [ref=e2512]: La posizione prudente si chiama ipotesi nulla, indicata con H0. Di solito H0 dice che nella popolazione non c’è differenza, non c’è associazione o non c’è effetto. Non significa che siamo sicuri che H0 sia vera. Significa che, prima di dichiarare un effetto, chiediamo ai dati una prova abbastanza forte contro questa posizione di partenza.
            - paragraph [ref=e2513]: "Nel confronto tra due trattamenti per la pressione, H0 non dice che 8 e 5 sono uguali. Quei due numeri sono le medie osservate nel campione e sono già diverse. H0 parla invece della popolazione: la riduzione media vera con il trattamento A è uguale alla riduzione media vera con il trattamento B."
            - paragraph [ref=e2514]: Questa distinzione evita un errore comune. Il test non nega il dato osservato. Accetta che nel campione esista una differenza e si chiede se quella differenza possa essere spiegata dall’oscillazione casuale attorno a un vero effetto nullo.
            - paragraph [ref=e2515]: In medicina questa prudenza è importante. Senza un criterio di decisione, ogni piccola differenza campionaria potrebbe essere scambiata per un effetto reale del trattamento, del fattore di rischio o dell’esposizione studiata.
            - generic [ref=e2516]:
              - heading "Formula tradotta" [level=4] [ref=e2517]
              - generic [ref=e2518]: "H0: differenza vera nella popolazione = 0"
              - list [ref=e2519]:
                - listitem [ref=e2520]: "differenza vera: la differenza che esisterebbe nella popolazione, non solo nel campione osservato"
                - listitem [ref=e2521]: "0: valore di assenza di differenza"
                - listitem [ref=e2522]: H0 non dice che i due numeri campionari sono identici; dice che la differenza vera potrebbe essere nulla
              - paragraph [ref=e2523]:
                - strong [ref=e2524]: "Esempio:"
                - text: Se nel campione A scende di 8 mmHg e B di 5 mmHg, la differenza osservata è 3 mmHg. H0 dice che la differenza vera nella popolazione potrebbe comunque essere 0 mmHg.
          - generic [ref=e2525]:
            - 'heading "H1: che cosa cerchiamo se H0 non regge" [level=3] [ref=e2526]'
            - paragraph [ref=e2527]: L’ipotesi alternativa, indicata con H1, descrive il tipo di conclusione che diventa plausibile se i dati sono abbastanza contrari a H0. Se H0 dice assenza di differenza, H1 dice presenza di differenza. Se H0 dice differenza vera uguale a 0, H1 dice che la differenza vera non è 0, oppure che è maggiore di 0, oppure che è minore di 0.
            - paragraph [ref=e2528]: "La forma di H1 dipende dalla domanda clinica. Se voglio sapere se due trattamenti hanno effetti diversi, senza fissare una direzione, H1 è: la differenza vera è diversa da 0. Se invece la domanda è direzionale, per esempio “il nuovo trattamento riduce la pressione più del controllo?”, H1 può essere: la differenza vera è maggiore nella direzione del nuovo trattamento."
            - paragraph [ref=e2529]: "H1 va definita prima di guardare i risultati. Se la direzione viene scelta dopo avere visto il campione, la domanda non guida più l’analisi: è il risultato osservato a scegliere la domanda più comoda."
            - paragraph [ref=e2530]: Rifiutare H0 dà evidenza statistica a favore di H1. Non dimostra una verità assoluta e non dice automaticamente che l’effetto sia clinicamente importante. Dice che, rispetto alla regola scelta, i dati sono troppo poco compatibili con H0.
          - generic [ref=e2531]:
            - heading "Una direzione o due direzioni" [level=3] [ref=e2532]
            - paragraph [ref=e2533]: "Prima di calcolare il test bisogna chiarire quali risultati conterebbero come contrari a H0. Se la domanda è “i due trattamenti hanno effetti diversi?”, interessano entrambe le direzioni: A potrebbe essere migliore di B, ma potrebbe anche essere peggiore. Questo è un test a due code."
            - paragraph [ref=e2534]: Se la domanda è davvero direzionale, per esempio “il nuovo trattamento riduce la pressione più del controllo?”, interessa una sola direzione. Questo è un test a una coda. La direzione deve però essere giustificata clinicamente e decisa prima di vedere i dati.
            - paragraph [ref=e2535]: Una coda non è una scorciatoia per ottenere più facilmente un risultato significativo. Se guardo i dati e poi scelgo la direzione che produce il p-value più piccolo, sto cambiando le regole dopo avere visto il risultato.
            - paragraph [ref=e2536]: "Nella pratica medica, spesso il test a due code è la scelta più prudente: anche un trattamento pensato per migliorare un esito può peggiorarlo, produrre effetti inattesi o muoversi nella direzione opposta a quella sperata."
          - generic [ref=e2537]:
            - 'heading "Alfa: la soglia scelta prima" [level=3] [ref=e2538]'
            - paragraph [ref=e2539]: Prima di guardare i dati bisogna stabilire quanto un risultato debba essere raro, sotto H0, per convincerci a rifiutare H0. Questa soglia si chiama alfa, indicata con α.
            - paragraph [ref=e2540]: "Nella pratica si usa spesso α = 0,05. Significa adottare questa regola: sotto H0, accettiamo al massimo un 5% di probabilità di finire nella zona in cui rifiuteremmo H0 per errore usando quella procedura. Questo errore si chiama errore di tipo I, o falso positivo statistico."
            - paragraph [ref=e2541]: Alfa non viene calcolato dal campione. È una soglia decisa prima, come una linea tracciata prima di vedere dove cadrà il risultato dello studio.
            - paragraph [ref=e2542]: L’ordine è importante. Se uno studio produce p = 0,07, non è corretto decidere dopo che useremo α = 0,10 solo per far superare al risultato la soglia scelta. La soglia appartiene al piano dell’analisi, non alla convenienza del risultato.
            - generic [ref=e2543]:
              - heading "Formula tradotta" [level=4] [ref=e2544]
              - generic [ref=e2545]: α = soglia prefissata per il rischio di errore di tipo I
              - list [ref=e2546]:
                - listitem [ref=e2547]: α si decide prima di interpretare il risultato del test
                - listitem [ref=e2548]: errore di tipo I significa rifiutare H0 quando non c’è un effetto reale
                - listitem [ref=e2549]: α = 0,05 significa usare una soglia convenzionale del 5%
              - paragraph [ref=e2550]:
                - strong [ref=e2551]: "Esempio:"
                - text: Se il protocollo stabilisce α = 0,05 e il test produce p = 0,07, il risultato non è statisticamente significativo al 5%.
          - generic [ref=e2552]:
            - 'heading "P-value: una frase condizionata" [level=3] [ref=e2553]'
            - paragraph [ref=e2554]: "Dopo avere osservato i dati si calcola il p-value. Il p-value risponde a questa domanda: sotto H0 e se il modello del test fosse adeguato, quanto sarebbe probabile osservare un risultato almeno così estremo di quello ottenuto?"
            - paragraph [ref=e2555]: "La parte iniziale, “sotto H0”, non è un dettaglio: è il cuore della frase. Il p-value non dice quanto è probabile che H0 sia vera. Parte provvisoriamente dal mondo descritto da H0 e chiede quanto sarebbero sorprendenti dati come quelli osservati."
            - paragraph [ref=e2556]: Un p-value piccolo indica che i dati sono poco compatibili con H0. Per esempio, p = 0,01 significa che, sotto H0, risultati lontani da 0 almeno quanto quello osservato sarebbero rari. Non significa che H0 abbia probabilità 1% di essere vera.
            - paragraph [ref=e2557]: Non bisogna dire neppure che p = 0,01 significa “1% di probabilità che il risultato sia dovuto al caso”. Il p-value non separa da solo caso, bias, confondimento e vero effetto. Misura la compatibilità dei dati con H0 dentro il modello statistico usato.
            - paragraph [ref=e2558]: "Un p-value grande indica che i dati non sono abbastanza sorprendenti rispetto a H0. Questo non dimostra che H0 sia vera: può darsi che l’effetto non esista, ma può anche darsi che il campione sia piccolo, molto variabile o poco preciso."
