            - heading "Ogni variabile nasce da una domanda" [level=3] [ref=e942]
            - paragraph [ref=e943]: "In una scheda clinica, una variabile è una domanda fatta nello stesso modo a ogni soggetto. La risposta può cambiare da persona a persona: per questo si chiama variabile."
            - paragraph [ref=e944]: "Se la domanda è “qual è la modalità del parto?”, le risposte possibili sono categorie come parto vaginale, cesareo programmato o cesareo urgente. Se la domanda è “quanti figli vivono in famiglia?”, le risposte sono conteggi interi: 0, 1, 2, 3 e così via. Se la domanda è “quanti giorni è durata la degenza?”, le risposte sono numeri che esprimono una quantità di tempo."
            - paragraph [ref=e945]: Le risposte possibili si chiamano modalità o valori della variabile. Il punto non è imparare un nome tecnico, ma capire che cosa quella risposta permette di fare. Non ha senso calcolare la media tra parto vaginale e cesareo. Ha senso invece contare quante persone stanno in ciascuna categoria. Per i giorni di degenza, invece, posso chiedere quale sia il centro dei dati e quanto i valori siano dispersi.
