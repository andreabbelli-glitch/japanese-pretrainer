          - generic [ref=e4153]:
            - 'heading "Quando si confrontano misure: due situazioni diverse" [level=3] [ref=e4154]'
            - paragraph [ref=e4155]: Se l’esito è quantitativo, la scelta dipende subito dalla struttura dei dati. Peso neonatale in madri con e senza diabete gestazionale è un confronto tra due gruppi indipendenti. Emoglobina prima e dopo terapia nelle stesse donne è un confronto appaiato. In entrambi i casi ci sono numeri, ma il ragionamento non è lo stesso.
            - paragraph [ref=e4156]: Con due gruppi indipendenti e un esito quantitativo, il confronto classico riguarda le medie. Per esempio, si può chiedere se il peso neonatale medio è diverso tra madri con e senza diabete gestazionale. Se la media è un riassunto ragionevole, il test di partenza è il t test per campioni indipendenti.
            - paragraph [ref=e4157]: "La domanda del t test indipendente è: la differenza tra le due medie osservate è compatibile con la variabilità normale dei dati, oppure suggerisce una differenza reale tra i gruppi?"
            - paragraph [ref=e4158]: "Nel prima/dopo, invece, non ci sono due gruppi separati. Ci sono coppie di misure nella stessa persona. Il confronto deve passare dalle differenze individuali: emoglobina dopo meno emoglobina prima. Se queste differenze sono abbastanza regolari, il test di partenza è il t test appaiato."
            - paragraph [ref=e4159]: "La domanda del t test appaiato è: il cambiamento medio dentro le persone è compatibile con zero, oppure suggerisce un cambiamento sistematico nella popolazione?"
            - generic [ref=e4160]:
