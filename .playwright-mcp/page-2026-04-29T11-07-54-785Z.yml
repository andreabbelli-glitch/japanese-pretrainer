          - generic [ref=e3824]:
            - 'heading "MCID: la soglia clinica quando è disponibile" [level=3] [ref=e3825]'
            - paragraph [ref=e3826]: A volte l’articolo o la letteratura indicano una soglia minima di cambiamento considerata importante per il paziente o per la decisione clinica. Questa soglia si chiama MCID, cioè minimal clinically important difference.
            - paragraph [ref=e3827]: "La MCID non sostituisce il p-value e non sostituisce l’intervallo di confidenza. Risponde a un’altra domanda: quanto deve essere grande l’effetto perché valga la pena considerarlo clinicamente importante?"
            - paragraph [ref=e3828]: "Se la MCID per un certo punteggio di sintomi fosse 5 punti e lo studio trovasse una differenza media di 2 punti con p < 0,001, la conclusione sarebbe: risultato statisticamente significativo, ma effetto medio sotto la soglia di importanza clinica."
            - paragraph [ref=e3829]: Se invece la differenza osservata fosse 7 punti, ma l’IC95% andasse da 1 a 13, la lettura sarebbe più prudente. La stima supera la MCID, ma l’intervallo include anche valori inferiori alla soglia clinicamente importante. L’effetto potrebbe essere importante, ma l’incertezza resta rilevante.
            - paragraph [ref=e3830]: Quando la MCID non è riportata, la rilevanza clinica non scompare. Va discussa usando contesto, esito, grandezza dell’effetto, rischi, benefici, costi, preferenze dei pazienti e plausibilità clinica.
