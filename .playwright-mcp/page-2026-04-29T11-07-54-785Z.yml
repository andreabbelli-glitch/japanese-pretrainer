            - paragraph [ref=e194]: "Una tabella diagnostica si chiama così perché riguarda un esame usato per distinguere chi ha una certa condizione clinica da chi non ce l’ha. Il punto di partenza è semplice: l’esame può dare due risultati, positivo oppure negativo. Per capire se il risultato è corretto, lo confronto con la realtà clinica: la persona è davvero malata oppure è sana."
