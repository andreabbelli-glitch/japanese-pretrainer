          - generic [ref=e2843]:
            - heading "La formula degli attesi nasce dai margini" [level=3] [ref=e2844]
            - paragraph [ref=e2845]: Il ragionamento sugli attesi si può scrivere in una formula. Per ogni cella, l’atteso si calcola moltiplicando il totale della riga per il totale della colonna e dividendo per il totale generale.
            - paragraph [ref=e2846]: La formula contiene lo stesso ragionamento fatto a parole. Il totale di colonna, diviso per il totale generale, dà la quota complessiva di quella categoria. Moltiplicando quella quota per il totale della riga, distribuiamo la riga come se non ci fosse associazione.
            - paragraph [ref=e2847]: Per la cella Farmaco A-guariti, il totale della riga è 50, il totale della colonna “guariti” è 50 e il totale generale è 100. L’atteso è quindi 50 × 50 / 100 = 25.
            - paragraph [ref=e2848]: Se una colonna rappresentasse il 40% del totale generale e una riga contenesse 80 persone, sotto indipendenza mi aspetterei 32 persone in quella cella, perché il 40% di 80 è 32. La formula compatta esprime proprio questa idea.
            - generic [ref=e2849]:
              - heading "Formula tradotta" [level=4] [ref=e2850]
              - generic [ref=e2851]: atteso = totale riga × totale colonna / totale generale
              - list [ref=e2852]:
                - listitem [ref=e2853]: "totale riga: quante osservazioni appartengono alla riga della cella"
                - listitem [ref=e2854]: "totale colonna: quante osservazioni appartengono alla colonna della cella"
                - listitem [ref=e2855]: "totale generale: quante osservazioni ci sono nella tabella intera"
                - listitem [ref=e2856]: "atteso: quante osservazioni ci aspetteremmo nella cella se le variabili fossero indipendenti"
              - paragraph [ref=e2857]:
                - strong [ref=e2858]: "Esempio:"
                - text: "Farmaco A-guariti: 50 × 50 / 100 = 25."
          - generic [ref=e2859]:
            - heading "Dal confronto osservato-atteso al contributo di una cella" [level=3] [ref=e2860]
            - paragraph [ref=e2861]: "Per ogni cella abbiamo due numeri: l’osservato, cioè ciò che è successo davvero, e l’atteso, cioè ciò che ci saremmo aspettati sotto indipendenza."
            - paragraph [ref=e2862]: Per Farmaco A-guariti, l’osservato è 30 e l’atteso è 25. Lo scarto è 30 - 25 = 5. Per Farmaco A-non guariti, l’osservato è 20 e l’atteso è 25. Lo scarto è 20 - 25 = -5.
            - paragraph [ref=e2863]: "Se sommassimo semplicemente gli scarti, quelli positivi e quelli negativi si cancellerebbero. Ma entrambe le celle sono lontane dagli attesi: in una ci sono 5 persone in più del previsto, nell’altra 5 in meno. Per non perdere questa distanza, lo scarto viene elevato al quadrato."
            - paragraph [ref=e2864]: Poi lo scarto quadratico viene diviso per l’atteso. Uno scarto di 5 casi pesa molto se mi aspettavo 10 casi, ma pesa poco se me ne aspettavo 500. La divisione per l’atteso mette lo scarto nella scala della cella.
            - generic [ref=e2865]:
              - heading "Formula tradotta" [level=4] [ref=e2866]
              - generic [ref=e2867]: contributo della cella = (O - E)² / E
              - list [ref=e2868]:
                - listitem [ref=e2869]: "O: frequenza osservata nella cella"
                - listitem [ref=e2870]: "E: frequenza attesa nella stessa cella sotto indipendenza"
                - listitem [ref=e2871]: "O - E: distanza tra osservato e atteso"
                - listitem [ref=e2872]: "(O - E)²: distanza resa positiva e più pesante quando è grande"
                - listitem [ref=e2873]: "/ E: distanza rapportata alla grandezza attesa della cella"
              - paragraph [ref=e2874]:
                - strong [ref=e2875]: "Esempio:"
                - text: Se O = 30 ed E = 25, il contributo è (30 - 25)² / 25 = 25 / 25 = 1.
          - generic [ref=e2876]:
            - heading "Il chi-quadrato raccoglie tutti gli scarti" [level=3] [ref=e2877]
            - paragraph [ref=e2878]: Il valore del chi-quadrato è la somma dei contributi di tutte le celle. Non guarda una sola differenza, ma l’intera distanza tra tabella osservata e tabella attesa.
            - paragraph [ref=e2879]: Nell’esempio delle due terapie, ogni cella ha uno scarto di 5 in valore assoluto rispetto all’atteso 25. Ogni contributo vale quindi 1. Sommando i quattro contributi si ottiene χ² = 4,00.
            - paragraph [ref=e2880]: "Un chi-quadrato piccolo significa che osservati e attesi sono vicini: la tabella reale somiglia alla tabella che ci aspetteremmo se non ci fosse associazione. Un chi-quadrato grande significa che osservati e attesi sono lontani: la tabella reale è poco compatibile con l’ipotesi di indipendenza."
            - paragraph [ref=e2881]: Il numero da solo non basta. Per decidere se è abbastanza grande bisogna confrontarlo con la distribuzione chi-quadrato appropriata, che dipende dai gradi di libertà.
            - generic [ref=e2882]:
              - heading "Formula tradotta" [level=4] [ref=e2883]
              - generic [ref=e2884]: χ² = Σ (O - E)² / E
              - list [ref=e2885]:
                - listitem [ref=e2886]: "Σ significa somma: si sommano i contributi di tutte le celle"
                - listitem [ref=e2887]: O è l’osservato nella cella
                - listitem [ref=e2888]: E è l’atteso nella cella
                - listitem [ref=e2889]: χ² piccolo indica osservati vicini agli attesi
                - listitem [ref=e2890]: χ² grande indica osservati lontani dagli attesi
              - paragraph [ref=e2891]:
                - strong [ref=e2892]: "Esempio:"
                - text: Nella tabella 2×2 con contributi 1, 1, 1 e 1, χ² = 4,00.
          - generic [ref=e2893]:
            - heading "Gradi di libertà" [level=3] [ref=e2894]
            - paragraph [ref=e2895]: I gradi di libertà indicano quante parti della tabella possono variare liberamente una volta fissati i totali di riga e di colonna. Non tutte le celle sono davvero libere, perché i margini obbligano alcuni valori.
            - paragraph [ref=e2896]: In una tabella 2×2, se conosco i margini e una cella interna, le altre tre celle sono obbligate. Per questo i gradi di libertà sono 1.
            - paragraph [ref=e2897]: Per una tabella con r righe e c colonne, i gradi di libertà sono (r - 1)(c - 1). Una tabella 2×3 ha quindi (2 - 1)(3 - 1) = 2 gradi di libertà.
            - paragraph [ref=e2898]: I gradi di libertà servono per leggere la tavola corretta. Lo stesso valore di χ² può essere significativo con 1 grado di libertà e non significativo con 2 gradi di libertà.
            - generic [ref=e2899]:
              - heading "Formula tradotta" [level=4] [ref=e2900]
              - generic [ref=e2901]: g.l. = (righe - 1)(colonne - 1)
              - list [ref=e2902]:
                - listitem [ref=e2903]: "righe: numero di categorie della variabile disposta sulle righe"
                - listitem [ref=e2904]: "colonne: numero di categorie della variabile disposta sulle colonne"
                - listitem [ref=e2905]: "g.l.: gradi di libertà da usare nella tavola del chi-quadrato"
              - paragraph [ref=e2906]:
                - strong [ref=e2907]: "Esempio:"
                - text: "Tabella 2×2: (2 - 1)(2 - 1) = 1. Tabella 2×3: (2 - 1)(3 - 1) = 2."
          - generic [ref=e2908]:
            - heading "Dalla tavola alla decisione" [level=3] [ref=e2909]
            - paragraph [ref=e2910]: "Dopo avere calcolato χ², lo si confronta con la soglia della tavola per quei gradi di libertà e per il livello scelto, spesso 5%. La tavola non è un passaggio misterioso: dice quanto deve essere grande χ² per essere considerato raro sotto H0."
            - paragraph [ref=e2911]: Con 1 grado di libertà, la soglia al 5% è 3,84. Con 2 gradi di libertà, la soglia al 5% è 5,99. Nel nostro esempio terapia-guarigione, χ² = 4,00 e i gradi di libertà sono 1. Poiché 4,00 è maggiore di 3,84, il risultato supera la soglia al 5%.
            - paragraph [ref=e2912]: Superare la soglia al 5% significa che, se H0 di indipendenza fosse vera, una distanza almeno così grande cadrebbe nella zona rara definita da α = 0,05. È lo stesso ragionamento del p-value, letto attraverso la tavola.
            - paragraph [ref=e2913]: "La decisione è: rifiuto H0 di indipendenza. La frase interpretativa è: i dati mostrano evidenza statistica di associazione tra terapia e guarigione al livello del 5%."
            - paragraph [ref=e2914]: La frase deve fermarsi all’associazione statistica. Il chi-quadrato non dimostra da solo che la terapia causi la guarigione. Per parlare di causalità servono disegno dello studio, controllo dei confondenti e ragionamento clinico.
