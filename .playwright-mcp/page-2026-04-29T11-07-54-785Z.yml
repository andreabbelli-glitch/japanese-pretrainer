          - generic [ref=e1078]:
            - heading "Dispersione, outlier e IQR" [level=3] [ref=e1079]
            - paragraph [ref=e1080]: Il centro dei dati non basta. Due gruppi possono avere la stessa media, ma essere molto diversi. Un reparto può avere degenze quasi tutte tra 3 e 5 giorni; un altro può avere molte dimissioni precoci e pochi ricoveri molto lunghi. La media da sola nasconde questa differenza.
            - paragraph [ref=e1081]: "La moda è il valore o la categoria più frequente. È utile soprattutto per categorie e conteggi: il tipo di parto più frequente, il numero di figli più comune, la modalità più osservata in una tabella."
            - paragraph [ref=e1082]: "Il minimo e il massimo danno il range, cioè l’intervallo tra il valore più piccolo e il più grande. Il range è immediato, ma dipende completamente dagli estremi. Nel gruppo 2, 3, 3, 4, 30 il range va da 2 a 30 giorni: segnala l’esistenza di un valore molto lontano, ma non dice come sono distribuiti gli altri pazienti."
            - paragraph [ref=e1083]: La deviazione standard, spesso abbreviata in DS, descrive quanto i valori tendono ad allontanarsi dalla media. È più adatta quando i dati sono abbastanza simmetrici. Quando invece gli estremi pesano molto, spesso la coppia mediana e intervallo interquartile è più leggibile, perché concentra l’attenzione sulla parte centrale dei dati.
            - paragraph [ref=e1084]: L’intervallo interquartile, spesso abbreviato in IQR, va dal primo quartile Q1 al terzo quartile Q3. In parole semplici, contiene la metà centrale delle osservazioni ordinate. È utile quando voglio descrivere il gruppo senza farmi dominare dagli estremi.
            - generic [ref=e1085]:
              - heading "Formula tradotta" [level=4] [ref=e1086]
              - generic [ref=e1087]: IQR = Q3 - Q1
