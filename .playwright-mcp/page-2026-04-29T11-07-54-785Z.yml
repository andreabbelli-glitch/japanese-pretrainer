          - generic [ref=e3360]:
            - 'heading "Differenza assoluta: quanti punti percentuali cambiano" [level=3] [ref=e3361]'
            - paragraph [ref=e3362]: Nel gruppo senza cintura, il rischio di decesso è 13/290 = 0,0448, cioè circa 4,5%. Nel gruppo con cintura, il rischio è 3/250 = 0,012, cioè 1,2%.
            - paragraph [ref=e3363]: "La differenza assoluta tra proporzioni è 4,5% - 1,2% = 3,3 punti percentuali. La parola “punti” è importante: si sta sottraendo una percentuale da un’altra. Non si sta dicendo che la mortalità aumenta del 3,3% relativo."
            - paragraph [ref=e3364]: "La differenza assoluta risponde alla domanda più concreta: quanti eventi in più o in meno osservo ogni 100 persone? Nell’esempio, tra chi non usa la cintura si osservano circa 3,3 morti in più ogni 100 persone rispetto a chi la usa."
            - paragraph [ref=e3365]: Usando l’errore standard della differenza tra due proporzioni, l’IC95% della differenza è circa da 0,6 a 6 punti percentuali. L’intervallo è tutto sopra 0. Il valore 0 rappresenta nessuna differenza; se 0 non è nell’intervallo, una differenza nulla non è compatibile con questi dati secondo questa procedura.
            - generic [ref=e3366]:
              - heading "Formula tradotta" [level=4] [ref=e3367]
              - generic [ref=e3368]: differenza assoluta = p1 - p2
              - list [ref=e3369]:
                - listitem [ref=e3370]: "p1: proporzione nel primo gruppo"
                - listitem [ref=e3371]: "p2: proporzione nel secondo gruppo"
                - listitem [ref=e3372]: "p1 - p2: differenza in punti proporzionali, spesso letta come punti percentuali"
                - listitem [ref=e3373]: "0: valore che indica nessuna differenza tra le proporzioni"
              - paragraph [ref=e3374]:
                - strong [ref=e3375]: "Esempio:"
                - text: 0,045 - 0,012 = 0,033, cioè 3,3 punti percentuali.
          - generic [ref=e3376]:
            - 'heading "Test z per due proporzioni: la differenza rispetto all’incertezza" [level=3] [ref=e3377]'
            - paragraph [ref=e3378]: Quando confronto due gruppi, la prima cosa da fare è calcolare le due proporzioni separatamente. Nell’esempio delle cinture, il rischio di decesso è 13/290 = 4,5% senza cintura e 3/250 = 1,2% con cintura.
            - paragraph [ref=e3379]:
              - text: La differenza osservata è 4,5% - 1,2% = 3,3 punti percentuali. Il
              - strong [ref=e3380]: test z per due proporzioni
              - text: chiede se questa differenza è grande rispetto all’incertezza attesa quando, nella popolazione, le due proporzioni fossero uguali.
            - paragraph [ref=e3381]: "Il ragionamento ha tre mattoncini. Primo: misuro la differenza osservata tra le due proporzioni. Secondo: calcolo quanto dovrebbe oscillare una differenza tra proporzioni se H0 fosse vera. Terzo: divido la differenza osservata per questa oscillazione attesa. Il risultato è z."
            - paragraph [ref=e3382]: "Per un test a due code al 5%, un valore di z oltre circa ±1,96 è considerato abbastanza lontano da 0 per rifiutare H0. Nelle tabelle 2x2, il test z per due proporzioni e il chi-quadrato rispondono quasi alla stessa domanda: il chi-quadrato lavora sulla tabella intera, mentre z guarda direttamente la differenza tra le due proporzioni. Nel caso standard a due gruppi, χ² corrisponde a z²."
            - generic [ref=e3383]:
              - heading "Formula tradotta" [level=4] [ref=e3384]
              - generic [ref=e3385]: z = (p1 - p2) / √[p0(1 - p0)(1/n1 + 1/n2)]
              - list [ref=e3386]:
                - listitem [ref=e3387]:
                  - strong [ref=e3388]: p1
                  - text: ": proporzione osservata nel primo gruppo"
                - listitem [ref=e3389]:
                  - strong [ref=e3390]: p2
                  - text: ": proporzione osservata nel secondo gruppo"
                - listitem [ref=e3391]:
                  - strong [ref=e3392]: p0
                  - text: ": proporzione comune stimata unendo i due gruppi sotto H0"
                - listitem [ref=e3393]:
                  - strong [ref=e3394]: n1 e n2
                  - text: ": numerosità dei due gruppi"
                - listitem [ref=e3395]:
                  - strong [ref=e3396]: z
                  - text: ": differenza osservata misurata in unità di errore standard"
              - paragraph [ref=e3397]:
                - strong [ref=e3398]: "Esempio:"
                - text: "Cinture: p1 = 13/290 = 0,0448, p2 = 3/250 = 0,0120. La proporzione comune è p0 = 16/540 = 0,0296; z è circa 2,24."
          - generic [ref=e3399]:
            - 'heading "Rischio relativo: quante volte cambia il rischio" [level=3] [ref=e3400]'
            - paragraph [ref=e3401]:
              - text: "La differenza assoluta misura uno scarto: quanti punti percentuali separano due gruppi. Il"
              - strong [ref=e3402]: rischio relativo
              - text: ", abbreviato"
              - strong [ref=e3403]: RR
              - text: ", misura invece un rapporto: quante volte il rischio di un gruppo è più grande o più piccolo rispetto al rischio dell’altro gruppo."
            - paragraph [ref=e3404]: Il punto di partenza resta sempre il rischio dentro ciascun gruppo. Nell’esempio delle cinture, il rischio di decesso senza cintura è 13/290 = 0,0448, cioè 4,5%. Il rischio con cintura è 3/250 = 0,012, cioè 1,2%.
            - paragraph [ref=e3405]: "Per ottenere il rischio relativo metto un rischio sopra l’altro. Se scelgo come gruppo di riferimento chi usa la cintura, RR = 0,0448 / 0,012 = 3,73. La frase corretta è: nel campione, il rischio di decesso senza cintura è circa 3,7 volte il rischio osservato con cintura."
            - paragraph [ref=e3406]: RR = 1 significa stesso rischio nei due gruppi. RR > 1 significa rischio maggiore nel gruppo al numeratore. RR < 1 significa rischio minore nel gruppo al numeratore. Un RR di 0,70, per esempio, indica un rischio pari al 70% del confronto, cioè una riduzione relativa del 30%.
            - paragraph [ref=e3407]: Il rischio relativo non sostituisce la differenza assoluta. Passare da 1 su 1000 a 3 su 1000 triplica il rischio, ma l’aumento assoluto è 2 casi ogni 1000. Passare da 10% a 30% triplica ugualmente il rischio, ma l’aumento assoluto è 20 punti percentuali. Per una frase clinica completa servono entrambi i piani.
            - generic [ref=e3408]:
              - heading "Formula tradotta" [level=4] [ref=e3409]
              - generic [ref=e3410]: RR = rischio nel gruppo 1 / rischio nel gruppo 2
              - list [ref=e3411]:
