          - generic [ref=e3904]:
            - 'heading "Potenza: quanto lo studio era capace di vedere" [level=3] [ref=e3905]'
            - paragraph [ref=e3906]: La potenza è la probabilità che uno studio trovi un risultato statisticamente significativo quando un effetto reale, della dimensione prevista, esiste davvero.
            - paragraph [ref=e3907]: "La formula è breve, ma la frase è più importante: potenza = 1 - beta. Se beta è il rischio di non vedere un effetto reale, 1 - beta è la probabilità di intercettarlo."
            - paragraph [ref=e3908]: Uno studio con potenza 80% è progettato in modo che, se l’effetto vero è quello previsto e le assunzioni sono corrette, abbia circa 80 probabilità su 100 di ottenere un risultato statisticamente significativo.
            - paragraph [ref=e3909]: La potenza aumenta quando il campione è più grande, quando la variabilità è minore, quando l’effetto atteso è più grande e quando la misura dell’esito è più precisa. Aumentare il campione riduce l’incertezza, ma non corregge bias di selezione, errori di misura o confondimento.
            - paragraph [ref=e3910]: In un commento d’esame, la potenza serve soprattutto a evitare una conclusione troppo forte davanti a p ≥ 0,05. Non significativo significa che non si rifiuta H0. Non significa automaticamente che non esista alcun effetto.
            - generic [ref=e3911]:
              - heading "Formula tradotta" [level=4] [ref=e3912]
              - generic [ref=e3913]: potenza = 1 - β
              - list [ref=e3914]:
                - listitem [ref=e3915]: "β: probabilità di errore di tipo II, cioè non vedere un effetto reale"
                - listitem [ref=e3916]: "1 - β: probabilità di vedere l’effetto se l’effetto reale della dimensione prevista esiste"
                - listitem [ref=e3917]: "potenza bassa: maggiore rischio di concludere “non significativo” per mancanza di informazione"
              - paragraph [ref=e3918]:
                - strong [ref=e3919]: "Esempio:"
                - text: Potenza 80% significa che, se l’effetto vero esiste ed è della dimensione prevista, lo studio ha circa l’80% di probabilità di rilevarlo come statisticamente significativo.
          - generic [ref=e3920]:
            - heading "Molti test aumentano i falsi allarmi possibili" [level=3] [ref=e3921]
            - paragraph [ref=e3922]: Un singolo test con alfa 0,05 accetta una piccola probabilità di falso allarme sotto H0. Se però si fanno molti test senza una domanda principale chiara, si danno molte occasioni al caso di produrre almeno un risultato apparentemente significativo.
            - paragraph [ref=e3923]: "Per l’esame basta l’idea pratica: quando un articolo mostra tanti confronti secondari, bisogna chiedersi quale fosse l’esito principale e non scegliere solo il p-value più piccolo. Molti test non rendono automaticamente falso un risultato, ma chiedono più prudenza nella conclusione."
          - generic [ref=e3924]:
            - heading "Costruire la frase finale" [level=3] [ref=e3925]
            - paragraph [ref=e3926]: "Davanti a una riga di tabella, la conclusione va costruita in ordine. Prima si nomina la misura: differenza media, differenza di proporzioni, rischio relativo, odds ratio o differenza assoluta. Poi si identifica il valore nullo corretto. Poi si legge se l’intervallo lo include. Poi si controlla il p-value. Solo dopo si discute la rilevanza clinica."
            - paragraph [ref=e3927]: "Per l’esempio Budesonide, una frase completa è: la differenza media Budesonide-placebo è -1,2 cm, con IC95% da -1,9 a -0,5 e p = 0,001. Poiché l’intervallo non include 0 e p < 0,05, si rifiuta H0 di assenza di differenza. La direzione suggerisce altezza media inferiore nel gruppo Budesonide. La rilevanza clinica della differenza, compresa tra circa mezzo centimetro e quasi due centimetri secondo l’intervallo, va valutata nel contesto clinico."
            - paragraph [ref=e3928]: "Se il risultato non fosse significativo, la frase corretta sarebbe diversa: non si rifiuta H0. Non bisogna trasformare il risultato in una prova di assenza di effetto o di uguaglianza certa tra gruppi. La conclusione deve riconoscere l’incertezza, soprattutto se lo studio è piccolo o poco potente."
            - paragraph [ref=e3929]: "La forma più sicura è: i dati non mostrano evidenza statistica sufficiente per concludere una differenza, ma l’interpretazione dipende da ampiezza dell’effetto, intervallo di confidenza, potenza e rilevanza clinica."
