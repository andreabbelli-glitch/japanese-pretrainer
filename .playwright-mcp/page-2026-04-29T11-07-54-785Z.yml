          - generic [ref=e1426]:
            - 'heading "Esempi: ViraPap e mammografia" [level=3] [ref=e1427]'
            - paragraph [ref=e1428]: Nel caso ViraPap la tabella contiene A = 62, B = 22, C = 7, D = 359. I malati reali sono 62 + 7 = 69; i sani reali sono 22 + 359 = 381; i positivi al test sono 62 + 22 = 84; i negativi al test sono 7 + 359 = 366.
            - paragraph [ref=e1429]: "La sensibilità è 62/69 = 89,9%: tra i malati, il test ne riconosce circa 90 su 100. La specificità è 359/381 = 94,2%: tra i sani, il test ne lascia negativi circa 94 su 100. Il VPP è 62/84 = 73,8%; il VPN è 359/366 = 98,1%."
            - paragraph [ref=e1430]: "Nell’esempio della mammografia, 1115 donne risultano positive allo screening e 132 hanno davvero un tumore. Il VPP è 132/1115 = 11,8%: tra le donne positive allo screening, circa 12 su 100 hanno davvero il tumore."
