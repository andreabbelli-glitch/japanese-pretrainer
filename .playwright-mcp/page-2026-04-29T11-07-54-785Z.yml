          - generic [ref=e2154]:
            - heading "Perché una stima cambia da campione a campione" [level=3] [ref=e2155]
            - paragraph [ref=e2156]: Immagina una popolazione di pazienti con pressioni diverse. Alcuni hanno valori più bassi, altri più alti. Se estraggo un campione piccolo, può capitare per caso che contenga più pazienti con pressione alta. La media del campione sarà allora più alta della media vera della popolazione. Un altro campione può contenere più pazienti con pressione bassa e produrre una media più bassa.
            - paragraph [ref=e2157]: "Queste differenze non sono errori di calcolo. Sono oscillazioni dovute al campionamento: nascono dal fatto che osservo solo una parte della popolazione."
            - paragraph [ref=e2158]: Con campioni piccoli, pochi valori estremi possono spostare molto la media. Con campioni grandi, i valori alti e bassi tendono a compensarsi meglio. La media campionaria diventa quindi più stabile, anche se i singoli pazienti restano diversi tra loro.
            - paragraph [ref=e2159]: "La domanda non è più soltanto: qual è la media osservata? Diventa: quanto potrebbe oscillare questa media se il campionamento fosse ripetuto?"
            - generic [ref=e2160]:
