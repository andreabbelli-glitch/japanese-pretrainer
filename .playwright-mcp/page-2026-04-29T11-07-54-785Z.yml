          - generic [ref=e2292]:
            - 'heading "Leggere un intervallo: valori plausibili e valore nullo" [level=3] [ref=e2293]'
            - paragraph [ref=e2294]: Un intervallo di confidenza si legge prima come descrizione della stima. Un IC95% da 126,12 a 137,88 dice che, con quel metodo e quei dati, i valori in quella fascia sono compatibili con la media vera della popolazione.
            - paragraph [ref=e2295]: Quando l’intervallo riguarda una differenza tra gruppi, si può chiedere se include il valore che significa nessuna differenza. Per le differenze, questo valore è 0. Una differenza media pari a 0 significa che le due medie sono uguali.
