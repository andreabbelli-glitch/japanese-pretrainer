          - generic [ref=e3198]:
            - heading "Proporzione osservata e proporzione vera" [level=3] [ref=e3199]
            - paragraph [ref=e3200]: La proporzione calcolata nel campione descrive ciò che è stato osservato. Se in Italia, in un campione di 100 pazienti operati per glaucoma, 85 hanno successo, il dato osservato è 85%. Questo numero parla con certezza del campione studiato.
            - paragraph [ref=e3201]: Di solito, però, la domanda clinica non riguarda solo quei 100 pazienti. Interessa la proporzione di successi che ci si potrebbe aspettare in pazienti simili, nello stesso contesto clinico. Questa proporzione più ampia è il valore vero della popolazione, ma spesso non lo osserviamo direttamente.
            - paragraph [ref=e3202]: A questo punto i simboli sono utili. La proporzione osservata nel campione si indica spesso con p. La proporzione vera nella popolazione si indica spesso con π. p è un dato disponibile; π è il valore che si cerca di stimare.
            - paragraph [ref=e3203]: "La distinzione evita un errore frequente: trattare il numero osservato come se fosse automaticamente il valore vero. Un campione diverso potrebbe produrre una proporzione leggermente diversa. La proporzione osservata è quindi una stima, non una certezza definitiva sulla popolazione."
            - generic [ref=e3204]:
