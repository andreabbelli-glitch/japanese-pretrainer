                - text: Due radiologi leggono le stesse mammografie. Due pediatri classificano gli stessi bambini. Un patologo rivede gli stessi preparati dopo alcune settimane. In tutti questi casi il problema non è solo quale sia la risposta finale, ma quanto la classificazione sia riproducibile.
              - paragraph [ref=e1607]:
                - strong [ref=e1608]: "Dopo questo capitolo saprai rispondere a:"
              - list [ref=e1609]:
                - listitem [ref=e1610]: Che differenza c’è tra concordanza dello stesso osservatore e concordanza tra osservatori diversi?
                - listitem [ref=e1611]: Perché la percentuale grezza di accordo può essere ingannevole?
                - listitem [ref=e1612]: Come si separa l’accordo osservato dall’accordo già atteso dai margini della tabella?
                - listitem [ref=e1613]: Come si interpreta Kappa tenendo conto del contesto clinico?
              - paragraph [ref=e1614]:
                - strong [ref=e1615]: Percorso.
                - text: riproducibilità -> concordanza intra-osservatore e inter-osservatore -> tabella di accordo -> accordo osservato -> accordo atteso -> indice Kappa -> soglie orientative
              - paragraph [ref=e1616]:
                - strong [ref=e1617]: Frase da saper scrivere.
                - text: Kappa riassume quanta concordanza resta dopo aver tolto la parte di accordo già prevedibile dai margini della tabella.
          - generic [ref=e1618]:
            - heading "Perché parlare di riproducibilità" [level=3] [ref=e1619]
            - paragraph [ref=e1620]: "Molte decisioni cliniche dipendono da una classificazione: un’immagine viene giudicata positiva o negativa, un tracciato viene considerato normale o patologico, una lesione viene descritta come lieve, moderata o severa. In questi casi non basta che la classificazione sembri sensata. Deve anche essere abbastanza stabile da non cambiare troppo quando viene ripetuta."
            - paragraph [ref=e1621]:
              - text: La
              - strong [ref=e1622]: riproducibilità
              - text: "risponde a una domanda concreta: se la stessa informazione clinica viene valutata di nuovo, ottengo lo stesso risultato? Se la risposta è spesso no, il problema può riguardare i criteri di classificazione, la formazione degli osservatori, la qualità dell’esame o la natura stessa del fenomeno osservato."
            - paragraph [ref=e1623]: Una classificazione poco riproducibile crea incertezza prima ancora di discutere diagnosi o terapia. Se due operatori classificano diversamente gli stessi casi, il paziente può entrare in percorsi diversi non per una reale differenza clinica, ma per una diversa lettura dell’informazione.
          - generic [ref=e1624]:
            - heading "Concordanza intra-osservatore e inter-osservatore" [level=3] [ref=e1625]
            - paragraph [ref=e1626]:
              - text: La
              - strong [ref=e1627]: concordanza intra-osservatore
              - text: "riguarda lo stesso osservatore che valuta gli stessi casi in momenti diversi. Per esempio, un radiologo rilegge dopo alcune settimane una serie di immagini senza sapere quale fosse stata la prima valutazione. La domanda è: lo stesso osservatore applica i criteri in modo stabile nel tempo?"
            - paragraph [ref=e1628]:
              - text: La
              - strong [ref=e1629]: concordanza inter-osservatore
              - text: "riguarda osservatori diversi che valutano gli stessi casi. Per esempio, due clinici leggono le stesse mammografie o due pediatri classificano gli stessi bambini. La domanda diventa: persone diverse, usando lo stesso sistema di classificazione, arrivano a conclusioni simili?"
            - paragraph [ref=e1630]: Le due domande non sono equivalenti. Un osservatore può essere coerente con se stesso ma diverso dagli altri; oppure un gruppo di osservatori può concordare bene solo dopo criteri condivisi e addestramento comune. Per questo, quando si parla di riproducibilità, bisogna sempre precisare quale tipo di concordanza si sta studiando.
          - generic [ref=e1631]:
            - heading "La tabella di accordo" [level=3] [ref=e1632]
            - paragraph [ref=e1633]: Per misurare la concordanza si parte da una tabella. Le righe descrivono che cosa ha detto il primo valutatore; le colonne descrivono che cosa ha detto il secondo. Ogni caso entra in una sola cella, perché riceve un giudizio dal primo valutatore e un giudizio dal secondo.
            - paragraph [ref=e1634]: "Le celle in cui i due valutatori danno la stessa risposta sono le celle di accordo. In una tabella con positivo e negativo, l’accordo sta nei casi entrambi positivi e nei casi entrambi negativi. Le altre celle raccolgono i disaccordi: un valutatore dice positivo e l’altro negativo."
            - paragraph [ref=e1635]: "La prima domanda è: su tutti i casi valutati, in quanti i due osservatori hanno dato la stessa classificazione?"
