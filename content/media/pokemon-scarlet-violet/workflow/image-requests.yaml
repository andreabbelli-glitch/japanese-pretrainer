      [フレンドリィショップ](term:term-friendly-shop) non restino etichette astratte.
    source_preference: >-
      Pagina story ufficiale dedicata al Centro Pokemon in Scarlet / Violet.
    search_hint: >-
      Usa la pagina ufficiale `story/220803_03` e scegli lo screenshot del
