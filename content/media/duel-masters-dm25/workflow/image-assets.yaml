  - id: duel-plays-present-box-screen
    src: assets/ui/present-box-unclaimed.png
    source_type: screenshot
    width: 2556
    height: 1179
    lesson_slug: duel-plays-app-rewards-and-claim-flow
    anchor: "### 1. Il present box è una coda di claim, non un semplice archivio"
    alt_it: >-
      Schermata プレゼントボックス con tab premi da ritirare e storico
      riscossioni, pulsante di claim multiplo, righe reward con data
      ottenimento, scadenza claim e bottone di riscossione.
    caption_it: >-
      Ogni riga del `プレゼントボックス` combina nome reward,
      `{{獲得日時|かくとくにちじ}}`, `{{受け取り期限|うけとりきげん}}` e bottone
      `{{受け取る|うけとる}}`: è una schermata di claim, non un semplice
      deposito di premi.
    notes: >-
      Screenshot fornito dall'utente e copiato da Downloads.
  - id: duel-plays-stage-select-screen
    src: assets/ui/stage-select-collab-event.png
    source_type: screenshot
    width: 2556
    height: 1179
    lesson_slug: duel-plays-app-rewards-and-claim-flow
    anchor: "### 3. La stage select comprime livello, costo e reward preview"
    alt_it: >-
      Schermata stage select con lista stage a sinistra, livelli beginner e
      intermediate, costo in ticket, NEXT REWARD, checkbox di skip storia gia
      letta e pulsanti verifica reward e avvio sfida.
    caption_it: >-
      In [ステージ{{選択|せんたく}}](term:term-stage-select) scegli lo stage a
      sinistra e, a destra, controlli avversario, reward, opzioni di skip e
      pulsanti come `{{報酬|ほうしゅう}}{{確認|かくにん}}` e
      [{{対戦開始|たいせんかいし}}](term:term-start-match).
    notes: >-
      Screenshot fornito dall'utente e copiato da Downloads.
  - id: duel-plays-reward-claim-popup
    src: assets/ui/reward-claim-popup.png
    source_type: screenshot
    width: 2556
    height: 1179
    lesson_slug: duel-plays-app-rewards-and-claim-flow
    anchor: "### 4. Il popup finale conferma che il claim è già avvenuto"
    alt_it: >-
      Popup di claim reward con frase centrale di conferma dell'incasso e
      bottone OK.
    caption_it: >-
      Il titolo dice `{{報酬|ほうしゅう}}{{受|う}}け{{取|と}}り`, ma la frase
      `{{以下|いか}}の{{報酬|ほうしゅう}}を{{受|う}}け{{取|と}}りました`
      conferma che l'incasso è già stato registrato.
    notes: >-
      Screenshot fornito dall'utente e copiato da Downloads.
  - id: duel-plays-shop-menu-screen
    src: assets/ui/shop-menu-panels.png
    source_type: screenshot
    width: 2556
    height: 1179
    lesson_slug: duel-plays-app-shop-packs-and-results
    anchor: "### 1. La schermata shop classifica subito il tipo di acquisizione"
    alt_it: >-
      Home shop con quattro grandi pannelli per acquisto carte, acquisto pack,
      acquisto deck costruiti e card exchange.
    caption_it: >-
      `ショップ` separa già a colpo d'occhio acquisto carte, pack, deck
      prebuilt e exchange: capire il pannello giusto evita di entrare nel
      flusso sbagliato.
    notes: >-
      Screenshot fornito dall'utente e copiato da Downloads.
  - id: duel-plays-pack-purchase-main
    src: assets/ui/card-pack-purchase-main.png
    source_type: screenshot
    width: 2556
    height: 1179
    lesson_slug: duel-plays-app-shop-packs-and-results
    anchor: "### 2. La schermata principale dei pack va letta come un menu di risorse"
    alt_it: >-
      Schermata acquisto pack con banner del pack, costi in gemme e oro, righe
      ticket e pulsanti lista carte e percentuali.
    caption_it: >-
      [カードパック{{購入|こうにゅう}}](term:term-card-pack-purchase) va letto
      come menu di risorse e controlli: bottoni di acquisto, stock ticket,
      `カード{{一覧|いちらん}}` e `{{提供割合|ていきょうわりあい}}`.
    notes: >-
      Screenshot fornito dall'utente e copiato da Downloads.
  - id: duel-plays-pack-purchase-count
    src: assets/ui/card-pack-purchase-count.png
    source_type: screenshot
    width: 2556
    height: 1179
    lesson_slug: duel-plays-app-shop-packs-and-results
    anchor: "### 3. Il popup quantità mette al centro stock e numero di pack"
    alt_it: >-
      Popup acquisto pack con contatore della quantità, indicazione ticket
      posseduti e pulsanti meno, più e MAX.
    caption_it: >-
      Nel popup quantità il punto non è il banner del pack, ma il rapporto tra
      [{{所持チケット|しょじちけっと}}](term:term-owned-ticket), contatore e
      `MAX`.
    notes: >-
      Screenshot fornito dall'utente e copiato da Downloads.
  - id: duel-plays-pack-purchase-confirm
    src: assets/ui/card-pack-purchase-confirm.png
    source_type: screenshot
    width: 2556
    height: 1179
    lesson_slug: duel-plays-app-shop-packs-and-results
    anchor: "### 4. Il popup conferma formula l'azione come frase completa"
    alt_it: >-
      Popup di conferma pack che chiede se usare 4 ticket per comprare quattro
      pack PLAY'S CHRONICLE PACK II.
    caption_it: >-
      Il popup di conferma esplicita quantità e prodotto nella frase centrale,
      mentre la riga in basso ti fa controllare la risorsa consumata.
    notes: >-
      Screenshot fornito dall'utente e copiato da Downloads.
  - id: duel-plays-pack-card-reveal
    src: assets/ui/card-pack-card-reveal.png
    source_type: screenshot
    width: 2556
    height: 1179
    lesson_slug: duel-plays-app-shop-packs-and-results
    anchor: "### 5. I risultati alternano reveal spettacolare e lista leggibile"
    alt_it: >-
      Schermata di reveal spettacolare della carta ディアス Z durante
      l'apertura pack.
    caption_it: >-
      Il reveal enfatizza il colpo di scena visivo, ma il lettore deve comunque
      saper recuperare nome carta e risultato reale.
    notes: >-
      Screenshot fornito dall'utente e copiato da Downloads.
  - id: duel-plays-pack-obtained-list
    src: assets/ui/card-pack-obtained-list.png
    source_type: screenshot
    width: 2556
    height: 1179
    lesson_slug: duel-plays-app-shop-packs-and-results
    anchor: "### 5. I risultati alternano reveal spettacolare e lista leggibile"
    alt_it: >-
      Schermata lista carte ottenute con filtri per civiltà o categoria e
      griglia delle carte.
    caption_it: >-
      `{{獲得|かくとく}}カード{{一覧|いちらん}}` è la schermata utile per
      verificare davvero il risultato dell'apertura, con filtri e griglia delle
      carte.
    notes: >-
      Screenshot fornito dall'utente e copiato da Downloads.
  - id: duel-plays-card-exchange-screen
    src: assets/ui/card-exchange-main.png
    source_type: screenshot
    width: 2556
    height: 1179
    lesson_slug: duel-plays-app-exchange-decks-and-setup
    anchor: "### 1. La schermata exchange ruota attorno a finestra temporale e tentativi residui"
    alt_it: >-
      Schermata card exchange con tab prize card exchange e arc card exchange,
      categorie a sinistra e ribbon periodo scambio sulle carte.
    caption_it: >-
      In [カード{{交換|こうかん}}](term:term-card-exchange) prima leggi tab,
      filtri e valuta; poi la singola riga carta con
      [{{交換期間|こうかんきかん}}](term:term-exchange-period),
      [{{所持|しょじ}}](term:term-owned) e
      `あと{{4回交換可能|よんかいこうかんかのう}}！`.
    notes: >-
      Screenshot fornito dall'utente e copiato da Downloads.
  - id: duel-plays-card-exchange-shortage-popup
    src: assets/ui/card-exchange-dm-points-shortage.png
    source_type: screenshot
    width: 2556
    height: 1179
    lesson_slug: duel-plays-app-exchange-decks-and-setup
    anchor: "### 2. I popup di risorsa insufficiente spiegano anche la via di recupero"
    alt_it: >-
      Popup che avvisa della mancanza di DMポイント e propone il flusso di
      dismantle carte come azione successiva.
    caption_it: >-
      Il popup identifica il blocco reale (`DMポイントが{{不足|ふそく}}しています`)
      e propone subito il flusso di recupero (`カード{{分解|ぶんかい}}しますか？`).
    notes: >-
      Screenshot fornito dall'utente e copiato da Downloads.
  - id: duel-plays-constructed-deck-purchase
    src: assets/ui/constructed-deck-purchase.png
    source_type: screenshot
    width: 2556
    height: 1179
    lesson_slug: duel-plays-app-exchange-decks-and-setup
    anchor: "### 3. I deck prebuilt si leggono tra periodo di vendita e bonus inclusi"
    alt_it: >-
      Schermata acquisto deck prebuilt con più deck in vendita, ribbon periodo
      vendita e bonus playmat/protector.
    caption_it: >-
      [{{構築済みデッキ購入|こうちくずみでっきこうにゅう}}](term:term-constructed-deck-purchase)
      mostra deck-prodotto, [{{販売期間|はんばいきかん}}](term:term-sale-period),
      prezzo e bonus `{{特典|とくてん}}プレイマット/プロテクト`: qui non
      stai ancora editando una lista.
    notes: >-
      Screenshot fornito dall'utente e copiato da Downloads.
  - id: duel-plays-deck-list-rental
    src: assets/ui/deck-list-rental.png
    source_type: screenshot
    width: 2556
    height: 1179
    lesson_slug: duel-plays-app-exchange-decks-and-setup
    anchor: "### 4. La deck list collega scelta, preview e avvio della partita"
    alt_it: >-
      Schermata lista deck nella sezione レンタルデッキ con preview del mazzo,
      pannello キーカード e pulsanti overview deck, verifica legend skill e
      avvio sfida.
    caption_it: >-
      [デッキ{{一覧|いちらん}}](term:term-deck-list) è un hub di preparazione:
      scegli il mazzo, controlli preview e pulsanti diversi per capire,
      modificare o avviare la partita.
    notes: >-
      Screenshot fornito dall'utente e copiato da Downloads.
