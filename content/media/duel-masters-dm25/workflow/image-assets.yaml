assets:
  - id: duel-plays-home-screen
    src: assets/ui/home-screen.png
    source_type: screenshot
    width: 2556
    height: 1179
    lesson_slug: duel-plays-app-overview
    anchor: "### 1. La home non è contenuto: è una mappa"
    alt_it: >-
      Schermata home di デュエプレ con barra bassa quasi bilingue, fila di icone
      in alto e banner centrali per eventi, missioni e scorciatoie.
    caption_it: >-
      La home di `デュエプレ` mescola navigazione persistente, icone rapide e
      banner centrali: la lettura utile parte da capire quali elementi aprono
      davvero una nuova schermata.
    notes: >-
      Screenshot fornito dall'utente.
  - id: duel-plays-modes-screen
    src: assets/ui/battle-screen-modes.png
    source_type: screenshot
    width: 2556
    height: 1179
    lesson_slug: duel-plays-app-modes-and-progression
    anchor: "### 1. I nomi modalità sono mappe, non lessico decorativo"
    alt_it: >-
      Schermata Battle di デュエプレ con pannelli visibili per ランクマッチ,
      カジュアルマッチ e ルームマッチ, oltre alla navigazione inferiore.
    caption_it: >-
      Nel tab `Battle` i pannelli grandi ti fanno leggere prima la famiglia di
      match e solo dopo il dettaglio: [ランクマッチ](term:term-ranked-match),
      `カジュアルマッチ` e [ルームマッチ](term:term-room-match) non sono solo
      nomi, ma ingressi a flussi diversi.
    notes: >-
      Screenshot fornito dall'utente.
  - id: tcg-core-card-anatomy-reference
    src: assets/cards/abyssbell-jashintei.webp
    source_type: card-art
    width: 650
    height: 908
    card_id: card-abyssbell-jashintei-recognition
    lesson_slug: tcg-core-overview
    anchor: "### 2. La carta si legge dall'esterno verso l'interno"
    alt_it: >-
      Carta di アビスベル=ジャシンてい con costo, nome, tipo, razza, testo effetto e
      potenza ben visibili.
    caption_it: >-
      Carta reale di
      [アビスベル=ジャシン{{帝|てい}}](term:term-abyssbell-jashintei) usata come
      riferimento per leggere i campi principali di una carta Duel Masters.
    notes: >-
      Fonte ufficiale Takara Tomy. Asset riusato anche per la lesson
      `DM25-SD1`.
  - id: duel-plays-deck-edit-screen
    src: assets/ui/deck-edit.webp
    source_type: screenshot
    width: 1285
    height: 594
    lesson_slug: duel-plays-app-decks-and-shop
    anchor: "### 2. `デッキ{{編成|へんせい}}` e `レンタルデッキ` rispondono a due bisogni diversi"
    alt_it: >-
      Schermata di editing del deck in デュエプレ con lista carte, filtri,
      indicatore di possesso, pannello マイデッキ e pulsanti di conferma e
      salvataggio.
    caption_it: >-
      In [デッキ{{編成|へんせい}}](term:term-deck-edit) il lato sinistro è
      collezione e filtri, il lato destro è il mazzo attuale: leggere bene
      [カード{{一覧|いちらん}}](grammar:grammar-ichiran),
      [{{所持|しょじ}}](term:term-owned) e `デッキ{{保存|ほぞん}}` ti evita di
      confondere consultazione e modifica.
    notes: >-
      Screenshot ufficiale App Store iPhone.
