  - id: duel-plays-present-box-screen
    lesson_slug: duel-plays-app-rewards-and-claim-flow
    anchor: "### 1. Il present box è una coda di claim, non un semplice archivio"
    kind: app-screen
    priority: high
    capture_instructions: >-
      Usa direttamente lo screenshot fornito dall'utente della schermata
      `プレゼントボックス`. Non cercare immagini alternative.
    alt_it: >-
      Schermata プレゼントボックス con tab premi da ritirare e storico
      riscossioni, pulsante di claim multiplo e due reward riscattabili.
    caption_it: >-
      Schermata `プレゼントボックス` usata per leggere stato di claim, storico e
      scadenza delle reward in un colpo solo.
    notes: >-
      Screenshot fornito dall'utente. Nessuna ricerca esterna richiesta.
  - id: duel-plays-stage-select-screen
