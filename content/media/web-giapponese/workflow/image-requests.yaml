requests:
  - id: starsavior-79520369-overview
    lesson_slug: 010-appmedia-starsavior-party-composition
    anchor: "quando il titolo mostra due blocchi nominali coordinati"
    kind: app-screen
    priority: high
    placement_rationale: >-
      Va subito dopo il paragrafo che spiega il titolo, così il lettore vede la
      pagina intera con titolo, apertura e indice già nella stessa schermata.
    visual_goal: >-
      Mostrare il titolo dell'articolo, l'immagine iniziale e la parte alta del
      contenuto, in modo che la struttura della guida sia leggibile a colpo
      d'occhio.
    source_preference: >-
      Pagina pubblica renderizzata di
      https://appmedia.jp/starsavior/79520369.
    capture_instructions: >-
      Usa il viewport della pagina reale senza filtri grafici aggiuntivi.
      Mantieni il titolo dell'articolo e la prima area di contenuto ben visibili.
    must_show: >-
      Titolo dell'articolo, immagine iniziale, testo introduttivo e parte alta
      dell'indice.
    avoid: >-
      Screenshot troppo ritagliati, banner laterali che coprono il titolo o
      stato di pagina senza indice visibile.
    alt_it: >-
      Pagina AppMedia di Star Savior con titolo, immagine iniziale e apertura
      dell'articolo visibili.
    caption_it: >-
      Qui si vede subito che [{{最強|さいきょう}}](term:term-saikyo)
      [{{パーティー編成|ぱーてぃーへんせい}}](term:term-party-composition) と
      [{{おすすめ|おすすめ}}](term:term-osusume)
      [{{編成|へんせい}}](term:term-hensei) sono due blocchi nominali paralleli.
    notes: >-
      Screenshot reale preso dalla pagina pubblica con Playwright.
  - id: starsavior-79520369-toc
    lesson_slug: 010-appmedia-starsavior-party-composition
    anchor: "L’indice è utile perché ti dice subito come AppMedia sta spezzando il tema"
    kind: app-screen
    priority: high
    placement_rationale: >-
      Va nel punto in cui la lesson spiega `目次`, perché è il supporto visivo
      che rende immediata la scansione della guida.
    visual_goal: >-
      Rendere leggibili le sezioni cliccabili del sommario, in particolare i
      blocchi PVE, PVP, attributi e beginner tips.
    source_preference: >-
      Element screenshot della navigazione interna dell'articolo pubblicato su
      https://appmedia.jp/starsavior/79520369.
    capture_instructions: >-
      Cattura il solo blocco del sommario dell'articolo, non la navigazione
      globale del sito.
    must_show: >-
      `目次`, `最強編成「PVE」`, `最強編成「PVP」`,
      `太陽属性の最強パーティ編成`, `月属性の最強パーティ編成`,
      `星属性の最強パーティ編成`, `初心者おすすめ編成`,
      `パーティ編成のコツ`.
    avoid: >-
      Header globale di AppMedia, sidebar laterali o altri menu fuori
      dall'indice dell'articolo.
    alt_it: >-
      Sommario dell'articolo con le sezioni PVE, PVP, attributi e consigli per
      principianti.
    caption_it: >-
      Il [{{目次|もくじ}}](term:term-mokuji) divide la guida in blocchi pratici:
      PVE, PVP, attributi e [{{初心者|しょしんしゃ}}](term:term-shoshinsha).
    notes: >-
      Element screenshot del blocco `nav.post_index` nella pagina pubblica.
  - id: starsavior-79520369-front-back
    lesson_slug: 010-appmedia-starsavior-party-composition
    anchor: "Il front line non è solo una posizione estetica"
    kind: app-screen
    priority: high
    placement_rationale: >-
      Va subito dopo il paragrafo che spiega [前衛](term:term-frontline) e
      [後衛](term:term-backline), perché il crop mostra la parte della guida che
      rende concreto il concetto di disposizione.
    visual_goal: >-
      Rendere visibile il testo che spiega il ruolo di prima linea e
      retroguardia nella composizione della squadra.
    source_preference: >-
      Pagina pubblica renderizzata di
      https://appmedia.jp/starsavior/79520369.
    capture_instructions: >-
      Usa un viewport reale della pagina e centra il blocco di testo che
      spiega [前衛](term:term-frontline) e [後衛](term:term-backline).
    must_show: >-
      Testo esplicativo su `前衛` e `後衛`, con il riferimento al modo in cui
      la squadra viene esposta o protetta.
    avoid: >-
      Zone lontane della pagina, pubblicità laterali o schermate in cui il
      concetto di prima linea non è leggibile.
    alt_it: >-
      Sezione della guida che spiega il rapporto tra prima linea e retroguardia.
    caption_it: >-
      Qui il testo chiarisce che [{{前衛|ぜんえい}}](term:term-frontline) e
      [{{後衛|こうえい}}](term:term-backline) cambiano davvero il modo in cui la
      squadra regge lo scontro.
    notes: >-
      Screenshot reale dalla pagina pubblica con Playwright, centrato sul
      blocco di spiegazione dei ruoli.
