    notes: >-
      Element screenshot del blocco `nav.post_index` nella pagina pubblica.
  - id: starsavior-79520369-front-back
    lesson_slug: 010-appmedia-starsavior-party-composition
    anchor: "Il front line non è solo una posizione estetica"
    kind: app-screen
    priority: high
    placement_rationale: >-
      Va subito dopo il paragrafo che spiega [前衛](term:term-frontline) e
      [後衛](term:term-backline), perché il crop mostra la parte della guida che
      rende concreto il concetto di disposizione.
    visual_goal: >-
      Rendere visibile il testo che spiega il ruolo di prima linea e
      retroguardia nella composizione della squadra.
    source_preference: >-
      Pagina pubblica renderizzata di
      https://appmedia.jp/starsavior/79520369.
    capture_instructions: >-
      Usa un viewport reale della pagina e centra il blocco di testo che
      spiega [前衛](term:term-frontline) e [後衛](term:term-backline).
    must_show: >-
      Testo esplicativo su `前衛` e `後衛`, con il riferimento al modo in cui
      la squadra viene esposta o protetta.
    avoid: >-
      Zone lontane della pagina, pubblicità laterali o schermate in cui il
      concetto di prima linea non è leggibile.
    alt_it: >-
      Sezione della guida che spiega il rapporto tra prima linea e retroguardia.
    caption_it: >-
      Qui il testo chiarisce che [{{前衛|ぜんえい}}](term:term-frontline) e
      [{{後衛|こうえい}}](term:term-backline) cambiano davvero il modo in cui la
      squadra regge lo scontro.
    notes: >-
      Screenshot reale dalla pagina pubblica con Playwright, centrato sul
      blocco di spiegazione dei ruoli.
  - id: starsavior-79717421-overview
    lesson_slug: 020-appmedia-starsavior-bunny-charles-evaluation-and-usage
    anchor: "Questa pagina di AppMedia è una scheda personaggio completa per Star Savior."
    kind: app-screen
    priority: high
    placement_rationale: >-
      Va subito dopo il contesto iniziale, così il lettore vede il titolo della
      guida e riconosce che i blocchi su valutazione, performance e use case
      appartengono alla stessa scheda personaggio.
    visual_goal: >-
      Mostrare l'apertura della pagina con breadcrumb, titolo, data e hero
      image, in modo che la guida sia memorizzabile come schermata reale.
    source_preference: >-
      Pagina pubblica renderizzata di
      https://appmedia.jp/starsavior/79717421.
    capture_instructions: >-
      Usa il viewport reale della pagina nella parte alta dell'articolo,
      mantenendo ben leggibili titolo e immagine iniziale.
    must_show: >-
      Breadcrumb della guida, titolo dell'articolo, data di aggiornamento e
      immagine principale del personaggio.
    avoid: >-
      Crop troppo bassi che perdono il titolo o schermate già scese sulle
      tabelle interne.
    alt_it: >-
      Pagina AppMedia di Star Savior dedicata a Bunny Charles con titolo e
      immagine iniziale.
    caption_it: >-
      Qui si riconosce subito la struttura della scheda:
      [{{評価|ひょうか}}](term:term-hyoka),
      [{{性能|せいのう}}](term:term-seino),
      [{{強|つよ}}さ](term:term-tsuyosa) e
      [{{使|つか}}い{{道|みち}}](term:term-tsukaimichi) sono sezioni interne di
      una pagina più ampia.
    notes: >-
      Screenshot reale preso dalla pagina pubblica con Playwright.
