  - id: starsavior-79717421-evaluation
    lesson_slug: 020-appmedia-starsavior-bunny-charles-evaluation-and-usage
    anchor: "La sezione iniziale unisce tabella dati e giudizio sintetico nello stesso colpo d'occhio."
    kind: app-screen
    priority: high
    placement_rationale: >-
      Va nel punto in cui la lesson spiega la differenza tra giudizio del sito e
      dati tecnici, perché mostra entrambe le cose nella stessa schermata.
    visual_goal: >-
      Rendere leggibili il titolo `バニーシャルルの評価と性能`, la tabella con
      attributo, classe e `攻撃種`, e il box di valutazione con i rank.
    source_preference: >-
      Pagina pubblica renderizzata di
      https://appmedia.jp/starsavior/79717421#evaluation.
