assets:
  - id: starsavior-79520369-overview
    src: assets/starsavior-79520369-overview.png
    source_type: screenshot
    width: 1440
    height: 2200
    lesson_slug: 010-appmedia-starsavior-party-composition
    anchor: "quando il titolo mostra due blocchi nominali coordinati"
    alt_it: >-
      Pagina AppMedia di Star Savior con titolo, immagine iniziale e apertura
      dell'articolo visibili.
    caption_it: >-
      Qui si vede subito che [{{最強|さいきょう}}](term:term-saikyo)
      [{{パーティー編成|ぱーてぃーへんせい}}](term:term-party-composition) と
      [{{おすすめ|おすすめ}}](term:term-osusume)
      [{{編成|へんせい}}](term:term-hensei) sono due blocchi nominali paralleli.
    notes: >-
      Screenshot reale preso dalla pagina pubblica con Playwright.
  - id: starsavior-79520369-toc
    src: assets/starsavior-79520369-toc.png
    source_type: screenshot
    width: 523
    height: 312
    lesson_slug: 010-appmedia-starsavior-party-composition
    anchor: "L’indice è utile perché ti dice subito come AppMedia sta spezzando il tema"
    alt_it: >-
      Sommario dell'articolo con le sezioni PVE, PVP, attributi e consigli per
      principianti.
    caption_it: >-
      Il [{{目次|もくじ}}](term:term-mokuji) divide la guida in blocchi pratici:
      PVE, PVP, attributi e [{{初心者|しょしんしゃ}}](term:term-shoshinsha).
    notes: >-
      Element screenshot del blocco `nav.post_index` nella pagina pubblica.
  - id: starsavior-79520369-front-back
    src: assets/starsavior-79520369-front-back.png
    source_type: screenshot
    width: 1440
    height: 2200
    lesson_slug: 010-appmedia-starsavior-party-composition
    anchor: "Il front line non è solo una posizione estetica"
    alt_it: >-
      Sezione della guida che spiega il rapporto tra prima linea e retroguardia.
    caption_it: >-
      Qui il testo chiarisce che [{{前衛|ぜんえい}}](term:term-frontline) e
      [{{後衛|こうえい}}](term:term-backline) cambiano davvero il modo in cui la
      squadra regge lo scontro.
    notes: >-
      Screenshot reale dalla pagina pubblica con Playwright, centrato sul
      blocco di spiegazione dei ruoli.
  - id: starsavior-79717421-overview
    src: assets/starsavior-79717421-overview.png
    source_type: screenshot
    width: 1200
    height: 736
    lesson_slug: 020-appmedia-starsavior-bunny-charles-evaluation-and-usage
    anchor: "Questa pagina di AppMedia è una scheda personaggio completa per Star Savior."
    alt_it: >-
      Pagina AppMedia di Star Savior dedicata a Bunny Charles con titolo e
      immagine iniziale.
    caption_it: >-
      Qui si riconosce subito la struttura della scheda:
      [{{評価|ひょうか}}](term:term-hyoka),
      [{{性能|せいのう}}](term:term-seino),
      [{{強|つよ}}さ](term:term-tsuyosa) e
      [{{使|つか}}い{{道|みち}}](term:term-tsukaimichi) sono sezioni interne di
      una pagina più ampia.
    notes: >-
      Screenshot reale preso dalla pagina pubblica con Playwright.
  - id: starsavior-79717421-toc
    src: assets/starsavior-79717421-toc.png
    source_type: screenshot
    width: 524
    height: 481
    lesson_slug: 020-appmedia-starsavior-bunny-charles-evaluation-and-usage
    anchor: "Il sommario mostra subito che la pagina non tratta tutto come un unico voto."
    alt_it: >-
      Sommario dell'articolo con le principali sezioni della scheda personaggio.
    caption_it: >-
      Il [{{目次|もくじ}}](term:term-mokuji) separa subito
      [{{評価|ひょうか}}](term:term-hyoka) e
      [{{性能|せいのう}}](term:term-seino) dalla parte su
      [{{強|つよ}}さ](term:term-tsuyosa) e
      [{{使|つか}}い{{道|みち}}](term:term-tsukaimichi).
    notes: >-
      Element screenshot del sommario reale preso con Playwright.
  - id: starsavior-79717421-evaluation
    src: assets/starsavior-79717421-evaluation.png
    source_type: screenshot
    width: 1200
    height: 736
    lesson_slug: 020-appmedia-starsavior-bunny-charles-evaluation-and-usage
    anchor: "La sezione iniziale unisce tabella dati e giudizio sintetico nello stesso colpo d'occhio."
    alt_it: >-
      Sezione centrale con titolo valutazione e performance, tabella dati e
      rank.
    caption_it: >-
      Nel blocco
      [バニーシャルルの{{評価|ひょうか}}と{{性能|せいのう}}](term:term-bunny-charles-hyoka-seino),
      [{{攻撃種|こうげきしゅ}}](term:term-kougekishu) sta nella tabella dati,
      mentre il rank sintetizza il giudizio del sito.
    notes: >-
      Screenshot reale preso dalla pagina pubblica con Playwright.
  - id: starsavior-79717421-strength-usage
    src: assets/starsavior-79717421-strength-usage.png
    source_type: screenshot
    width: 1200
    height: 736
    lesson_slug: 020-appmedia-starsavior-bunny-charles-evaluation-and-usage
    anchor: "La sezione successiva cambia prospettiva e passa dai dati agli scenari."
    alt_it: >-
      Sezione della guida che spiega punti di forza e contesti d'uso di Bunny
      Charles.
    caption_it: >-
      Nel blocco
      [バニーシャルルの{{強|つよ}}さと{{使|つか}}い{{道|みち}}](term:term-bunny-charles-tsuyosa-tsukaimichi)
      la guida non elenca solo valori: spiega perché il personaggio rende bene
      e dove conviene usarlo.
    notes: >-
      Screenshot reale preso dalla pagina pubblica con Playwright.
  - id: dmps-deckbuilder-overview
    src: assets/dmps-deckbuilder-overview.png
    source_type: screenshot
    width: 1440
    height: 1200
    lesson_slug: 030-dmps-takaratomy-deckbuilder-create-or-code-input
    anchor: "Questa è la pagina iniziale del deckbuilder di DUEL MASTERS PLAY'S."
    alt_it: >-
      Pagina deckbuilder di Duel Masters Plays con selezione division e due
      azioni principali.
    caption_it: >-
      La schermata separa subito
      [{{新規|しんき}}](term:term-shinki)で
      デッキを
      [{{作成|さくせい}}する](term:term-sakusei-suru) da
      [デッキコード](term:term-deck-code)を
      [{{入力|にゅうりょく}}する](term:term-nyuryoku-suru).
    notes: >-
      Screenshot reale preso dalla pagina pubblica con Playwright.
  - id: dmps-deckbuilder-create
    src: assets/dmps-deckbuilder-create.png
    source_type: screenshot
    width: 460
    height: 156
    lesson_slug: 030-dmps-takaratomy-deckbuilder-create-or-code-input
    anchor: "Il blocco di sinistra è la via da zero."
    alt_it: >-
      Blocco di sinistra con testo di creazione nuovo mazzo e pulsante
      principale.
    caption_it: >-
      La frase esplicativa usa la forma verbale
      [{{新規|しんき}}](term:term-shinki)で
      デッキを
      [{{作成|さくせい}}する](term:term-sakusei-suru), mentre la CTA la comprime
      in `{{新規|しんき}}デッキ{{作成|さくせい}}`.
    notes: >-
      Element screenshot reale preso con Playwright dal riquadro di sinistra.
  - id: dmps-deckbuilder-input
    src: assets/dmps-deckbuilder-input.png
    source_type: screenshot
    width: 460
    height: 156
    lesson_slug: 030-dmps-takaratomy-deckbuilder-create-or-code-input
    anchor: "Il blocco di destra cambia logica."
    alt_it: >-
      Blocco di destra con campo per codice deck e pulsante di conferma.
    caption_it: >-
      Qui [デッキコード](term:term-deck-code) è l'oggetto da inserire e
      [{{入力|にゅうりょく}}する](term:term-nyuryoku-suru) è l'azione; `{{決定|けってい}}`
      arriva solo dopo l'immissione.
    notes: >-
      Element screenshot reale preso con Playwright dal riquadro di destra.
  - id: puzzle-dragons-tutorial-kouryaku
    src: assets/puzzle-dragons-tutorial-kouryaku.jpg
    source_type: screenshot
    width: 1179
    height: 1709
    lesson_slug: 040-puzzle-dragons-tutorial-kouryaku
    anchor: "Il tutorial invita ad affrontare anche questo dungeon."
    alt_it: >-
      Schermata tutorial di Puzzle and Dragons con dialogo su recupero HP e
      dungeon.
    caption_it: >-
      Dopo `HPが{{回復|かいふく}}したよ！`, il tutorial dice
      `それじゃ、このダンジョンも[{{攻略|こうりゃく}}](term:term-kouryaku)してみよう！`:
      non sta nominando una guida, ma invita ad affrontare e completare il
      dungeon.
    notes: >-
      Screenshot locale fornito dall'utente e salvato come asset del bundle.
